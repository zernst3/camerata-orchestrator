id = "ARCH-TRUNK-SYNC-1"
title = "Single-source trunk sync"
tag = "stack"
domain = "ci-cd"
layer = "universal"
enforcement = "prose"
default = true

[decision]
question = "How do release-line fixes get back to trunk?"
why = "Per-fix mirroring creates hidden divergence (a fix lands on release, the cherry-pick to main is forgotten, trunk silently lacks it). Continuously cherry-picking each fix to trunk depends on every cherry-pick happening in lockstep with the release-branch fix; one missed cherry-pick produces a silent divergence that surfaces months later when trunk fails to reproduce a fix that everyone assumed had landed. A trunk-only model with no release branches avoids the divergence entirely but loses the stabilization surface release branches provide, so any bug found late in the release cycle has to be fixed against an actively-moving trunk."

[[option]]
id = "one-merge-commit-after-the-release-ships"
label = "one merge-commit after the release ships"
directive = "Release-line fixes stay on the release branch until ship, then sync back to trunk in ONE merge-commit, not per-fix cherry-picks."
why = "A defensible position on this decision; with no default, the project must choose deliberately at curation time."

[[option]]
id = "continuous-cherry-pick"
label = "continuous cherry-pick"
directive = "each release-line fix is cherry-picked to trunk continuously as it lands on the release branch, with no end-of-release sync step"
why = "A defensible position on this decision; with no default, the project must choose deliberately at curation time."

[[option]]
id = "trunk-only-no-release-branch"
label = "trunk-only (no release branch)"
directive = "the project has no release branches at all; trunk is the only line and every change ships from it"
why = "A defensible position on this decision; with no default, the project must choose deliberately at curation time."
