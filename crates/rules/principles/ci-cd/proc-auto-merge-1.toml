id = "PROC-AUTO-MERGE-1"
title = "Auto-merge tight, bot-authored PRs"
tag = "stack"
domain = "ci-cd"
layer = "universal"
enforcement = "prose"
default = false
verification = "policy"

[[sources]]
url = "AGENTS.md"
title = "AGENTS.md — referenced in brownfield onboarding context (auto-merge tight bot PRs)"

[decision]
question = "Which bot-authored PRs may self-merge?"
why = "Tight bot PRs don't need human judgment; conventions + CI cover the safety surface. Requiring every PR (including tight bot-authored ones) to receive human review before merge is safer but slower, and it loses the throughput benefit of letting cheap mechanical changes through; reviewer attention gets consumed by changes whose correctness is already guaranteed by conventions and CI. Letting any bot-authored PR auto-merge once CI passes (regardless of scope or whether it touches hard-guard areas) is faster but widens the blast radius: a single bad routine can ship a damaging change before anyone notices, and the hard-guard areas exist precisely because the cost of a wrong autonomous call there is high."

[[option]]
id = "tight-single-purpose-convention-following-non-ha"
label = "tight, single-purpose, convention-following, non-hard-guard PRs on green CI"
directive = "PRs that are bot-authored, single-purpose, convention-following, touch no hard-guard areas, add no new conventions, and pass CI + automated review → auto-merge (tagged). Frees human review for judgment-heavy PRs."
why = "Tight bot PRs do not need human judgment; conventions and CI already cover their safety surface, and routing them through manual review consumes reviewer attention on changes whose correctness is already guaranteed."

[[option]]
id = "require-human-review-on-everything"
label = "require human review on everything"
directive = "every pull request including tight bot-authored ones requires explicit human review of the diff before it can merge, with no auto-merge path"
why = "Requiring human review on everything is safer but loses the throughput benefit of letting cheap mechanical changes through; reviewer attention gets consumed by changes whose correctness is already guaranteed by conventions and CI."

[[option]]
id = "auto-merge-any-bot-pr-on-green-ci-unconditionally"
label = "auto-merge any bot-authored PR once CI passes, regardless of scope or hard-guard areas"
directive = "Any bot-authored pull request auto-merges as soon as CI passes, with no distinction by scope, size, whether it touches a hard-guard area, or whether it introduces a new convention."
why = "Maximizes throughput and requires no per-PR scope judgment, but widens the blast radius: a single bad routine can ship a damaging change before anyone notices, because CI passing is not the same guarantee as 'this change is tight, single-purpose, and touches nothing sensitive.' The hard-guard areas exist precisely because the cost of a wrong autonomous call there is high, and green CI alone does not certify that a change stays out of them."
