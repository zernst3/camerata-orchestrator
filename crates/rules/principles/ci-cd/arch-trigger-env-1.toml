id = "ARCH-TRIGGER-ENV-1"
title = "Trigger→environment mapping with immutable prod tags"
tag = "stack"
domain = "ci-cd"
layer = "universal"
enforcement = "prose"
default = true
verification = "grounded"

[[sources]]
url = "CONVENTIONS.md"
title = "CONVENTIONS.md — Deployment section (Trigger→environment mapping table: push to main → dev; release branch → staging; semver tag → prod)"

[[sources]]
url = "https://devblogs.microsoft.com/devops/release-flow-how-we-do-branching-on-the-vsts-team/"
title = "Microsoft — Release Flow: How We Do Branching on the VSTS Team"

[decision]
question = "How do changes map to deploy environments?"
default = "git-ref-environment-immutable-prod-tags"
why = "Direct mapping reduces human error; immutable tags make a release always resolve to the same SHA (auditability/rollback). Selecting the deploy environment manually at deploy time reintroduces the human-error surface the ref-to-env mapping is designed to remove, since the same SHA can be deployed to the wrong environment by a slip. A trunk-based model with everything gated by feature flags is a legitimate alternative strategy but moves the safety surface entirely into the flag layer, where any flag-system outage or misconfiguration becomes a release-control failure."

[[option]]
id = "git-ref-environment-immutable-prod-tags"
label = "git-ref → environment, immutable prod tags"
directive = "Map git refs to environments (push to main → dev; release branch → staging; semver tag → prod). Tags are immutable, never moved. Hotfixes branch from the broken tag."
why = "Direct ref-to-env mapping reduces human error, and immutable tags make a release always resolve to the same SHA for auditability and rollback."

[[option]]
id = "manual-environment-selection"
label = "manual environment selection"
directive = "deploys are triggered manually and the target environment is selected by the operator at deploy time, rather than derived from a git ref-to-environment mapping"
why = "Manual environment selection reintroduces the human-error surface the ref-to-env mapping is designed to remove: the same SHA can be deployed to the wrong environment by a slip."

[[option]]
id = "trunk-based-with-feature-flags"
label = "trunk-based with feature flags"
directive = "the project runs trunk-based with no release branches or per-environment ref mapping; environment-specific behavior is controlled entirely by feature flags at runtime"
why = "Trunk-based with flags moves the safety surface entirely into the flag layer; any flag-system outage or misconfiguration becomes a release-control failure."
