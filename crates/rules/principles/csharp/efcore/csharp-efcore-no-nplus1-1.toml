id = "CSHARP-EFCORE-NO-NPLUS1-1"
title = "Related data is loaded via Include/ThenInclude or projection; no lazy-loading and no N+1 loops"
tag = "stack"
domain = "csharp:efcore"
layer = "library"
enforcement = "structured"
default = true

verification = "grounded"
[decision]
question = "What position does the project take on: Related data is loaded via Include/ThenInclude or projection; no lazy-loading and no N+1 loops?"
default = "eager-load-or-project"
why = "The N+1 query problem is the most common EF Core performance failure: a query fetches N parent entities, then the code iterates over them and reads a navigation property on each, producing N additional SELECT statements. With lazy loading enabled (the default before EF Core 2.1, and available via the proxies package), this happens silently and invisibly: the first access to a navigation property issues a database round-trip, and a foreach over 100 entities produces 101 queries. With lazy loading disabled, the same access produces a null navigation property, which is a bug but a loud one. The correct approach is to load related data intentionally: Include/ThenInclude in the query for cases where the full entity graph is needed, or a Select projection for cases where only specific columns from related tables are needed. Projections are almost always preferable to Include for read paths because they select exactly the columns the caller needs rather than loading full entity graphs. The discipline is to decide the loading strategy at the query layer, in the repository, where the access pattern is known, rather than letting the caller's loop drive additional queries the repository never intended."

[[option]]
id = "eager-load-or-project"
label = "Include/ThenInclude or Select projection for related data; lazy-loading disabled"
directive = "Lazy loading is disabled (the UseLazyLoadingProxies call is absent and virtual navigation properties are not used as lazy-loading triggers). Related data required by a query is either explicitly included via Include(e => e.Related).ThenInclude(r => r.Nested) or projected via Select into a DTO that picks only the needed columns from both tables. Looping over a result set and accessing a navigation property on each entity without having included it in the query is forbidden. Repository methods document which navigation properties they load so callers do not re-query for data already fetched."
why = "Explicit Include or projection makes the loading strategy visible at the query site, eliminates unintended round-trips, and loads exactly the data required."

[[option]]
id = "lazy-loading-via-proxies"
label = "Lazy loading enabled via proxies; navigation properties loaded on first access"
directive = "UseLazyLoadingProxies() is registered in DbContext configuration. Navigation properties are virtual, and EF Core loads them on first access via proxy interception. No Include calls are required."
why = "Convenient for exploratory code and small datasets; produces silent N+1 queries for any loop over a result set that accesses navigation properties, and is invisible until load testing or query logging reveals the extra round-trips."

[[option]]
id = "explicit-load"
label = "Explicit loading via context.Entry(entity).Collection/Reference().Load()"
directive = "Related data is loaded on demand via context.Entry(entity).Collection(e => e.Items).LoadAsync() after the parent query, in code that explicitly decides when to load each relationship."
why = "More explicit than lazy loading but still issues per-entity round-trips when called in a loop. Appropriate for single-entity detail views that conditionally need related data; inappropriate as the general strategy for collection queries."


[[sources]]
url = "https://learn.microsoft.com/en-us/ef/core/performance/efficient-querying"
title = "Efficient Querying — EF Core | Microsoft Learn"
