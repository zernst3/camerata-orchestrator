id = "CSHARP-NO-HARDCODED-SECRETS-1"
title = "Secrets (connection strings, API keys, tokens) are never hardcoded in source; all secrets come from configuration or Key Vault"
tag = "stack"
domain = "csharp"
layer = "language"
enforcement = "mechanical"
default = true
qualifies = "Enforced by static analysis (gitleaks, Semgrep, Roslyn analyzers) scanning for hardcoded patterns (password=, secret=, api_key=, Bearer <token>) in source files. Conformance holds when the tool runs in CI and hardcoded secrets fail the build; it fails when no secret-scanning lint runs."

[decision]
question = "How are secrets (connection strings, API keys, credentials) provisioned to application code?"
default = "external-config"
why = "Hardcoding secrets in source code is the canonical path to credential compromise. Secrets are then embedded in compiled binaries, stored in version control history, logged in stack traces, and exposed to anyone with read access to the repository or deployed artifact. Once leaked, secrets are nearly impossible to rotate across all copies in the wild. The solution is to source all secrets from external configuration at runtime: environment variables (for .NET Core), Azure Key Vault (Azure-hosted apps), AWS Secrets Manager, or a secrets management service. Secrets are provisioned to the process at deployment time and never appear in source code or binaries. Even .gitignore is insufficient because it does not prevent accidental commits, and history cannot be retroactively sanitized on a public repository."

[[option]]
id = "external-config"
label = "load all secrets from environment variables or Key Vault at runtime"
directive = "Connection strings, API keys, tokens, and passwords are never written in source code or checked into version control. Secrets are loaded at runtime from: (1) environment variables in development and testing; (2) Azure Key Vault (or AWS Secrets Manager) in production. Configuration is injected via IConfiguration in ASP.NET Core. Appsettings.json contains placeholder values only (e.g., `\"ConnectionString\": \"<keyvault-reference>\"`) and is gitignored if it contains real values. Secrets are rotated by updating the external store without code changes."
why = "The adopted default. Externalizing secrets removes them from version control and binaries, making rotation possible and limiting blast radius."

[[option]]
id = "hardcoded-in-comments"
label = "hardcode example secrets only in comments or config templates"
directive = "Real secrets are never hardcoded, but example or dummy secrets (e.g., `password123` or `FAKE_API_KEY_DO_NOT_USE`) are placed in comments or example config files for documentation."
why = "Still risky if a developer copies the example without thinking. Configuration templating with placeholders is safer."

[[option]]
id = "hardcoded-in-source"
label = "hardcode secrets directly in source code"
directive = "Secrets are written directly in source code as string literals or constants."
why = "Catastrophic compromise vector; secrets are immediately exposed in version control, compiled binaries, and any deployment."

verification = "grounded"

[[sources]]
url = "https://learn.microsoft.com/en-us/aspnet/core/security/app-secrets?view=aspnetcore-10.0&tabs=linux"
title = "Safe storage of app secrets in development in ASP.NET Core | Microsoft Learn"
