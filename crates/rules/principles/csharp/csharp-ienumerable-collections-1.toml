id = "CSHARP-IENUMERABLE-COLLECTIONS-1"
title = "Methods return IEnumerable<T> or ICollection<T> instead of arrays or List<T>; callers should not couple to concrete collection types"
tag = "stack"
domain = "csharp"
layer = "language"
enforcement = "prose"
default = true

verification = "grounded"
[decision]
question = "What types do public methods return when returning collections?"
default = "return-abstract-collections"
why = "Returning a concrete collection type (List<T>, T[], HashSet<T>) tightly couples callers to an implementation detail that is internal to the method. The caller might resize, modify, or iterate the returned collection in ways that break internal invariants. Example: if a method returns a List<T> that is actually the internal backing store, a caller could modify it and corrupt the data. Returning an interface hides the implementation, but the interfaces are not interchangeable and picking the wrong one reintroduces the same problem: ICollection<T> extends IEnumerable<T> and directly exposes Add, Remove, Clear, and Count, so it is a mutable-capable interface, not a read-only view; a method that hands back its internal List<T> typed as ICollection<T> still lets the caller mutate it, no cast required. When the intent is genuinely to expose a read-only view, IReadOnlyCollection<T> or IReadOnlyList<T> is the correct interface, not ICollection<T>. IEnumerable<T> has no Add/Remove/Count at all and is frequently lazy (deferred execution): a LINQ query or a generator method (yield return) returned as IEnumerable<T> does not run until enumerated, and enumerating it a second time can re-run the underlying query or side-effecting generator from scratch, which is surprising if the caller assumes it is a stable snapshot. Exposing IEnumerable<T> is not automatically free of pitfalls just because it looks read-only; a caller that enumerates it twice, or that expects O(1) Count or indexing, will hit a wall or re-execute the source unexpectedly. For query results, stored collections, or derived data, returning IEnumerable<T> (if lazy streaming semantics are actually intended) or IReadOnlyList<T> (for a realized, indexable read-only snapshot) is the safe default. Returning a concrete type is acceptable only when the concrete semantics (e.g., \"this is a Dictionary for fast lookups\") are part of the contract and callers are expected to exploit those semantics."

[[option]]
id = "return-abstract-collections"
label = "return IEnumerable<T>, ICollection<T>, or IReadOnlyList<T> from public methods"
directive = "Public methods that return collections use abstract types chosen for what the caller actually needs: IEnumerable<T> for lazy or streaming results (being mindful that a lazy IEnumerable<T> may re-run its source on each enumeration, so it is documented or materialized once if the caller needs a stable snapshot); IReadOnlyCollection<T> or IReadOnlyList<T> for a read-only, already-realized view with Count and, for the latter, indexed access; ICollection<T> or IList<T> only when the caller is genuinely meant to add, remove, or otherwise mutate the returned collection, since both interfaces expose Add/Remove/Clear directly. Callers of a read-only-typed return value cannot modify or invalidate internal state. Internal implementations may return any concrete type (List<T>, HashSet<T>, etc.); the caller sees only the interface."
why = "Abstract types hide implementation details and prevent accidental corruption of internal state, but only if the specific interface's mutability and evaluation semantics (mutable vs. read-only, eager vs. lazy) actually match what is being promised to the caller."

[[option]]
id = "return-list-array"
label = "return List<T> or T[] from public methods"
directive = "Public methods return concrete collection types like List<T> or arrays. Callers have full access to the collection's API."
why = "Tightly couples callers to an implementation detail; callers might accidentally modify the internal collection or bypass intended constraints."

[[option]]
id = "return-concrete-with-defensive-copy"
label = "return a new List<T> copy of the internal collection"
directive = "Public methods return a new List<T> or array copy of the internal collection, protecting the original from modification."
why = "Safe but inefficient; every call allocates a new collection. Acceptable for small collections or when safety outweighs performance; use IEnumerable<T> for better efficiency and the same safety guarantee."


[[sources]]
url = "https://learn.microsoft.com/en-us/dotnet/standard/design-guidelines/guidelines-for-collections"
title = "Guidelines for Collections — Framework Design Guidelines | Microsoft Learn"
