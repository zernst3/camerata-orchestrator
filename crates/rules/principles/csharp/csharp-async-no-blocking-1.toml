id = "CSHARP-ASYNC-NO-BLOCKING-1"
title = "Async code never blocks via .Result or .Wait(); all async/await chains are end-to-end"
tag = "stack"
domain = "csharp:aspnet"
layer = "language"
enforcement = "mechanical"
default = true
qualifies = "Enforced by Roslyn analyzers (AsyncFixer, AsyncFixer.Analyzers) that flag .Result, .Wait(), and sync-over-async patterns in async contexts. Conformance holds when the rule runs in CI and blocking calls fail the build."

[decision]
question = "How are async Tasks and Tasks<T> awaited?"
default = "async-await-throughout"
why = "Calling .Result or .Wait() on a Task blocks the current thread, which in a thread-pool-backed web server (ASP.NET) or UI framework exhausts available threads and causes deadlocks. The thread is unable to process other work, starving the pool. If the awaited task tries to resume on the same thread (common with ConfigureAwait behavior), a circular wait ensues and the server becomes unresponsive. The solution is to use async/await throughout the call stack so that threads are never blocked; the async infrastructure yields the thread back to the pool while waiting, freeing it to handle other work. In ASP.NET, all request handlers, services, and repository methods must be async; in console apps, Main() is async and awaited. Blocking only occurs at the absolute top level when necessary."

[[option]]
id = "async-await-throughout"
label = "use async/await in the entire call chain; never block"
directive = "All methods that perform I/O (database, network, file system) are declared async Task or async Task<T>. All calls to async methods are awaited. At the top of the call stack (e.g., ASP.NET controller action, Main in a console app, or Quartz job), the entry point is async. .Result and .Wait() are forbidden. If a sync wrapper is absolutely necessary at the application boundary, it is isolated to a single well-documented entry point and comments explain why the boundary cannot be async."
why = "Async/await chains never block threads, allowing the thread pool to handle many concurrent requests efficiently."

[[option]]
id = "sync-over-async"
label = "wrap async calls with .Result or .Wait() in sync methods"
directive = "Async methods are called and then blocked with .Result or .Wait(), allowing sync wrappers to expose an async implementation. Sync methods call .Result without ConfigureAwait(false)."
why = "Common but dangerous anti-pattern. Blocking exhausts thread pool, causes deadlocks, and eliminates the scalability benefits of async. Only acceptable as a last resort at a true application boundary with strong documentation."

[[option]]
id = "async-void-handlers"
label = "use async void for fire-and-forget event handlers"
directive = "Fire-and-forget operations (e.g., background tasks, event handlers without return values) are declared async void and invoked without await."
why = "Removes the ability to wait for completion or catch exceptions; exceptions thrown in async void handlers crash the process or are silently lost. Use async Task with fire-and-forget (Task.Run or background job queue) instead."

verification = "grounded"

[[sources]]
url = "https://learn.microsoft.com/en-us/aspnet/core/fundamentals/best-practices?view=aspnetcore-10.0"
title = "ASP.NET Core Best Practices — Avoid blocking calls"

