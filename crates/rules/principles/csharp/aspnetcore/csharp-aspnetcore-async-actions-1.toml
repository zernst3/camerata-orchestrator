id = "CSHARP-ASPNETCORE-ASYNC-ACTIONS-1"
title = "All I/O-bound controller actions and endpoint handlers are async; no sync-over-async blocking"
tag = "stack"
domain = "csharp:aspnetcore"
layer = "framework"
enforcement = "mechanical"
default = true
qualifies = "Enforced by Roslyn analyzers (AsyncFixer, Microsoft.VisualStudio.Threading.Analyzers) that flag synchronous action methods whose bodies call async code via .Result or .Wait(). Conformance holds when all actions that perform I/O are declared async Task<IActionResult> (or async Task<T> for Minimal API handlers) and no .Result or .Wait() appears on a Task inside the request pipeline."

verification = "grounded"
[decision]
question = "How are I/O-bound operations performed inside ASP.NET Core action methods and endpoint handlers?"
default = "async-task-actions"
why = "ASP.NET Core is built on a thread-pool model. Each concurrent request consumes one thread-pool thread while its handler runs synchronously. When an action performs I/O (database, HTTP, file) synchronously, that thread blocks for the entire duration of the I/O, waiting for the result. Under load, blocking threads exhaust the pool faster than I/O completes, and new requests queue waiting for a thread. The classical symptom is a server that handles low concurrency fine and collapses under moderate load with no CPU pressure and a saturated thread pool. Async actions return the thread to the pool during the I/O wait and reclaim a thread only when the result is ready, decoupling concurrency from thread count. Unlike classic ASP.NET (.NET Framework), ASP.NET Core has no SynchronizationContext, so sync-over-async (.Result, .Wait()) does not carry the classic single-thread deadlock risk of the Framework era; the Core-specific failure mode is purely thread-pool starvation — every blocked thread is one fewer thread available to serve other requests, so under load the pool exhausts faster than I/O completes and the server appears to hang even though no individual call has deadlocked. Making all I/O-bound actions async Task is therefore a throughput decision, not a correctness workaround for a synchronization-context deadlock that does not exist in ASP.NET Core."

[[option]]
id = "async-task-actions"
label = "All I/O-bound actions are async Task<IActionResult> or async Task<T>; await at every I/O call"
directive = "Every controller action or Minimal API endpoint handler that performs I/O (database access, HTTP calls, file I/O) is declared async Task<IActionResult> (MVC) or async Task<T> (Minimal API). All awaitable calls inside the handler are awaited. ConfigureAwait(false) is used on library-internal async calls to avoid unnecessary context capture. .Result, .Wait(), and GetAwaiter().GetResult() on Tasks are forbidden inside action methods and endpoint handlers. CPU-bound work that does not involve I/O may use synchronous implementations; I/O-bound work may not."
why = "Async actions release the thread-pool thread during I/O wait, allowing the server to handle many concurrent requests with a bounded thread count, and avoid the deadlock risk of sync-over-async in ASP.NET's synchronization context."

[[option]]
id = "sync-actions-blocking"
label = "Synchronous actions that call async code via .Result or .Wait()"
directive = "Actions are declared void or T (not Task) and call async service methods synchronously via .Result or .GetAwaiter().GetResult(). The calling thread blocks until the I/O completes."
why = "Exhausts thread-pool threads under load, degrading throughput. In ASP.NET Core specifically there is no captured synchronization context to deadlock on (that was the classic ASP.NET Framework failure mode); the Core-specific cost is purely starving the thread pool of threads needed to serve other concurrent requests."

[[option]]
id = "sync-actions-no-async-dependencies"
label = "Synchronous actions that call only synchronous service methods"
directive = "Actions are declared synchronously and service methods they call are also synchronous; async is introduced only at the data-access layer and wrapped synchronously before crossing the service boundary."
why = "Avoids async complexity at the cost of blocking threads for every I/O call; scales poorly beyond low concurrency. Acceptable for truly CPU-only endpoints with no I/O dependency."

[[option]]
id = "async-void-handlers"
label = "Fire-and-forget work is dispatched via async void methods"
directive = "Fire-and-forget operations reachable from an action (background notifications, best-effort side effects) are implemented as async void methods invoked without await, instead of async Task dispatched through a tracked background-work mechanism (a hosted service queue, Task.Run with logging, or a library like TaskTracker)."
why = "async void removes the caller's ability to await completion or observe exceptions: an exception thrown inside an async void method is raised on the SynchronizationContext that was active when the async void method started, which in ASP.NET Core has no meaningful handler and can crash the process instead of being caught by the caller. Prefer async Task with an explicitly tracked fire-and-forget mechanism."

[[sources]]
url = "https://learn.microsoft.com/en-us/aspnet/core/fundamentals/best-practices?view=aspnetcore-10.0"
title = "ASP.NET Core Best Practices — Avoid blocking calls | Microsoft Learn"

