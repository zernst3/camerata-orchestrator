id = "CSHARP-ASPNETCORE-MINIMAL-API-VS-CONTROLLERS-1"
title = "ASP.NET Core routing style: Minimal APIs or MVC controllers"
tag = "stack"
domain = "csharp:aspnetcore"
layer = "framework"
enforcement = "structured"
default = false

verification = "grounded"
[decision]
question = "What routing style does the project adopt for HTTP endpoints: Minimal APIs (MapGet/MapPost lambda endpoints) or MVC controllers (classes inheriting ControllerBase with attribute routing)?"
why = "ASP.NET Core supports two first-class routing styles, and the right one follows from the kind of service being built and the investment the project already has, not from a presumed winner. Minimal APIs register endpoints as MapGet/MapPost lambdas in Program.cs (or in IEndpointRouteBuilder extension methods): less framework ceremony, a lower per-endpoint overhead, and the direction modern ASP.NET Core tooling is built around, which makes them the natural fit for new services and small focused APIs. MVC controllers organize endpoints into ControllerBase classes with attribute routing, and bring richer filter and model-binding conventions out of the box (controller-scoped filters, action results, model-state handling), which makes them the natural fit for projects with deep existing investment in those conventions or a large established controller surface. Whichever style is chosen, the one cost worth avoiding is mixing both arbitrarily within a project, since that maintains two programming models for identical work. Choose by the service's shape and the codebase's existing investment, and apply the chosen style consistently."

[[option]]
id = "minimal-apis-throughout"
label = "Minimal APIs throughout the project; no MVC controllers"
directive = "All HTTP endpoints are registered via MapGet, MapPost, MapPut, MapDelete (and MapGroup for prefix grouping) in Program.cs or in IEndpointRouteBuilder extension methods. No ControllerBase subclasses are introduced. Endpoint handlers delegate to service-layer methods; business logic does not live inline in the lambda. Validation occurs via the filter pipeline (AddEndpointFilter) or via a service-layer contract, not scattered per-handler."
why = "Produces the least framework ceremony per endpoint, aligns with the direction modern ASP.NET Core tooling is built around, and keeps each endpoint trivially testable in isolation. The strongest fit for new services and small focused APIs; it offers fewer built-in conventions than controllers, so projects that lean heavily on controller-scoped filters or action-result machinery wire those concerns up themselves."

[[option]]
id = "mvc-controllers-throughout"
label = "MVC controllers throughout; no Minimal API registrations"
directive = "All HTTP endpoints live in classes that inherit ControllerBase (or Controller for MVC views), decorated with [ApiController] and [Route] attributes. No MapGet/MapPost/etc. registrations appear. The [ApiController] attribute is applied on all controllers to enable automatic model-state 400 responses."
why = "Brings richer filter, model-binding, and action-result conventions out of the box (controller-scoped filters, automatic model-state 400s via [ApiController]), which a large endpoint surface benefits from. The natural fit for projects with deep existing investment in those conventions or an established controller codebase; the trade-off is more framework ceremony per endpoint than Minimal APIs."

[[option]]
id = "mixed-minimal-and-controller"
label = "Both Minimal APIs and MVC controllers coexist in the same project"
directive = "Some endpoints are registered via Map* and others live in ControllerBase classes; the mix is determined per-endpoint by what is convenient at the time of authoring."
why = "Allowing both styles lets each developer or team use whichever model they prefer and avoids a forced migration when the project was started with one style and a new endpoint naturally fits the other. The cost is that two separate programming models now coexist for identical work: filter wiring, validation hooks, response-shaping conventions, and endpoint discovery differ between the models, and every new developer must learn both and track which applies to any given endpoint, doubling the mental model surface with no gain in capability."


[[sources]]
url = "https://learn.microsoft.com/en-us/aspnet/core/fundamentals/apis?view=aspnetcore-9.0"
title = "Choose between controller-based APIs and minimal APIs | Microsoft Learn"
