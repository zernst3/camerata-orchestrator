id = "RUST-DOMAIN-7"
title = "Explicit UnitOfWork parameter on transactional repository methods"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Explicit UnitOfWork parameter on transactional repository methods?"
default = "explicit-unitofwork-parameter-on-transactional-r"
why = """
Compile-time visibility of transactional posture at every call site. A call to save(item, None) is textually different from save(item, Some(uow)): code review, refactoring tools, and grep all catch a method silently dropping out of a transaction. The closure-based ambient-context alternative (task-local storage) is cleaner in TS or Node but in Rust runs into ownership friction (the database transaction is owned, not Clone) and produces silent partial-commit failures when a service forgets to wrap its body. Loud failures (compile error, visible None, downcast panic) beat silent failures (half-updated database rows with no error). Matches the explicit-tx convention every major Rust ORM (sqlx, diesel-async, SeaORM, tokio-postgres) has converged on; future maintainers recognize the shape immediately. Making the repository generic over Tx is bureaucratically compile-time correct but forces every consumer to carry Tx through the type graph, and the ceremony compounds badly across service composition. Letting the ORM type leak into the domain trait violates the hexagonal-architecture commitment that domain has zero framework deps; it can feel tempting in TS where import-type is free, but it is structurally wrong in Rust because the domain crate then transitively depends on the ORM.
"""

[[option]]
id = "explicit-unitofwork-parameter-on-transactional-r"
label = "Explicit UnitOfWork parameter on transactional repository methods"
directive = """
Repository write methods that may participate in a multi-write transaction take an explicit Option of UnitOfWork (a marker trait defined in the domain crate so the trait surface carries no concrete ORM or database type). Infrastructure implements UnitOfWork on its concrete transaction wrapper and downcasts internally via Any to access the underlying ORM transaction. Services wrap multi-write operations in a closure run on the unit of work and pass Some(uow) to each participating repo call.
"""
why = "The adopted default. Compile-time visibility of transactional posture at every call site."

[[option]]
id = "repository-write-methods-take-a-generic-tx-param"
label = "Repository write methods take a generic Tx parameter, and …"
directive = "Repository write methods take a generic Tx parameter, and every consumer of the repository must carry that generic through its type graph"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "transactional-context-is-provided-as-a-closure-b"
label = "Transactional context is provided as a closure-based ambient via …"
directive = "Transactional context is provided as a closure-based ambient via task-local storage, so the repository trait carries no transaction parameter and the transaction is read from task-local state at call time"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "repository-write-methods-take-a-parameter-typed"
label = "Repository write methods take a parameter typed as the …"
directive = "Repository write methods take a parameter typed as the concrete ORM transaction type directly, with the ORM type appearing in the domain trait surface"
why = "A defensible alternative the project considered and did not adopt as the default."
