id = "RUST-HEADLESS-CORE-1"
title = "UI logic and state live in a framework-agnostic core; the rendering framework is a thin adapter (applications, not just libraries)"
tag = "stack"
domain = "rust"
layer = "library"
enforcement = "structured"
default = false

[decision]
question = "How is a UI's logic and state structured with respect to its rendering framework — a framework-agnostic core plus a thin per-framework adapter, a single-framework build, or a full reimplementation per framework — for BOTH a reusable component/UI library AND a first-party application UI?"
why = "A UI's logic (its state, its computations, its interaction rules) is independent of any rendering framework, while the rendering itself is framework-specific. This holds whether or not the code is shipped to others: keeping the renderer out of the logic/state layer makes that layer unit-testable in isolation (no virtual DOM, no component runtime) and reusable across adapters. A headless core plus a thin adapter puts all logic, state, and computation in a renderer-free crate and wires it to the framework through a small adapter, so the hard logic is written and tested once; it is the natural fit when a UI must serve more than one framework, when a second is a real later expectation, OR simply to keep an application's logic testable without its renderer. A single-framework build interleaves logic and rendering in one crate — the simplest shape when only one framework is ever in scope, at the cost that separating them later is after-the-fact work. A full reimplementation per framework keeps each version self-contained and idiomatic, worth it only when the frameworks differ enough that a shared core would be an awkward lowest common denominator, at the cost that every fix is written more than once and the copies drift. This rule governs STRUCTURE (logic/state separated from the renderer); its complement RUST-PURE-STATE-TRANSITIONS-1 governs the FORM of the core's state changes. The two are a matched pair, not duplicates."

[[option]]
id = "headless-core-plus-adapters"
label = "framework-agnostic core crate plus thin per-framework adapter crate(s)"
directive = "A UI's logic, state, and computation live in a framework-agnostic core that carries NO dependency on any rendering framework, with the rendering framework confined to a thin adapter that wires the core's state and behavior to that framework's primitives. This applies to BOTH a reusable component/UI library AND a first-party application UI. The enforceable form is a separate core crate, which the compiler then guarantees stays renderer-free: a reusable library MUST use separate core plus per-framework adapter crates, and an application SHOULD too (a strict, dependency-enforced internal module boundary is the weaker minimum, since nothing stops a plain module from importing the renderer). Framework-specific code lives only in the adapter. Pairs with RUST-PURE-STATE-TRANSITIONS-1, which constrains the form of the core's transitions."
why = "The adopted default. Keeping logic in a renderer-free core lets it be written and tested once (no virtual DOM) and reused by every adapter, with framework-specific code confined to the thin adapter. Applies to applications too, not just shipped libraries: the point is a testable, renderer-independent logic/state layer. The cost is the core/adapter boundary, which is real work to design and uphold."

[[option]]
id = "single-framework-build"
label = "build the whole library against one framework"
directive = "The library is built directly against a single rendering framework, with logic and rendering in the same crate."
why = "The simplest, most direct structure: with only one framework in scope there is no core/adapter boundary to design or maintain, and the code can use that framework's primitives freely. The right fit when the library targets exactly one framework and that is not expected to change; its trade-off is that supporting a second framework later means first disentangling the logic from the rendering."

[[option]]
id = "duplicate-per-framework"
label = "reimplement the library per framework"
directive = "Each supported framework gets its own complete implementation of the library, with the logic implemented independently in each."
why = "Keeps each implementation fully self-contained and idiomatic to its framework, with no shared abstraction to constrain it. Worth considering when the target frameworks differ enough that a shared core would be an awkward lowest common denominator; the trade-off it accepts is that every fix and feature is written in each implementation and the copies tend to drift over time."
