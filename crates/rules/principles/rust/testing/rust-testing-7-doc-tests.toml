id = "RUST-TESTING-7"
title = "Public API items have doc-tests in their /// comments that serve as runnable usage examples"
tag = "stack"
domain = "rust:testing"
layer = "language"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://doc.rust-lang.org/rust-by-example/testing/doc_testing.html"
title = "Rust By Example — Doc Testing (triple-backtick code blocks in /// comments are compiled and run by cargo test)"

[[sources]]
url = "https://doc.rust-lang.org/book/ch14-02-publishing-to-crates-io.html#making-useful-documentation-comments"
title = "The Rust Book — Ch 14.2: Documentation Comments (/// with code examples; cargo test runs them)"

[[sources]]
url = "https://doc.rust-lang.org/rustdoc/write-documentation/documentation-tests.html"
title = "The Rustdoc Book — Documentation Tests (attributes: should_panic, no_run, compile_fail, ignore)"

[decision]
question = "What position does the project take on: are doc-tests required for public API items?"
default = "doc-tests-on-public-api-items"
why = "Rust's toolchain compiles and runs code blocks in /// documentation comments as first-class tests during cargo test. A doc-test that is wrong (wrong return type, stale method name, impossible example) fails the build — meaning documentation comments that contain code are always kept in sync with the implementation. This property is unique to doc-tests: a prose comment becomes stale silently, but a doc-test comment fails the build when the code it documents changes incompatibly. The Rust Book (Ch 14.2) and Rust By Example (Doc Testing) treat this as the canonical way to write examples for public API items. Doc-tests are not appropriate for private items (they cannot access them) or for complex multi-step scenarios better suited to an examples/ or tests/ file. A doc-test should show the simplest useful invocation of the item; it is documentation first and a regression test second. Lines prefixed with # are compiled but not rendered in rustdoc output, which allows boilerplate setup/teardown to be hidden without losing the executable guarantee."

[[option]]
id = "doc-tests-on-public-api-items"
label = "/// comments on pub items include a ```rust code block that cargo test compiles and runs"
directive = "Every pub function, pub method, pub struct, and pub trait in a library crate carries a /// documentation comment. When the item has a non-trivial usage pattern, the comment includes at least one ``` code block (Rust is the default language; no explicit 'rust' tag needed) demonstrating the typical call. The code block must compile and run to success as part of cargo test. Lines that must be present for compilation but are noise for the reader are prefixed with # to hide them in rendered docs. Doc-tests that are expected to panic use the ```rust,should_panic annotation. Examples that must not run (e.g., they have side effects or require a running service) use ```rust,no_run. Private items and internal helpers do not require doc-tests."
why = "Doc-tests are a first-class Rust feature that keep documentation examples synchronized with the API they document, enforced by the build."

[[option]]
id = "examples-dir-only-no-doc-tests"
label = "Usage examples live in examples/ only; doc-tests are optional"
directive = "Usage examples for public API items live in the examples/ directory as standalone runnable programs, not in /// comment code blocks. Doc-tests in comments are optional and not enforced."
why = "examples/ programs are richer and can express multi-step workflows, but they do not enforce that the documentation comment stays in sync with the API: prose /// comments can become stale silently after a signature change, because there is no build-time check that the comment's example is still correct the way a doc-test code block is."

[[option]]
id = "no-examples-prose-doc-only"
label = "Documentation comments are prose only; no code examples required"
directive = "Public API items are documented with prose /// comments. No code examples are required in either documentation comments or the examples/ directory."
why = "Minimal investment but leaves consumers with no executable demonstration of usage and loses the build-time sync guarantee entirely: when the implementation changes, prose-only documentation can silently describe an API that no longer exists, and consumers discover the mismatch only when they try to use the code."
