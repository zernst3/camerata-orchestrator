id = "RUST-TESTING-6"
title = "Tests are deterministic: no global mutable state, no wall-clock time, no random without a fixed seed"
tag = "stack"
domain = "rust:testing"
layer = "language"
enforcement = "prose"
default = true
verification = "grounded"

[[sources]]
url = "https://doc.rust-lang.org/book/ch11-02-running-tests.html"
title = "The Rust Book — Ch 11.2: Controlling How Tests Are Run (parallel execution requires independent tests, --test-threads for shared-state cases)"

[[sources]]
url = "https://nexte.st/book/how-it-works.html"
title = "cargo-nextest — How It Works (process-per-test isolation eliminates cross-test state corruption)"

[[sources]]
url = "https://nexte.st/book/retries.html"
title = "cargo-nextest — Retries and Flaky Tests (a retried success is marked flaky)"

[decision]
question = "What position does the project take on: what are the isolation requirements for Rust tests?"
default = "deterministic-no-global-state-no-wall-clock-no-unseeded-random"
why = "Cargo runs tests in parallel across threads by default (cargo test) and across processes (cargo-nextest). A test that reads or writes global mutable state (a static Mutex, an environment variable, a shared temp file) will produce different results depending on which other tests happen to run concurrently — the definition of a flaky test. The Rust Book (Ch 11.2) explicitly warns that tests sharing state must be run with --test-threads=1 and treats independence as the default requirement for parallel safety. Wall-clock time (SystemTime::now(), chrono::Utc::now()) in test assertions produces different values on every run; the correct pattern is to inject a clock as a trait and provide a fixed fake clock in tests. Uncontrolled random (rand::random(), OsRng) produces different values on every run; the correct pattern is to accept a seed or an Rng impl in the function under test. Environment-variable mutation (std::env::set_var) is globally visible to all threads in the process and is one of the most common sources of flaky parallel tests. cargo-nextest's per-process isolation catches many of these bugs by giving each test its own clean process — the presence of a test that only passes when isolated is evidence that it was reading or corrupting shared state."

[[option]]
id = "deterministic-no-global-state-no-wall-clock-no-unseeded-random"
label = "Deterministic isolation: no global mutable state, inject clocks and RNG, no env mutation"
directive = "Every #[test] function must produce the same result regardless of test ordering, concurrency level, or how many times it is run. Concretely: (1) Do not read or write any static mutable variable (static Mutex, OnceLock with side effects, etc.) unless the test initializes and tears it down atomically. (2) Do not call std::env::set_var; if an env var is required, read it with std::env::var in the function under test and inject the value in tests. (3) Do not assert against SystemTime::now() or any wall-clock value; inject a clock trait. (4) Do not call rand::random() in the function under test without an injectable Rng parameter; pass a seeded SmallRng or StdRng in tests. (5) Do not write to a fixed file path; use tempfile::tempdir() for any temporary file system fixtures. A test that passes only when run in isolation but fails in the default parallel run is a flaky test and must be fixed, not annotated with #[ignore]."
why = "Parallel-by-default (cargo test) and process-per-test (cargo-nextest) execution models both require test independence. Flaky tests erode confidence in the test suite faster than no tests at all."

[[option]]
id = "sequential-tests-with-global-state"
label = "Allow global state; run tests sequentially (--test-threads=1)"
directive = "Tests may share global mutable state; the test suite is run with --test-threads=1 to prevent concurrency issues."
why = "Correct in that it prevents concurrent failures, but slow: the entire test suite runs sequentially so wall time scales linearly with test count; a future contributor running cargo test without the flag will see non-deterministic failures with no obvious cause, and the workaround's presence anywhere in CI makes the suite permanently slower than it needs to be."

[[option]]
id = "per-test-cleanup-with-mutex"
label = "Serialize access to shared state via a test Mutex"
directive = "Tests that must share global mutable state serialize access via a shared Mutex in the test module, acquiring the lock at the start of each test and releasing on drop."
why = "Safer than --test-threads=1 for concurrent tests because other tests can still run in parallel, but still couples the test to a shared resource: the lock must be acquired and released correctly in every test that touches the state, and the coupling does not compose with process-per-test runners like cargo-nextest where each test gets its own process and the in-process Mutex provides no isolation."
