id = "RUST-TESTING-3"
title = "Test functions use snake_case names that read as sentences describing the scenario"
tag = "stack"
domain = "rust:testing"
layer = "language"
enforcement = "mechanical"
default = true
verification = "grounded"
qualifies = "Mechanical via the non_snake_case lint (deny-by-default for all Rust function names, including #[test] functions). Beyond the mechanical name-case gate, the scenario-description convention is prose-enforced at review: names like 'test_add' are acceptable but 'add_returns_sum_of_two_positive_numbers' is preferred because it makes test-failure output self-documenting. The clippy::tests_outside_test_module lint (restriction category) catches #[test] functions outside a #[cfg(test)] block — opt-in per repo."

[[sources]]
url = "https://doc.rust-lang.org/book/ch11-01-writing-tests.html"
title = "The Rust Book — Ch 11.1: Writing Tests (test function naming examples)"
linter = "rustc: non_snake_case (deny by default)"

[[sources]]
url = "https://rust-lang.github.io/api-guidelines/naming.html"
title = "Rust API Guidelines — C-CASE: Casing conforms to RFC 430 (snake_case for functions)"
linter = "rustc: non_snake_case"

[[sources]]
url = "https://rust-lang.github.io/rust-clippy/master/index.html#tests_outside_test_module"
title = "Clippy Lints — clippy::tests_outside_test_module (restriction)"
linter = "clippy: tests_outside_test_module"

[decision]
question = "What position does the project take on: how are Rust test functions named?"
default = "snake-case-scenario-description"
why = "Rust enforces snake_case for function names via the built-in non_snake_case lint (deny by default), so camelCase or PascalCase test names fail the compiler without a local #[allow]. The Rust Book (Ch 11.1) and API Guidelines (C-CASE / RFC 430) both treat snake_case as the universal function naming convention, which applies equally to test functions. Within the snake_case constraint, scenario-describing names (e.g., 'returns_zero_for_empty_input', 'panics_when_divisor_is_zero') are strongly preferred over generic ones (e.g., 'test1', 'test_add') because cargo test output uses the test function name as the sole identification label — a name that reads as a sentence makes a failing test self-documenting without needing to open the file. The 'it_' and 'should_' prefixes popular in BDD-style frameworks are used by some Rust teams but are not canonically endorsed by The Rust Book; they are acceptable but not the adopted default here."

[[option]]
id = "snake-case-scenario-description"
label = "snake_case names that describe the scenario and expected outcome"
directive = "Test function names use snake_case (enforced by rustc non_snake_case lint) and describe the scenario under test and the expected outcome, e.g., 'returns_none_when_key_absent', 'panics_on_empty_input', 'applies_discount_for_member_users'. Generic prefixes like 'test_' are allowed but the scenario suffix must still be meaningful. Module-level grouping (e.g., a nested mod for a specific function or struct) may shorten individual test names by providing shared context."
why = "snake_case is mechanically enforced by the compiler; scenario-description names make cargo test failure output self-documenting."

[[option]]
id = "test-prefix-then-function-name"
label = "test_<function_name> pattern only"
directive = "Test functions are named by prepending 'test_' to the function under test (e.g., 'test_add', 'test_greet'). No additional scenario description is required."
why = "A defensible alternative the project considered. Acceptable but produces uninformative failure output when a function has multiple test cases."

[[option]]
id = "bdd-style-it-should-prefix"
label = "BDD-style 'it_' or 'should_' prefix"
directive = "Test functions are named with an 'it_' or 'should_' prefix in BDD style, e.g., 'it_returns_zero_for_empty_input', 'should_panic_when_key_absent'."
why = "A defensible alternative the project considered. Readable but not endorsed by The Rust Book; adds a prefix convention that is redundant in a test module where every function is already known to be a test."
