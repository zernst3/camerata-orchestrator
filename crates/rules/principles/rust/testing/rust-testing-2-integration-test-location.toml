id = "RUST-TESTING-2"
title = "Integration tests live in a top-level tests/ directory; each file is a separate crate"
tag = "stack"
domain = "rust:testing"
layer = "language"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://doc.rust-lang.org/book/ch11-03-test-organization.html"
title = "The Rust Book — Ch 11.3: Test Organization (Integration Tests)"

[[sources]]
url = "https://doc.rust-lang.org/rust-by-example/testing/integration_testing.html"
title = "Rust By Example — Integration Testing"

[decision]
question = "What position does the project take on: where do integration tests live in a Rust project?"
default = "tests-dir-each-file-separate-crate"
why = "The Rust Book (Ch 11.3) and Rust By Example establish the tests/ directory (sibling to src/) as the canonical location for integration tests in Rust. Cargo treats each .rs file in tests/ as a separate crate compiled against the public API of the library — this external-crate perspective is the defining characteristic of an integration test in Rust. Shared helper code must use the old-style tests/common/mod.rs path (not tests/common.rs) because Cargo treats any .rs file in tests/ as a test binary and would attempt to run it; common/mod.rs is recognized as a submodule rather than a test binary. Integration tests do not require #[cfg(test)] because Cargo only compiles them during cargo test. Binary crates (src/main.rs only, no src/lib.rs) cannot have integration tests under this convention — core logic must live in a library crate."

[[option]]
id = "tests-dir-each-file-separate-crate"
label = "tests/ top-level directory; each .rs file is a separate test crate"
directive = "Integration tests live in a tests/ directory at the crate root (sibling to src/). Each .rs file in tests/ is compiled by Cargo as a separate crate and may only access the library's public API. Shared test utilities live in tests/common/mod.rs (not tests/common.rs) to prevent Cargo from treating them as a test binary. No #[cfg(test)] is needed in tests/ files. Core logic that must be integration-tested lives in src/lib.rs, not src/main.rs only."
why = "Endorsed by The Rust Book (Ch 11.3) and Rust By Example as the canonical Rust idiom. Each file is an independent external crate, enforcing public-API-only access."

[[option]]
id = "integration-tests-in-cfg-test-mod"
label = "Integration tests in an inline #[cfg(test)] mod in lib.rs"
directive = "Integration tests are placed in a #[cfg(test)] module inside src/lib.rs rather than in a separate tests/ directory."
why = "A defensible alternative the project considered. Loses external-crate perspective and blurs the unit/integration distinction."

[[option]]
id = "integration-tests-in-separate-crate"
label = "Integration tests in a dedicated crate in the workspace"
directive = "Integration tests live in a dedicated workspace member crate (e.g., crates/my-lib-tests) rather than in the conventional tests/ directory."
why = "A defensible alternative the project considered. Valid for very large projects needing fine-grained dependency control; overkill at small/medium scale and diverges from cargo's built-in tests/ convention."
