id = "RUST-DOMAIN-4"
title = "Errors via thiserror enums per crate"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://rust-lang.github.io/api-guidelines/interoperability.html"
title = "Rust API Guidelines — C-GOOD-ERR: Error types are meaningful and well-behaved"

[[sources]]
url = "https://docs.rs/thiserror/latest/thiserror/"
title = "thiserror crate documentation — derive macro for std::error::Error"

[[sources]]
url = "https://doc.rust-lang.org/book/ch09-02-recoverable-errors-with-result.html"
title = "The Rust Book — Ch 9.2: Recoverable Errors with Result"

[decision]
question = "What position does the project take on: Errors via thiserror enums per crate?"
default = "errors-via-thiserror-enums-per-crate"
why = "Typed errors give callers compile-time knowledge of failure modes and keep each layer's failure vocabulary self-contained. A single global error enum couples every layer to the same vocabulary, removes boundary discipline, and pushes every layer's failure modes into a shared namespace where they accumulate forever. Using anyhow everywhere loses typed failure information at boundaries; callers cannot match on specific failure modes and the type system stops helping with error handling, which is exactly the guarantee thiserror-per-layer gives back. This rule establishes THAT each crate boundary exposes a typed thiserror enum; `rust-domain-6-shared-repository-error` addresses the separate, narrower question of HOW the variants within that enum are organized (by failure category vs. by module/aggregate) once this rule's default is in place."

[[option]]
id = "errors-via-thiserror-enums-per-crate"
label = "Errors via thiserror enums per crate"
directive = "Each layer's crate defines its own thiserror enum (DomainError, RepositoryError, ServiceError, …) with explicit From impls at boundaries. anyhow is reserved for application edges (binaries)."
why = "Typed errors give callers compile-time knowledge of failure modes and keep each layer's failure vocabulary self-contained."

[[option]]
id = "the-workspace-defines-a-single-global-error-enum"
label = "the workspace defines a single global error enum that …"
directive = "the workspace defines a single global error enum that every layer shares, rather than a layer-specific thiserror enum at each crate boundary"
why = "Couples every layer to the same vocabulary and removes boundary discipline: the single enum's variants accumulate indefinitely as every layer's failure modes get pushed into a shared namespace, and callers cannot tell at a glance which layer produced a given variant."

[[option]]
id = "every-layer-uses-anyhow-for-its-error-type-rathe"
label = "every layer uses anyhow for its error type, rather …"
directive = "every layer uses anyhow for its error type, rather than reserving anyhow for the application-edge binaries and using typed thiserror enums in libraries"
why = "Loses typed failure information at boundaries: callers cannot match on specific failure modes, the type system stops helping with error handling, and every error becomes a type-erased trace that requires string inspection rather than exhaustive match."
