id = "RUST-ENTITIES-13"
title = "Entities live in their own crate, separate from infrastructure"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Entities live in their own crate, separate from infrastructure?"
default = "entities-live-in-their-own-crate-separate-from-i"
why = "Without separation, the import graph cycles: infrastructure needs mappers, mappers need entities, and putting entities in infrastructure makes mappers depend on infrastructure, which cargo rejects. Placing entities inside the infrastructure crate and inlining or dropping mappers forms exactly that import cycle and violates the mapper layering the rule depends on. Moving repository implementations into the mapper crate is non-standard and conflates translation with adapter logic; the two have different lifecycles and different test surfaces, and the conflation makes both harder to evolve."

[[option]]
id = "entities-live-in-their-own-crate-separate-from-i"
label = "Entities live in their own crate, separate from infrastructure"
directive = "The entities crate holds entity definitions only: no DB pool, no driver, no repository implementations. Canonical layout: domain ← mappers ← infrastructure ← app_services ← server, with entities ← mappers and domain ← everything."
why = "The adopted default. Without separation, the import graph cycles: infrastructure needs mappers, mappers need entities, and putting entities in infrastructure makes mappers depend on infrastructure, which cargo rejects."

[[option]]
id = "the-entities-live-in-the-infrastructure-crate-al"
label = "the entities live in the infrastructure crate alongside the …"
directive = "the entities live in the infrastructure crate alongside the DB pool, driver, and repository implementations, with mappers inlined into infrastructure or dropped entirely"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "repository-implementations-live-in-the-mapper-cr"
label = "repository implementations live in the mapper crate alongside the …"
directive = "repository implementations live in the mapper crate alongside the translation logic, rather than in the infrastructure crate"
why = "A defensible alternative the project considered and did not adopt as the default."
