id = "RUST-ENTITIES-5"
title = "Empty ActiveModelBehavior unless a hook is genuinely needed"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Empty ActiveModelBehavior unless a hook is genuinely needed?"
default = "empty-activemodelbehavior-unless-a-hook-is-genui"
why = "The vast majority of entities need no hooks; stubbing concrete hook bodies in across the codebase adds noise without value, since reviewer attention is then spent on placeholder hooks that do not run. The empty impl block itself, however, is not optional: SeaORM's documentation explicitly directs entity authors not to delete the ActiveModelBehavior impl block even when it is empty, so the rule pairs the empty-by-default position with a never-delete clause on the block itself. The first alternative (stub bodies everywhere) trades the rule's silence for visual uniformity but spends reviewer attention on noise; the second alternative (delete the block when empty) contradicts the SeaORM guidance and removes part of the entity's required surface."

[[option]]
id = "empty-activemodelbehavior-unless-a-hook-is-genui"
label = "Empty ActiveModelBehavior unless a hook is genuinely needed"
directive = "Each entity includes the ActiveModelBehavior impl block on its ActiveModel, left empty by default. Hooks are added deliberately when an entity actually needs one. The empty impl block is never deleted, because SeaORM's official entity-format guidance requires its presence on every entity even when no hooks are defined."
why = "The adopted default. The vast majority of entities need no hooks; stubbing concrete hook bodies in across the codebase adds noise without value, since reviewer attention is then spent on placeholder hooks that do not run."

[[option]]
id = "every-entity-carries-stub-concrete-hook-bodies-o"
label = "every entity carries stub concrete hook bodies on its …"
directive = "every entity carries stub concrete hook bodies on its ActiveModelBehavior impl, regardless of whether the entity actually needs a hook"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "entities-without-hooks-omit-the-activemodelbehav"
label = "entities without hooks omit the ActiveModelBehavior impl block on …"
directive = "entities without hooks omit the ActiveModelBehavior impl block on their ActiveModel entirely instead of keeping an empty one"
why = "A defensible alternative the project considered and did not adopt as the default."
