id = "RUST-ENTITIES-6"
title = "Module-level doc comment citing the schema source"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Module-level doc comment citing the schema source?"
default = "module-level-doc-comment-citing-the-schema-sourc"
why = "Makes drift detection a one-click trace: from the entity to the schema authority that defines it. Omitting the citation from the entity file forces drift checks to be reverse-engineered each time, since reviewers cannot tell at a glance which migration or schema doc defines the columns they are reading. Citing the source in a separate docs/ file or wiki page drifts from the entity over time: updates to one almost never propagate to the other, and the docs page eventually contradicts the code. Relying on git history to trace the schema origin works for shallow histories but breaks down after a few migrations and stops working entirely after squash merges, rebases, or migration consolidations rewrite the history that the trace would have followed."

[[option]]
id = "module-level-doc-comment-citing-the-schema-sourc"
label = "Module-level doc comment citing the schema source"
directive = "Each entity file opens with a //! doc comment citing the source-of-truth schema location (e.g. the migration path or schema doc reference)."
why = "The adopted default. Makes drift detection a one-click trace: from the entity to the schema authority that defines it."

[[option]]
id = "entity-files-carry-no-citation-of-the-source-of"
label = "entity files carry no citation of the source-of-truth schema …"
directive = "entity files carry no citation of the source-of-truth schema location, and the authority that defines the columns must be reverse-engineered when needed"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-source-of-truth-schema-citation-lives-in-a-s"
label = "the source-of-truth schema citation lives in a separate docs/ …"
directive = "the source-of-truth schema citation lives in a separate docs/ file or wiki page that lists the authority for each entity, rather than inside the entity file itself"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-source-of-truth-schema-authority-is-traced-t"
label = "the source-of-truth schema authority is traced through git history …"
directive = "the source-of-truth schema authority is traced through git history rather than recorded as a citation inside the entity file"
why = "A defensible alternative the project considered and did not adopt as the default."
