id = "RUST-ENTITIES-2"
title = "No serde derives on the SeaORM Model (load-bearing)"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: No serde derives on the SeaORM Model (load-bearing)?"
default = "no-serde-derives-on-the-seaorm-model-load-bearin"
why = "The compiler then enforces the hexagonal boundary at compile time: code physically cannot JSON-encode a Model directly. Deriving serde on the Models removes that compile-time enforcement and lets code encode Models directly to JSON, which breaks the hexagonal boundary the rule is paying for. Allowing per-entity opt-in to serde derives moves the decision to the wrong level: whether a payload shape gets serialized is a per-endpoint DTO question, not a per-Model question, and the per-Model opt-in collapses those two decisions into one."

[[option]]
id = "no-serde-derives-on-the-seaorm-model-load-bearin"
label = "No serde derives on the SeaORM Model (load-bearing)"
directive = "Entity Models do not derive Serialize/Deserialize, which forces every API response through an explicit DTO plus mapper."
why = "The adopted default. The compiler then enforces the hexagonal boundary at compile time: code physically cannot JSON-encode a Model directly."

[[option]]
id = "the-seaorm-entity-models-derive-serialize-and-de"
label = "the SeaORM entity Models derive Serialize and Deserialize and …"
directive = "the SeaORM entity Models derive Serialize and Deserialize and can be JSON-encoded directly without going through an explicit DTO plus mapper"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "individual-entity-models-opt-in-to-deriving-seri"
label = "individual entity Models opt in to deriving Serialize and …"
directive = "individual entity Models opt in to deriving Serialize and Deserialize on a per-entity basis, while other entities remain non-serde"
why = "A defensible alternative the project considered and did not adopt as the default."
