id = "RUST-ENTITIES-7"
title = "Unique constraints the macro cannot express live at the DB level and are noted in the module doc"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
verification = "grounded"

[decision]
question = "What position does the project take on: Unique constraints the macro cannot express live at the DB level and are noted in the module doc?"
default = "unique-constraints-the-macro-cannot-express-live"
why = "A single-column unique annotation tells every reader, and every consumer of the entity's derived metadata, that the column is independently unique. When the real constraint is partial, conditional, or deferrable, that reader has been misled in a way that produces incorrect business logic (an existence check assumes an unconditional uniqueness that the DB does not actually enforce). SeaORM's derive macro CAN express a plain composite unique constraint across two or more columns: giving the same `#[sea_orm(unique_key = \"...\")]` value to each column in the composite key generates a single composite unique index/constraint spanning all of them. What the macro cannot express is anything beyond a plain (unconditional, non-deferrable) unique: a partial unique index (unique only WHERE some condition holds), a conditional unique, or a deferrable unique (whose check is postponed to transaction commit). For those, the constraint is enforced exclusively in the migration (raw SQL), and named in the entity's module-level doc comment so the reader knows uniqueness is enforced but not visible in the derive attributes. Annotating a column with `#[sea_orm(unique)]` or `#[sea_orm(unique_key = \"...\")]` just to communicate intent when the real constraint is partial/conditional/deferrable is misleading, because it implies a stronger, unconditional guarantee than the database actually enforces. Waiting for a future macro attribute that expresses partial or conditional uniques is not actionable today: the macro does not support it and no roadmap signal suggests it is coming. Dropping the uniqueness constraint at the DB level and enforcing it only in application code is a clear regression, since the database loses the ability to reject duplicates atomically and race conditions across concurrent writers become a correctness bug rather than a constraint violation."

[[option]]
id = "unique-constraints-the-macro-cannot-express-live"
label = "Unique constraints the macro cannot express live at the DB level and are noted in the module doc"
directive = "DeriveEntityModel can express a plain, unconditional unique constraint via #[sea_orm(unique)] on a single column, and a plain composite unique constraint by giving the same #[sea_orm(unique_key = \"...\")] value to two or more columns. Use those attributes for any composite uniqueness that is otherwise unconditional and non-deferrable. Any uniqueness that does NOT match that shape (partial unique indexes with a WHERE clause, conditional uniques, deferrable uniques) is enforced exclusively in the migration and called out in the entity's module-level doc comment. Do not annotate columns with #[sea_orm(unique)] or #[sea_orm(unique_key = \"...\")] in these cases just to communicate intent; the annotation falsely implies a stronger, unconditional constraint than is actually present in the database."
why = "A composite #[sea_orm(unique_key = \"...\")] annotation accurately documents an unconditional composite constraint the database enforces. A single-column unique annotation used to gesture at a partial, conditional, or deferrable constraint tells every reader, and every consumer of the entity's derived metadata, something the database does not actually guarantee."

[[option]]
id = "one-column-on-the-entity-is-annotated-sea-orm-un"
label = "#[sea_orm(unique)] annotation for a partial constraint"
directive = "one column on the entity is annotated #[sea_orm(unique)] to communicate intent, even when the real uniqueness constraint in the database is partial, conditional, or deferrable rather than a plain unconditional constraint"
why = "Misleads every reader and every consumer of the entity's derived metadata: the annotation implies an unconditional uniqueness that the database does not enforce, and downstream code that relies on the annotation as a contract produces incorrect business logic (existence checks that assume uniqueness the DB does not guarantee unconditionally)."

[[option]]
id = "the-entity-carries-no-uniqueness-annotation-and"
label = "No uniqueness annotation pending future macro support"
directive = "the entity carries no uniqueness annotation and the rule waits for a future macro attribute that expresses partial, conditional, or deferrable uniques"
why = "Not actionable today: the macro does not support partial, conditional, or deferrable uniques (it does already support plain composite uniques via #[sea_orm(unique_key = \"...\")]) and no roadmap signal suggests broader support is coming; waiting leaves the constraint undocumented in the entity indefinitely, which is the same outcome as omitting the citation entirely."

[[option]]
id = "the-composite-or-partial-uniqueness-constraint-i"
label = "Uniqueness enforced only in application code"
directive = "the partial, conditional, or deferrable uniqueness constraint is dropped at the database level and enforced exclusively in application code instead"
why = "A clear regression: the database loses the ability to reject duplicates atomically, race conditions across concurrent writers become a correctness bug rather than a constraint violation, and application-code enforcement is inherently racy without a SELECT-FOR-UPDATE or similar construct."

[[sources]]
url = "https://www.sea-ql.org/SeaORM/docs/generate-entity/entity-format/"
title = "SeaORM docs: Entity Format — #[sea_orm(unique)] single-column constraint only"
