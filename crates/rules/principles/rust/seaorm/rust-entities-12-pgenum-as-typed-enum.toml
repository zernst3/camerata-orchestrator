id = "RUST-ENTITIES-12"
title = "Postgres pgEnum columns map to typed Rust enums via DeriveActiveEnum"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true
verification = "grounded"

[decision]
question = "What position does the project take on: Postgres pgEnum columns map to typed Rust enums via DeriveActiveEnum?"
default = "postgres-pgenum-columns-map-to-typed-rust-enums"
why = "Compile-time exhaustive match on the variants and a hard stop on unknown values at the boundary. Matches generator output. Modeling the column as plain String accepts any value at the Rust layer, which is exactly the failure typed enums are meant to prevent: the database may reject the bad value or it may not, and the Rust side carries no compile-time signal that the column is bounded. Where the resulting enum type is defined and organized (colocated in the entity file, or extracted to a shared module once more than one entity consumes it) is a file-organization choice a project makes on its own terms, not part of this rule; eagerly extracting every enum into a shared module regardless of consumer count is premature extraction, since most pgEnums have one consuming entity for most of their lifetime, and the extraction adds an indirection that pays back only once a second consumer actually appears."

[[option]]
id = "postgres-pgenum-columns-map-to-typed-rust-enums"
label = "Postgres pgEnum columns map to typed Rust enums via DeriveActiveEnum"
directive = "Columns backed by a Postgres pgEnum are typed as a Rust enum with DeriveActiveEnum, with explicit rs_type, db_type, enum_name, and a string_value per variant. Where the enum type lives (in the entity file, or in a shared module once multiple entities consume it) is a per-project file-organization convention, not dictated by this rule. NOTE: some projects colocate multi-consumer enum types in a dedicated module (e.g. an _enums/ directory) under the most-conceptual-parent entity for discoverability; treat this as one project convention, not a universal requirement."
why = "Compile-time exhaustive match on the variants and a hard stop on unknown values at the boundary."

[[option]]
id = "columns-backed-by-a-postgres-pgenum-are-typed-as"
label = "pgEnum columns typed as plain String"
directive = "columns backed by a Postgres pgEnum are typed as String in the entity rather than as a typed Rust enum with DeriveActiveEnum"
why = "Accepts any value at the Rust layer, which is exactly the failure typed enums are meant to prevent: the database may reject a bad value or it may not, and the Rust side carries no compile-time signal that the column is bounded, so invalid variants are runtime surprises rather than build failures."

[[option]]
id = "every-pgenum-lives-in-a-shared-enums-module-from"
label = "Shared _enums/ module from day one"
directive = "every pgEnum lives in a shared _enums/ module from the moment it is introduced, regardless of how many entities currently consume it"
why = "Premature extraction: most pgEnums have one consuming entity for most of their lifetime, and the shared module adds an indirection that pays back only once a second consumer actually appears; extracting eagerly means the indirection cost is paid every day for enums that never gain a second consumer."

