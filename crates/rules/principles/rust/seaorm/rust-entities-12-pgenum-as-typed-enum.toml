id = "RUST-ENTITIES-12"
title = "Postgres pgEnum columns map to typed Rust enums via DeriveActiveEnum"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Postgres pgEnum columns map to typed Rust enums via DeriveActiveEnum?"
default = "postgres-pgenum-columns-map-to-typed-rust-enums"
why = "Compile-time exhaustive match on the variants and a hard stop on unknown values at the boundary. Matches generator output. Modeling the column as plain String accepts any value at the Rust layer, which is exactly the failure typed enums are meant to prevent: the database may reject the bad value or it may not, and the Rust side carries no compile-time signal that the column is bounded. Creating a shared _enums/ module from day one regardless of consumer count is premature extraction, since most pgEnums have one consuming entity for most of their lifetime, and the shared module adds an indirection that pays back only once a second consumer actually appears."

[[option]]
id = "postgres-pgenum-columns-map-to-typed-rust-enums"
label = "Postgres pgEnum columns map to typed Rust enums via DeriveActiveEnum"
directive = "Columns backed by a Postgres pgEnum are typed as a Rust enum with DeriveActiveEnum, with explicit rs_type, db_type, enum_name, and a string_value per variant. Single-consumer enums live in the entity file. Multi-consumer enums live in a shared _enums/ module under the most-conceptual-parent entity."
why = "The adopted default. Compile-time exhaustive match on the variants and a hard stop on unknown values at the boundary."

[[option]]
id = "columns-backed-by-a-postgres-pgenum-are-typed-as"
label = "columns backed by a Postgres pgEnum are typed as …"
directive = "columns backed by a Postgres pgEnum are typed as String in the entity rather than as a typed Rust enum with DeriveActiveEnum"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "every-pgenum-lives-in-a-shared-enums-module-from"
label = "every pgEnum lives in a shared _enums/ module from …"
directive = "every pgEnum lives in a shared _enums/ module from the moment it is introduced, regardless of how many entities currently consume it"
why = "A defensible alternative the project considered and did not adopt as the default."
