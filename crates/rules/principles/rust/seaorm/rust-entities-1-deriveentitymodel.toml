id = "RUST-ENTITIES-1"
title = "Use the DeriveEntityModel macro path"
tag = "stack"
domain = "rust:seaorm"
layer = "library"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Use the DeriveEntityModel macro path?"
default = "use-the-deriveentitymodel-macro-path"
why = "Matches code-generator output, is the most googleable shape, and avoids verbose boilerplate that offers no benefit unless you are deliberately deviating. Hand-rolled Entity, Column, and PrimaryKey impls are verbose and offer no upside unless an entity needs a specific customization of the macro expansion, which is rare. A project-specific entity macro that wraps DeriveEntityModel with extra defaults looks ergonomic at first but in practice drifts from generator output and has to be re-validated against every SeaORM upgrade, so the upgrade cost outpaces the local ergonomics gain. Relying on the SeaORM CLI generator for every entity and checking generated files in unmodified works until an entity needs a hand-tuned variant; once that happens, the project has two divergent shapes and reviewers must learn which entities are generator-clean and which have been hand-edited."

[[option]]
id = "use-the-deriveentitymodel-macro-path"
label = "Use the DeriveEntityModel macro path"
directive = "Entities are defined with the DeriveEntityModel macro, not hand-rolled Entity/Column/PrimaryKey impls."
why = "The adopted default. Matches code-generator output, is the most googleable shape, and avoids verbose boilerplate that offers no benefit unless you are deliberately deviating."

[[option]]
id = "entities-are-defined-with-hand-rolled-entity-col"
label = "entities are defined with hand-rolled Entity, Column, and PrimaryKey …"
directive = "entities are defined with hand-rolled Entity, Column, and PrimaryKey impls rather than the DeriveEntityModel macro"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "entities-are-defined-with-a-project-specific-ent"
label = "entities are defined with a project-specific entity macro that …"
directive = "entities are defined with a project-specific entity macro that wraps DeriveEntityModel and applies project-wide defaults"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "every-entity-is-generated-by-the-seaorm-cli-gene"
label = "every entity is generated by the SeaORM CLI generator …"
directive = "every entity is generated by the SeaORM CLI generator and checked into the repository unmodified, with no hand-tuning of any entity file"
why = "A defensible alternative the project considered and did not adopt as the default."
