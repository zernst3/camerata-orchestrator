id = "RUST-DOMAIN-3"
title = "How validated text is represented: newtype with fallible constructor, inline call-site checks, runtime tag, or plain String"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = false
verification = "grounded"

[[sources]]
url = "https://rust-lang.github.io/api-guidelines/type-safety.html"
title = "Rust API Guidelines — C-NEWTYPE: Newtypes provide static distinctions"

[[sources]]
url = "https://rust-lang.github.io/api-guidelines/dependability.html"
title = "Rust API Guidelines — C-VALIDATE: Functions validate their arguments (static enforcement via constrained types)"

[decision]
question = "How is constrained text (Email, Url, Slug and similar) represented: a newtype with a fallible constructor, inline validation at each call site, a runtime validation tag, or a plain String?"
why = "All of these are ways to handle text that must satisfy a constraint, and the right one follows from how much the project wants the type system to carry the proof of validation versus how lightweight it wants string handling to stay. A newtype with a fallible constructor (Email::try_new) makes the type itself proof that validation ran, so 'is this validated?' stops being a question at every call site and a never-validated value cannot be constructed; its cost is a type and constructor per constrained kind. Inline validation at each call site keeps every value a plain String and validates where needed, which is the lightest representation and fine when constrained values are few and centralized; its trade-off is that correctness becomes a discipline check at each consumer, so a missed call site is a silent invalid-state bug rather than a build failure. A runtime validation tag records whether a String was checked, which lets validation status travel with the value without a distinct type; its trade-off is that the status lives at runtime only, so the compiler does not enforce it and a forgotten check still slips through. A plain String with no distinction is the simplest of all and fine when constraints are weak or enforced entirely at the boundary; its trade-off is that the type carries no signal of validation, so downstream code must re-check or trust. Choose by how much the project weights type-carried validation against representational lightness."

[[option]]
id = "newtype-validated-strings-email-url-slug"
label = "Newtype validated strings (Email, Url, Slug, …)"
directive = "Constrained string types are newtypes with a fallible constructor (Email::try_new); the type itself is proof of validation. Free-form text stays as String."
why = "Makes the type itself proof that validation ran, so a value of the type cannot exist without having passed its constructor and 'is this validated?' stops being a question at every call site. The strongest fit when a project wants the type system to carry the invariant; its trade-off is a newtype and fallible constructor per constrained kind, with free-form text left as plain String."

[[option]]
id = "every-call-site-that-needs-a-validated-string-ru"
label = "Inline validation at each call site"
directive = "every call site that needs a validated string runs the validation inline at the call site, and the type system carries no distinction between validated and raw text"
why = "The lightest representation: every value stays a plain String and validation runs only where it is actually needed, with no types or constructors to define. The fit when constrained values are few and their validation is centralized; its trade-off is that correctness becomes a discipline check at each consumer, so a forgotten check at any one call site is a silent invalid-state bug rather than a build failure."

[[option]]
id = "validation-status-is-recorded-as-a-metadata-tag"
label = "Runtime metadata tag on plain String"
directive = "validation status is recorded as a metadata tag attached to a plain String value at runtime, rather than as a distinct compile-time type"
why = "Lets validation status travel with a value without introducing a distinct type per constrained kind, so a single String-plus-tag shape can represent checked and unchecked text. The fit when the project wants the status available at runtime but does not want a newtype taxonomy; its trade-off is that the status lives at runtime only, so the compiler does not enforce it and a forgotten check still produces an invalid-state bug rather than a build failure."

[[option]]
id = "the-codebase-makes-no-distinction-between-valida"
label = "No type distinction between validated and raw text"
directive = "the codebase makes no distinction between validated and raw text; all string-shaped values use the same String type regardless of whether they have been checked"
why = "The simplest possible representation: one String type for all text, with no types, tags, or constructors to define and no conversions anywhere. The fit when constraints are weak or are enforced entirely at the system boundary so internal code can trust its inputs; its trade-off is that the type carries no signal that a value was ever validated, so downstream code must re-check or trust, which is the widest surface for invalid-data bugs."
