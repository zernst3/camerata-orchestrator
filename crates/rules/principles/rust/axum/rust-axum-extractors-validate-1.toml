id = "RUST-AXUM-EXTRACTORS-VALIDATE-1"
title = "Use extractors for request validation; reject invalid requests at the boundary"
tag = "stack"
domain = "rust:axum"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[decision]
question = "What position does the project take on: Use extractors for request validation?"
default = "use-extractors-for-validation"
why = "Axum extractors run before the handler and convert raw HTTP data into typed, validated application data. Putting validation in an extractor means the handler receives only valid data; an invalid request is rejected at the framework boundary with a 400 or 422 before any business logic runs. 'Validation' here means two distinct steps, and the extractor's job is really only the first: wire-shape parsing (is this valid JSON, does this path segment parse as a u64, is this required field present) followed by constructing the domain's own newtypes/value objects through their fallible constructors (EmailAddress::try_from(raw), NonEmptyString::new(raw)) — the domain constructor is the single source of truth for the actual business-rule validation (format, range, uniqueness-independent invariants), and the extractor's job is to invoke it, not to re-implement it. If validation logic instead lives duplicated inside the handler, the service layer, and the extractor, three problems follow. First, multiple layers must independently track the same rules, creating drift risk. Second, an invalid request still invokes the handler if the extractor only does wire-shape and nothing calls the domain constructor, so error paths must be written for all possible invalid states even if the application should reject them outright. Third, the boundary between 'data shaped correctly?' and 'business logic accepts this data?' becomes blurred, making it hard to reason about which layer owns which constraint. Extractors keep the boundary clean by parsing wire shape and then handing off to domain constructors for the actual rules — the same 'parse, don't validate' discipline applies identically on the client side to Dioxus forms; see `rust-dioxus-13-forms-newtype-validation`, which states it as 'the UI never re-implements validation rules, it displays errors from the domain newtype constructors.'"

[[option]]
id = "use-extractors-for-validation"
label = "Use extractors for request validation; reject invalid requests at the boundary"
directive = "Request validation happens in two steps, both at the extractor layer, before the handler runs. Custom extractors or built-in Axum extractors (Path, Query, Json, RawBody) first parse wire shape (valid JSON, correct primitive types, required fields present). The extractor then constructs the relevant domain newtype or value object through its fallible constructor and returns the extractor's own error (mapped to 400/422) if construction fails. Invalid requests are rejected by the extractor before the handler is invoked. The handler receives only already-validated domain types, never raw strings/primitives it would need to re-check. Business-rule validation logic (format, range, invariants) is never duplicated inside the extractor itself — it lives exactly once, in the domain newtype's constructor, and the extractor's only job is to call it."
why = "Extractors enforce validation at the HTTP boundary by parsing wire shape and then invoking the domain's own constructors, so the handler assumes valid input and the business rule is never duplicated outside the domain layer."

[[option]]
id = "validation-happens-inside-handlers-or-services"
label = "validation happens inside handlers or services"
directive = "Request data is extracted into a generic type in the handler, and validation (checking field presence, type correctness, constraints) happens inside the handler or is delegated to the service layer."
why = "Blurs the boundary between 'is the data shaped correctly?' and 'does business logic accept this data?': an invalid request still invokes the handler, so error paths must be written for all possible invalid states even when the application should reject them outright at the edge, and the validation logic risks being duplicated across the handler and service layer."

