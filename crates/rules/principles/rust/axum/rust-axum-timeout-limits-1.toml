id = "RUST-AXUM-TIMEOUT-LIMITS-1"
title = "Set request timeouts and body size limits to prevent resource exhaustion"
tag = "stack"
domain = "rust:axum"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[decision]
question = "What position does the project take on: Request timeouts and body size limits?"
default = "configure-timeouts-and-body-limits"
why = "Axum allows configuration of request timeouts (how long a handler can run) and body size limits (the maximum size of an incoming request body). Without these limits, a single slow or malicious client can hold connections open indefinitely or send a gigabyte-sized request, exhausting server resources and denying service to other clients. When timeouts and limits are not configured, the application does not degrade gracefully under load; it is vulnerable to resource exhaustion, since nothing at the framework boundary rejects a slow client or an oversized body before it consumes memory, connections, or handler time. When they are configured, known bad states are rejected at the framework boundary. Note that axum has shipped a default body-size limit since 0.6: the Router's json/bytes/string extractors are wrapped with tower_http's/axum's DefaultBodyLimit layer, which rejects bodies over 2 MB unless explicitly overridden with DefaultBodyLimit::max(n) or disabled with DefaultBodyLimit::disable(). Timeouts are especially important for async handlers that may wait on external services; a handler waiting for an API response should not wait forever if the remote service becomes unresponsive."

[[option]]
id = "configure-timeouts-and-body-limits"
label = "Configure request timeouts and body size limits"
directive = "The Axum application configures a request timeout (via middleware or by wrapping handlers in tokio::time::timeout) and a body size limit (via the axum::extract::DefaultBodyLimit layer, which has applied a 2 MB default since axum 0.6, or custom extractors that reject bodies above a threshold). Where the default 2 MB limit is not appropriate, it is overridden explicitly with DefaultBodyLimit::max(n) rather than left unconsidered. The timeouts and limits are documented and chosen based on the application's expected use patterns."
why = "Timeouts and limits protect against resource exhaustion and cascading failures."

[[option]]
id = "no-timeout-or-limit-configuration"
label = "No timeout or limit configuration"
directive = "The application does not configure request timeouts or body size limits, relying on the OS and network layer to eventually close connections."
why = "A single slow or malicious client can hold connections open indefinitely or send a gigabyte-sized request, exhausting server resources and denying service to other clients; without explicit limits, the OS and network layer have no application-level knowledge of what constitutes an acceptable request, so they provide no meaningful protection."

[[sources]]
url = "https://docs.rs/axum/latest/axum/extract/struct.DefaultBodyLimit.html"
title = "axum::extract::DefaultBodyLimit — Default request body size limit"

[[sources]]
url = "https://docs.rs/tower-http/latest/tower_http/timeout/index.html"
title = "tower_http::timeout — Request timeout middleware"
