id = "RUST-DOMAIN-1"
title = "How the domain is crated: one crate with modules by context, a crate per context, or one flat crate"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = false
verification = "grounded"

[[sources]]
url = "https://doc.rust-lang.org/book/ch07-00-managing-growing-projects-with-packages-crates-and-modules.html"
title = "The Rust Book — Ch 7: Managing Growing Projects with Packages, Crates, and Modules"

[[sources]]
url = "https://doc.rust-lang.org/reference/items/modules.html"
title = "The Rust Reference — Modules"

[decision]
question = "How is the domain layer crated: one domain crate with bounded contexts as internal modules, a separate crate per bounded context, or a single domain crate with no module substructure?"
why = "All three are legitimate, and the right one follows from the domain's size and whether real bounded-context seams have emerged, not from a presumed winner. One domain crate with contexts as internal modules keeps everything in a single compilation unit while still giving each context a named home: cross-context refactors stay cheap (they are module moves, not crate-boundary changes) and there are no inter-crate cycles to manage — the natural fit at small/medium scale where no hard seam has formed yet. A separate crate per bounded context enforces the seams at the compiler level, so a context cannot reach into another's internals and each can have its own dependency set and build unit; the fit when the domain is large enough that real seams exist and isolating them is worth the inter-crate-dependency management it adds. A single flat domain crate with no module substructure is the most direct shape for a very small domain, where any partitioning would be ceremony; its cost is that it becomes a god-module as the entity count grows and 'where does this go' turns into a judgment call. Choose by how many real bounded-context seams the domain has today, noting that un-splitting later is harder than splitting later."

[[option]]
id = "single-domain-crate-modules-by-bounded-context"
label = "Single domain crate, modules by bounded context"
directive = "One domain crate. Bounded contexts are internal modules, not separate crates."
why = "Keeps the whole domain in one compilation unit while giving each context a named module home: cross-context refactors are module moves rather than crate-boundary changes, and there are no inter-crate cycles to manage. The strongest fit at small/medium scale (tens of entities) where no hard bounded-context seam has emerged; its trade-off is that the compiler does not enforce the context boundaries, so they hold by convention rather than by build structure."

[[option]]
id = "the-project-starts-with-a-separate-crate-per-bou"
label = "the project starts with a separate crate per bounded …"
directive = "the project starts with a separate crate per bounded context, and bounded contexts live as sibling crates rather than as modules in a shared domain crate"
why = "Enforces the bounded-context seams at the compiler level: a context cannot reach into another's internals, each crate can carry its own dependency set and compile independently, and the architecture is legible from the crate graph. The right shape once the domain is large enough that real seams exist and isolating them is worth the cost — inter-crate dependencies must be kept acyclic, and a refactor that crosses a seam is a crate-boundary change rather than a free module move."

[[option]]
id = "the-project-keeps-a-single-domain-crate-but-does"
label = "the project keeps a single domain crate but does …"
directive = "the project keeps a single domain crate but does not subdivide it into modules by bounded context; all domain code lives in one flat module structure regardless of context"
why = "The most direct shape for a very small domain: with only a handful of entities, any context partitioning would be ceremony, and a flat layout keeps everything one hop away. Its trade-off is that it becomes a god-module as the entity count grows — the absence of internal structure makes 'where does this go' a judgment call at every addition and the flat mass is hard to navigate past a few dozen entities."
