id = "RUST-DOMAIN-1"
title = "Single domain crate, modules by bounded context"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://doc.rust-lang.org/book/ch07-00-managing-growing-projects-with-packages-crates-and-modules.html"
title = "The Rust Book — Ch 7: Managing Growing Projects with Packages, Crates, and Modules"

[[sources]]
url = "https://doc.rust-lang.org/reference/items/modules.html"
title = "The Rust Reference — Modules"

[decision]
question = "What position does the project take on: Single domain crate, modules by bounded context?"
default = "single-domain-crate-modules-by-bounded-context"
why = "At small/medium scale (tens of entities), no real bounded-context seams have emerged; splitting prematurely adds cyclic-dependency friction, and un-splitting later is harder than splitting later. Splitting into per-context crates from day one is a premature split at this scale: cyclic-dependency friction accumulates before any real bounded-context seam has emerged, and the cost is paid every day on crate-boundary refactors that would have been free inside a single module. A single mega-module with no bounded-context substructure inverts the failure mode: god-shape, hard to navigate as the entity count grows, and the absence of any internal structure becomes its own friction as soon as the domain is large enough that 'where does this go' becomes a real question."

[[option]]
id = "single-domain-crate-modules-by-bounded-context"
label = "Single domain crate, modules by bounded context"
directive = "One domain crate. Bounded contexts are internal modules, not separate crates."
why = "At small/medium scale (tens of entities), no real bounded-context seams have emerged; splitting prematurely adds cyclic-dependency friction, and un-splitting later is harder than splitting later."

[[option]]
id = "the-project-starts-with-a-separate-crate-per-bou"
label = "the project starts with a separate crate per bounded …"
directive = "the project starts with a separate crate per bounded context from day one, and bounded contexts live as sibling crates rather than as modules in a shared domain crate"
why = "Premature at small/medium scale: cyclic-dependency friction accumulates before any real bounded-context seam has emerged, and the cost is paid every day on crate-boundary refactors that would have been free inside a single module. The payoff comes only once the domain is large enough that a real seam demands it."

[[option]]
id = "the-project-keeps-a-single-domain-crate-but-does"
label = "the project keeps a single domain crate but does …"
directive = "the project keeps a single domain crate but does not subdivide it into modules by bounded context; all domain code lives in one flat module structure regardless of context"
why = "Fast to start but becomes a god-module as the entity count grows: the absence of any internal structure makes 'where does this go' a judgment call at every addition, and the resulting flat mass is hard to navigate past a few dozen entities."
