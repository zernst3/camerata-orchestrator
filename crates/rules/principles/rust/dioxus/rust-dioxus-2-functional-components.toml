id = "RUST-DIOXUS-2"
title = "Components are free functions returning Element; multi-prop components derive Props, Clone, and PartialEq"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[decision]
question = "What position does the project take on: Components are free functions returning Element; multi-prop components derive Props, Clone, and PartialEq?"
default = "components-are-free-functions-returning-element"
why = "Functional components are the canonical shape the framework actively maintains, and the only shape its tooling produces good error messages for. The split between this rule's strong claims and its weak ones matters for how findings should be weighted: defining components as struct/trait objects, or passing props as untyped value bags, are genuine deviations — they block the component-attribute macro, kill compile-time prop checking, and defeat the reason to use a typed language for the UI. But the named-Props-struct-past-three-props line is a READABILITY and CONVENTION preference, not a correctness or performance one. Critically, the component-attribute macro AUTO-GENERATES the Props struct and its Clone + PartialEq derives from inline function arguments, so diffing works correctly whether the author writes a dedicated struct or declares props inline — there is no re-render-on-every-update penalty for choosing inline args. Treat a component that declares several props inline as a low-severity style note (the signature gets long), not a defect; reserve higher severity for the struct/trait-object and untyped-bag shapes that actually break tooling and type-checking."

[[option]]
id = "components-are-free-functions-returning-element"
label = "Components are free functions returning Element; multi-prop components derive Props, Clone, and PartialEq"
directive = "Every component is a free function whose body returns Element, annotated with the component attribute. Struct-based components implementing a component trait, trait-object wrappers, the legacy Scope-bearing signature from earlier framework versions, and untyped value bags as props are forbidden — these are the load-bearing constraints and the only ones a finding should treat as more than a style note. Declaring props inline as function arguments is acceptable at any prop count: the component-attribute macro generates the backing Props struct and its Clone + PartialEq derives either way, so diffing is correct regardless. A dedicated Props struct is PREFERRED once a component has three or more props purely because the function signature gets long; flag its absence only as a low-severity readability suggestion, never as a correctness or performance defect."
why = "Functional components with derived Props are the canonical shape the framework actively maintains, and the only shape its tooling produces good error messages for."

[[option]]
id = "every-component-is-defined-as-a-struct-implement"
label = "every component is defined as a struct implementing a …"
directive = "every component is defined as a struct implementing a Component trait, rather than as a free function annotated with the component attribute"
why = "Blocks the component-attribute macro, kills compile-time prop checking, and defeats the reason to use a typed language for the UI: the framework does not actively maintain this shape, so tooling error messages become cryptic and upgrades may break the pattern without warning."

[[option]]
id = "props-are-passed-to-components-as-untyped-value"
label = "props are passed to components as untyped value bags …"
directive = "props are passed to components as untyped value bags (a HashMap-shaped or map-like container) rather than as a typed Props struct with derived Props, Clone, and PartialEq"
why = "Loses compile-time prop checking entirely: missing or wrongly typed props are runtime errors rather than build failures, and the component's call site carries no machine-readable documentation of what it expects, making refactors across many call sites purely manual."

[[option]]
id = "every-component-declares-its-props-inline-as-fun"
label = "every component declares its props inline as function arguments …"
directive = "every component declares its props inline as function arguments regardless of count, with no dedicated Props struct even when the component has three or more props"
why = "Functionally equivalent — the component-attribute macro generates the same Props struct and derives behind the scenes. The only cost is a longer function signature past a few props, so this differs from the default on readability alone, not correctness."

