id = "RUST-DIOXUS-13"
title = "Forms display errors from the domain newtype constructors; the UI never re-implements validation rules"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Forms display errors from the domain newtype constructors; the UI never re-implements validation rules?"
default = "forms-display-errors-from-the-domain-newtype-con"
why = "Duplicating validation rules between the domain layer and the UI is the largest single source of bugs of the shape 'the form let me submit but the backend rejected it.' The domain layer is the only correct place for validation rules; the UI presents them and never re-states them. The Rust newtype pattern makes this not just possible but ergonomic: the fallible constructor returns a typed error and the UI renders the error's display impl. The cost of getting this wrong compounds over time as more fields are added; the cost of doing it right is roughly the same as the wrong way at any single field. A declarative validation library used in the UI alongside domain newtypes is useful at a certain scale but adds a runtime validation layer that competes with the domain newtypes, and the two sources of truth can drift if both are authoritative. Duplicating the validation logic in the component (regex, length checks, format helpers) is the exact failure mode this rule exists to prevent, since the duplicated rule and the domain rule will eventually diverge. Validating only on the server and leaving the client unchecked is correctness-equivalent but loses inline-error UX and, if naively implemented, produces a server round-trip per keystroke."

[[option]]
id = "forms-display-errors-from-the-domain-newtype-con"
label = "Forms display errors from the domain newtype constructors; the UI never re-implements validation rules"
directive = "Form fields bind to signals holding raw user text. On submit (or on blur for live-validation), the form constructs the relevant domain newtype through its fallible constructor and displays whatever validation error the constructor returns. The UI does NOT re-implement validation rules: no inline regex for email format, no max-length check duplicated in the component, no decimal parser repeated per form. The domain newtype is the rule; the UI's job is to call the constructor and render whatever the domain says is wrong. Multi-field forms compose a form-level type that exposes its own fallible constructor in turn."
why = "The adopted default. Duplicating validation rules between the domain layer and the UI is the largest single source of bugs of the shape 'the form let me submit but the backend rejected it.' The domain layer is the only correct place for validation rules; the UI presents them and never re-states them."

[[option]]
id = "form-validation-runs-through-a-declarative-valid"
label = "form validation runs through a declarative validation library used …"
directive = "form validation runs through a declarative validation library used in the UI alongside the domain newtypes, with the library carrying its own rule definitions for each field"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "each-form-component-re-implements-its-own-valida"
label = "each form component re-implements its own validation logic inline …"
directive = "each form component re-implements its own validation logic inline (regex, length checks, format helpers) rather than delegating to the domain newtype constructors"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "form-fields-are-validated-only-on-the-server-the"
label = "form fields are validated only on the server; the …"
directive = "form fields are validated only on the server; the client submits whatever the user types and shows whatever error the server returns, with no client-side validation step"
why = "A defensible alternative the project considered and did not adopt as the default."
