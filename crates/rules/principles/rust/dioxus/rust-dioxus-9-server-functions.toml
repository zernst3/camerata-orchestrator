id = "RUST-DIOXUS-9"
title = "Server-to-client calls: framework server functions or a REST API"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = false
verification = "grounded"

[decision]
question = "What position does the project take on: how the UI calls the server — framework server functions or a REST API?"
why = "Both are legitimate, widely-used ways for a Dioxus UI to reach its server, and neither is presumed correct — the right choice follows from where the project draws its boundaries. Framework server functions (the `#[server]` macro) generate the client and server sides from one definition, keep a single source of truth per operation, and resolve in-process during server-side rendering and over the network during hydration: a natural fit when the UI and server ship together as one fullstack unit. A REST API is the natural fit when the server is a standalone boundary — it serves consumers beyond this UI (mobile, third parties, other services), speaks standard HTTP semantics (caching, status codes, auth middleware, gateways, observability), and can be versioned and deployed independently of the front end; a typed or OpenAPI-generated client keeps its call sites type-checked. Choose by asking whether the server is an internal detail of one app (which favors server functions) or an independent product surface (which favors a REST API), not by defaulting to either."

[[option]]
id = "server-to-client-calls-use-server-functions-not"
label = "The UI calls the server through framework server functions"
directive = "When the UI needs data or actions from the server, the framework's server-function macro (`#[server]`) is used to declare them. The macro generates the client-side call (over the wire, serialized) and the server-side handler from a single function definition; the body runs server-side and may call the application's service layer directly. Within this choice the UI does not also maintain a separate REST/RPC client for the same operations — the server function is the single source of truth per operation. When a function needs to reach a third party (payment provider, email gateway, external API), that call lives in the server-side body of a server function, never in client-side code."
why = "Keeps one source of truth per operation: a single function definition generates both sides, so a renamed field or changed return type is updated in one place, and the same call resolves in-process during server-side rendering and over the network during hydration. The strongest fit when the UI and server ship together as one fullstack app and the server has no consumers other than this front end."

[[option]]
id = "server-to-client-calls-go-through-a-hand-rolled"
label = "The server exposes a REST API the UI consumes through an HTTP client"
directive = "The server exposes versioned REST endpoints, and the UI calls them through an HTTP client — preferably a typed or OpenAPI-generated client so call sites stay type-checked. The server is treated as an independent boundary: its API is documented and stable enough to serve other consumers (mobile apps, third-party integrations, other services), and it can be versioned and deployed on a cadence independent of the front end. Standard HTTP semantics — caching, status codes, auth middleware, gateways, observability — apply uniformly across every consumer."
why = "The right shape when the server is a standalone product surface rather than an internal detail of one UI: it serves consumers beyond this front end, speaks a language-agnostic protocol every platform already understands, and lets the API and UI evolve and deploy on independent cadences. In return it asks that the endpoint contract and the client stay in sync; a typed or generated client (an OpenAPI-generated SDK, or a shared types crate) absorbs most of that cost by restoring static checks at the call site."

[[option]]
id = "server-to-client-calls-go-through-a-typed-rpc-la"
label = "Typed RPC layer as separate dependency"
directive = "server-to-client calls go through a typed RPC layer added as a separate dependency (gRPC, tarpc, or similar), rather than through the framework's server-function macro"
why = "Equivalent in shape to server functions but adds an extra dependency to maintain for what the framework already provides natively: the generated stub types must stay in sync with the service definition, codegen adds a build step, and the project takes on the full surface of the RPC library's maintenance and upgrade cycle. Reasonable when an RPC ecosystem (shared contracts, polyglot services) is already in use across the system."

[[option]]
id = "the-server-exposes-a-graph-query-endpoint-with-c"
label = "Graph-query endpoint with client-side codegen"
directive = "the server exposes a graph-query endpoint with client-side code generation, and the UI fetches everything through generated query types rather than through per-operation server functions"
why = "Premature complexity for the common case: the project's data graph rarely warrants a graph-query layer from day one, and the upfront cost (schema definition, codegen tooling, query planning) rarely pays back until the UI has dozens of distinct read shapes that benefit from client-driven field selection."

[[sources]]
url = "https://dioxuslabs.com/learn/0.6/guides/fullstack/server_functions"
title = "Dioxus fullstack: Server Functions — #[server] macro generates client/server from one definition"

[[sources]]
url = "https://developer.mozilla.org/en-US/docs/Web/HTTP"
title = "MDN: HTTP — standard semantics a REST API gives every consumer (caching, status codes, methods)"
