id = "RUST-DIOXUS-10"
title = "Client gates affordances on capability flags carried by responses; raw permission codes never reach the client"
tag = "stack"
domain = "rust:dioxus"
layer = "framework"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Client gates affordances on capability flags carried by responses; raw permission codes never reach the client?"
default = "client-gates-affordances-on-capability-flags-car"
why = "Re-implementing permission policy on the client is the classic foot-gun in role-and-permission systems: the client and server logic drift, the client allows actions the server rejects, the rejection messages look like bugs to users, and reviewers cannot tell at a glance which side is authoritative. Carrying the decision on the response (rather than the inputs to the decision) gives the client a single field to check, makes the gate self-documenting in code, and lets the server change the underlying policy without coordinated client changes. Forbidding raw codes on the wire makes the rule mechanical at the response shape rather than discretionary at the read site. Carrying raw permission codes on responses and inspecting them on the client is the anti-pattern this rule exists to prevent; it produces silent drift between client and server policy as soon as either side evolves. Carrying only the codes and computing the decision in a shared library used by both sides works if the shared library is genuinely the only path on both sides, but in practice the abstraction leaks and one side drifts. Duplicating the policy logic on the client deliberately for offline use is defensible for an offline-first UI, but it is the wrong default for a connected web product, because every policy change becomes a coordinated two-place edit and the offline path rarely justifies that ongoing cost."

[[option]]
id = "client-gates-affordances-on-capability-flags-car"
label = "Client gates affordances on capability flags carried by responses; raw permission codes never reach the client"
directive = "Every server response that drives a gated affordance carries a structured set of named capability flags (typically a can field on the response: org.can.manage, session.can.site_admin, project.can.publish). The UI gates rendering on those flags directly. The UI MUST NOT inspect raw permission codes (string identifiers like the permission scope, or array membership checks against a permissions list on the user object), and MUST NOT re-implement permission policy on the client. The shape of the response object should physically not include a raw-codes field; if it does not exist on the wire, the client cannot read it. The server is the only place authorization decisions are computed; the client only renders the decision."
why = "The adopted default. Re-implementing permission policy on the client is the classic foot-gun in role-and-permission systems: the client and server logic drift, the client allows actions the server rejects, the rejection messages look like bugs to users, and reviewers cannot tell at a glance which side is authoritative."

[[option]]
id = "server-responses-carry-raw-permission-codes-stri"
label = "server responses carry raw permission codes (string scopes or …"
directive = "server responses carry raw permission codes (string scopes or membership in a permissions array) and the client inspects those codes to decide which affordances to render"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "server-responses-carry-only-the-inputs-to-the-po"
label = "server responses carry only the inputs to the policy …"
directive = "server responses carry only the inputs to the policy decision (codes, roles, attributes) and a shared policy library used by both client and server computes the decision at each call site"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-client-carries-a-duplicate-copy-of-the-serve"
label = "the client carries a duplicate copy of the server's …"
directive = "the client carries a duplicate copy of the server's policy logic and evaluates it independently against user attributes, for example to support offline use"
why = "A defensible alternative the project considered and did not adopt as the default."
