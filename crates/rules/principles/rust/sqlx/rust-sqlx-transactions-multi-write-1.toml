id = "RUST-SQLX-TRANSACTIONS-MULTI-WRITE-1"
title = "Wrap multiple writes in an explicit transaction to ensure atomicity"
tag = "stack"
domain = "rust:sqlx"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[decision]
question = "What position does the project take on: Transactions for multi-write operations?"
default = "use-explicit-transactions"
why = "A transaction groups multiple SQL statements and ensures all succeed or all fail together (atomicity). When an operation logically requires multiple writes to different tables (e.g., insert a user, insert their profile, and update a summary table), these writes should be in a single transaction. If one write fails, the transaction rolls back and all writes are undone. If writes are not transactional and one fails after another succeeds, the database is left in a partial state with dangling references or stale data. When a single write is sufficient, a transaction is unnecessary and adds overhead. The rule is: any operation that touches multiple tables or requires multiple statements to maintain consistency uses an explicit transaction. Single-statement operations use implicit transactions."

[[option]]
id = "use-explicit-transactions"
label = "Wrap multiple writes in explicit transactions"
directive = "Any operation that performs multiple database writes (inserts, updates, or deletes across one or more tables) is wrapped in a transaction via sqlx::Transaction or connection.begin(). If any write fails, the transaction is rolled back. A single write that does not require atomicity with other writes does not require an explicit transaction."
why = "Explicit transactions ensure consistency and prevent partial state corruption."

[[option]]
id = "no-explicit-transactions"
label = "Rely on implicit transactions for each statement"
directive = "Each SQL statement runs in an implicit transaction. Multiple writes are executed as separate statements without an explicit transaction group."
why = "A defensible alternative the project considered."

[[sources]]
url = "https://docs.rs/sqlx/latest/sqlx/struct.Transaction.html"
title = "sqlx::Transaction — In-progress database transaction; rolls back on drop if not committed"
