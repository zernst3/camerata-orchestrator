id = "RUST-DOMAIN-6"
title = "Crate-boundary error types: typed enums organized by category or by aggregate"
tag = "stack"
domain = "rust"
layer = "language"
enforcement = "structured"
default = false
verification = "grounded"

[[sources]]
url = "https://rust-lang.github.io/api-guidelines/interoperability.html"
title = "Rust API Guidelines — C-GOOD-ERR: Error types are meaningful and well-behaved"

[[sources]]
url = "https://doc.rust-lang.org/book/ch09-02-recoverable-errors-with-result.html"
title = "The Rust Book — Ch 9.2: Recoverable Errors with Result"

[decision]
question = "How does the project organize the typed error enums a crate exposes at its public boundary?"
why = "This rule assumes `rust-domain-4-errors-via-thiserror`'s default (a typed thiserror enum per crate boundary) and addresses the narrower, separate question of how the variants within that enum are organized — it is not an alternative to rust-domain-4, it is the follow-on organizational choice once rust-domain-4's default applies. A crate's public boundary should expose typed, crate-owned error enums that callers can exhaustive-match on, with framework or driver errors mapped into them at the boundary rather than leaked through. Within that, how the enums are grouped is a genuine organizational choice. One shared enum per failure CATEGORY (persistence, validation, business rule, parsing, and so on) keeps callers matching a small, stable set and is a natural fit for larger crates whose failure surfaces recur across many operations. One enum per MODULE or AGGREGATE keeps each error type next to the code it describes and is a natural fit for crates organized around independent aggregates, where co-locating the error with its owner aids cohesion. The choice follows from the crate's size and how its failures cluster, not from a presumed winner. Two shapes are not organizational choices but boundary failures, and are called out as the options to avoid regardless of which organization is chosen: collapsing every category into one grab-bag enum, and erasing types through Box of dyn Error / anyhow or re-exporting a framework's error type — both defeat exhaustive matching and a stable public surface."

[[option]]
id = "errors-are-category-scoped-one-shared-enum-per-f"
label = "Errors are organized by failure category, one shared enum per category"
directive = "Each Rust crate exposes errors organized by failure category at its public boundary, with one shared enum per category. The categories are whatever distinct failure surfaces the crate exposes; examples include persistence and IO failures, input validation, business rule violations, parsing, and networking, but the actual set depends on what the crate does. Variants within an enum enumerate the distinct failure modes for that category. Driver-specific or framework-specific errors map into the appropriate category enum at the boundary; they do not leak through the public API directly."
why = "Keeps callers matching a small, stable set of category enums even as the crate grows: failure modes that recur across many operations (a NotFound, a constraint violation) are defined once per category rather than restated per operation. The natural fit for larger crates whose failure surfaces are shared across many entry points."

[[option]]
id = "each-function-or-aggregate-defines-its-own-error"
label = "Errors are organized by module or aggregate, one enum per aggregate"
directive = "Each module or aggregate owns its error enum, so an error type lives next to the code whose failures it describes, rather than being centralized into a small number of shared per-category enums. Driver-specific or framework-specific errors still map into the aggregate's own enum at the boundary; they do not leak through the public API directly."
why = "Keeps each error type local to its aggregate: the failures of one bounded context are defined and evolve alongside that context, so a change to one aggregate's failure modes stays contained rather than touching a shared type. The natural fit for crates organized around independent aggregates whose failure surfaces do not heavily overlap."

[[option]]
id = "the-crate-exposes-a-single-error-enum-that-mixes"
label = "the crate exposes a single error enum that mixes …"
directive = "the crate exposes a single error enum that mixes every failure category (persistence, validation, business rule, parsing, networking) into one type, rather than splitting failures into category enums or per-aggregate enums"
why = "Collapses orthogonal concerns regardless of how the rest of the crate is organized: callers cannot distinguish a validation failure from a persistence failure without inspecting the variant, the single enum's arms accumulate without bound as the crate grows, and a match that handles only one failure surface must either wildcard or exhaustively name unrelated variants."

[[option]]
id = "the-crate-re-exports-the-underlying-framework-s"
label = "the crate re-exports the underlying framework's or driver's error …"
directive = "the crate re-exports the underlying framework's or driver's error type from its public API directly, rather than mapping framework errors into a crate-owned enum at the boundary"
why = "Breaks the boundary entirely: the crate's public surface inherits the framework's error semantics and breaks every caller every time the framework upgrades, defeating the purpose of having a crate boundary between them — a problem under any error organization."

[[option]]
id = "the-crate-s-public-functions-return-box-of-dyn-e"
label = "the crate's public functions return Box of dyn Error …"
directive = "the crate's public functions return Box of dyn Error or anyhow Error as their error type, rather than typed enums callers can match on"
why = "Eliminates exhaustive matching: consumers cannot recover specific failure modes and the type system stops helping with error handling, which is the entire reason a typed error enum exists at the boundary — independent of whether errors are grouped by category or by aggregate."
