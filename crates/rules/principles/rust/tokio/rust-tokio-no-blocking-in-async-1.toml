id = "RUST-TOKIO-NO-BLOCKING-IN-ASYNC-1"
title = "Do not call blocking operations directly in async code; use tokio::task::spawn_blocking"
tag = "stack"
domain = "rust:tokio"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[decision]
question = "What position does the project take on: Blocking operations in async code?"
default = "use-spawn-blocking-for-blocking-calls"
why = "Tokio is a cooperative multitasking runtime; it schedules many async tasks on a small number of worker threads. When a task calls a blocking operation (e.g., a synchronous I/O read, std::fs::File, a mutex lock that will block for a meaningful duration, or CPU-intensive work) directly inside an async function, it blocks the entire worker thread. While that task is blocked, all other tasks scheduled on that thread cannot run, even if they are ready (e.g., waiting for a network response). If many tasks block their worker threads simultaneously, the runtime starves and the application becomes unresponsive. tokio::task::spawn_blocking runs the blocking operation on a separate thread pool so the async executor can keep running other tasks. When a blocking operation is unavoidable (e.g., reading from a file or computing a hash), spawn_blocking is the correct tool. If the operation is I/O that has an async alternative (e.g., tokio::fs instead of std::fs), the async version should be used instead. Not every lock acquisition counts as a blocking operation in this sense: a std::sync::Mutex whose critical section is short and never spans an .await point (no I/O or other yield happens while the lock is held) typically holds the worker thread for a negligible, bounded time and is commonly used directly in async code without spawn_blocking or a switch to tokio::sync::Mutex — the concern this rule targets is operations that block for an unbounded or substantial duration (disk I/O, network calls made synchronously, CPU-heavy work, or lock contention that can stall)."

[[option]]
id = "use-spawn-blocking-for-blocking-calls"
label = "Use tokio::task::spawn_blocking for blocking operations"
directive = "Any blocking operation (synchronous I/O, CPU work, blocking lock acquisition) is wrapped in tokio::task::spawn_blocking so it runs on a separate thread pool. The async function awaits the spawn_blocking result. Blocking calls are not made directly inside async functions."
why = "spawn_blocking prevents blocking the async runtime and keeps concurrent tasks responsive."

[[option]]
id = "use-block-in-place-when-already-on-a-worker-threa"
label = "use tokio::task::block_in_place instead of spawn_blocking when already running on a multi-thread-runtime worker thread"
directive = "When code that needs to call a blocking operation is already running inside a multi-threaded Tokio runtime's worker thread (not the current-thread runtime, and not inside spawn_blocking's own pool), wrap the blocking section in tokio::task::block_in_place instead of moving it to spawn_blocking. block_in_place tells the runtime to hand off the other tasks queued on that worker thread to a different thread for the duration of the blocking call, avoiding the extra thread hop (and the Send + 'static + channel-back-of-result machinery) that spawn_blocking's separate thread pool requires."
why = "spawn_blocking always moves work to a separate blocking-task thread pool and requires the closure (and its result) to cross a thread boundary, which is fine but not free. block_in_place instead reshuffles the current worker thread's other tasks onto another thread and lets the blocking code run in place, which avoids the extra hop when the caller is already inside an async task on a multi-thread-runtime worker. The trade-offs: block_in_place is unavailable on the current-thread runtime (single worker thread, nowhere to move the other tasks to), it's a relatively heavyweight operation on the runtime itself (not meant for frequent, tiny blocking calls — spawn_blocking's pool amortizes better there), and it only makes sense when you're already inside a spawned async task rather than choosing between the two from scratch. For most call sites spawn_blocking remains the simpler default; block_in_place is a targeted optimization for specific hot paths already running on worker threads."

[[option]]
id = "blocking-calls-inline-in-async"
label = "Call blocking operations directly inside async functions"
directive = "Blocking operations are called directly inside async functions without spawn_blocking. The async executor manages the blocking."
why = "Blocking the worker thread prevents all other tasks scheduled on that thread from running while the block is in progress; if many tasks simultaneously block their worker threads, the runtime starves and the application becomes unresponsive under load without any error or warning to indicate why."

[[sources]]
url = "https://docs.rs/tokio/latest/tokio/task/fn.spawn_blocking.html"
title = "tokio::task::spawn_blocking — Blocking operations off the async runtime"
