id = "RUST-TOKIO-STRUCTURED-CONCURRENCY-JOINSET-1"
title = "Use JoinSet for structured concurrency; track spawned tasks and ensure all complete or are cancelled"
tag = "stack"
domain = "rust:tokio"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[decision]
question = "What position does the project take on: Structured concurrency with JoinSet?"
default = "use-joinset-for-structured-concurrency"
why = "tokio::task::JoinSet holds a set of spawned tasks and ensures they are joined (awaited or cancelled) before the scope exits. Without JoinSet, a task spawned via tokio::spawn can run past the scope where it was created, leading to orphaned tasks, resource leaks, and subtle bugs where a task outlives its dependencies (e.g., a spawned task tries to access data that has been dropped). JoinSet enforces structured concurrency: all spawned tasks are joined at a well-defined point, and the code path cannot exit until all tasks are accounted for. If a task panics, the panic is caught when joining and can be handled. JoinSet makes concurrent code easier to reason about because the lifetime of spawned tasks is visible and finite."

[[option]]
id = "use-joinset-for-structured-concurrency"
label = "Use JoinSet for structured concurrency"
directive = "Tasks are spawned via a JoinSet, and the code joins all tasks (awaits or cancels them) before the scope exits. Unstructured tokio::spawn calls that can outlive their scope are avoided. JoinSet::join_all() or iteration over the JoinSet ensures all tasks complete or are cancelled."
why = "JoinSet ensures spawned tasks are joined and prevents orphaned tasks and resource leaks."

[[option]]
id = "use-unstructured-spawn"
label = "Use unstructured tokio::spawn"
directive = "Tasks are spawned via tokio::spawn without a JoinSet. Tasks may run past the scope where they are spawned, and the application relies on explicit cancellation or task-local cleanup."
why = "A spawned task can run past the scope where it was created, producing orphaned tasks, resource leaks, and subtle bugs where a task outlives its dependencies; if a task panics, the panic is silently lost rather than being propagated and handled at a well-defined join point."

[[sources]]
url = "https://docs.rs/tokio/latest/tokio/task/struct.JoinSet.html"
title = "tokio::task::JoinSet — Structured task collection; aborts on drop"
