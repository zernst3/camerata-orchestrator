id = "ARCH-IAC-1"
title = "Infrastructure as code, per-environment isolation"
tag = "stack"
domain = "iac"
layer = "universal"
enforcement = "prose"
default = true

[decision]
question = "What position does the project take on: Infrastructure as code, per-environment isolation?"
default = "infrastructure-as-code-per-environment-isolation"
why = "Reproducible environments, centralized rotation, no credential sprawl. Provisioning infrastructure manually through a cloud console and storing secrets in the repository or CI configuration produces silent drift between environments, sprawls credentials across artifacts the team cannot fully enumerate, and removes any centralized path for rotation; the next 'who has this key' question has no good answer."

[[option]]
id = "infrastructure-as-code-per-environment-isolation"
label = "Infrastructure as code, per-environment isolation"
directive = "All infra scaffolding lives in IaC (e.g. Terraform); secrets live in a per-environment vault with isolation, never in the repo or CI logs; local dev stays credential-free via injection tooling."
why = "The adopted default. Reproducible environments, centralized rotation, no credential sprawl."

[[option]]
id = "infrastructure-is-provisioned-manually-through-a"
label = "infrastructure is provisioned manually through a cloud console (click-ops) …"
directive = "infrastructure is provisioned manually through a cloud console (click-ops) and secrets are stored in the repository or CI configuration rather than in a per-environment vault"
why = "A defensible alternative the project considered and did not adopt as the default."
