id = "PYTHON-PARAMETERIZED-SQL-1"
title = "SQL is parameterized; query strings are never built from interpolated values"
tag = "stack"
domain = "python"
layer = "language"
enforcement = "mechanical"
default = true
qualifies = "Enforced by a static-analysis gate (Bandit B608 / Ruff S608 / Semgrep) that flags f-strings, `%`-formatting, `.format()`, or `+` concatenation feeding a value into `cursor.execute(...)`, `session.execute(text(...))`, or `.raw(...)`. Conformance holds when the gate runs in CI and an interpolated query string fails the build; it fails when no SQL-injection lint runs."
verification = "grounded"

[decision]
question = "How are dynamic values placed into SQL queries?"
default = "bind-parameters"
why = "Building a SQL string by interpolating a value with an f-string, `%`, `.format()`, or `+` puts attacker-controlled text directly into the query grammar, which is the canonical SQL-injection vulnerability and the single most damaging web flaw. Parameterized queries send the SQL text and the values to the driver separately, so a value can never be parsed as SQL no matter what it contains; the database treats it strictly as data. The interpolated form looks convenient and reads naturally, but every such site is a latent injection waiting for one unsanitized input, and sanitizing by hand is error-prone and incomplete. Binding parameters is the same amount of code and removes the entire class of bug, so there is no case where interpolation is the right call for a value."

[[option]]
id = "bind-parameters"
label = "always bind values as query parameters"
directive = "Every dynamic value in a SQL statement is passed as a bound parameter (the driver's placeholder form, or the ORM's parameterized API), never interpolated into the query string. f-strings, `%`-formatting, `.format()`, and string concatenation are forbidden anywhere a value flows into `cursor.execute`, `session.execute(text(...))`, or a `.raw()` call. Static table or column names that must be dynamic come from a fixed allow-list, never from request input."
why = "The adopted default. Parameterization sends SQL and values separately so a value can never be parsed as SQL, eliminating injection entirely."

[[option]]
id = "interpolate-with-escaping"
label = "interpolate values into the query with manual escaping"
directive = "Dynamic values are formatted into the SQL string with manual escaping or quoting rather than bound as parameters."
why = "Reads naturally but is error-prone and incomplete; every site is a latent injection waiting for one unsanitized input."

