id = "PYTHON-FASTAPI-PYDANTIC-MODELS-1"
title = "Request and response bodies use explicit Pydantic models, not dict or ORM objects"
tag = "stack"
domain = "python:fastapi"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://fastapi.tiangolo.com/tutorial/body/"
title = "FastAPI — Request Body (Pydantic models validate and coerce input at the boundary)"

[[sources]]
url = "https://fastapi.tiangolo.com/tutorial/response-model/"
title = "FastAPI — Response Model (response_model filters output; ORM objects under a compatible response_model are a documented pattern)"

[decision]
question = "What types define a FastAPI endpoint's request and response bodies?"
default = "explicit-pydantic-schemas"
why = "Typing a request body as a Pydantic model gives FastAPI a validated boundary: the framework parses, coerces, and validates the incoming JSON against the schema and returns a structured 422 on mismatch before any handler code runs, so the handler only ever sees well-formed data. Declaring a `response_model` does the inverse, filtering the output to exactly the declared fields. Accepting a raw `dict` or untyped body throws that away: the handler must validate by hand, every field access is an unchecked `KeyError` risk, and bad input reaches business logic. On the response side, FastAPI's own documented behavior is more permissive than a blanket ban on returning ORM objects: when `response_model` is set to a Pydantic schema with `model_config = ConfigDict(from_attributes=True)` (the modern spelling of the old `orm_mode`), returning the ORM object directly is an accepted, documented pattern — FastAPI reads the declared fields off the object's attributes and filters/serializes through the schema exactly as it would for a dict, so an undeclared field like a password hash still does not leak; the response_model schema is still the thing doing the filtering. What should be avoided is returning an ORM object with no response_model at all (or a response_model that isn't actually schema-compatible), since only then does whatever attributes the object happens to carry serialize unfiltered. Separate request and response schemas keep the wire contract decoupled from the persistence model and remain the better choice whenever a field needs renaming, computing, hiding (sensitive columns), or the response shape otherwise diverges from the ORM model's columns."

[[option]]
id = "explicit-pydantic-schemas"
label = "use explicit Pydantic request and response models"
directive = "Every endpoint that accepts a body types it as a Pydantic model so FastAPI validates and coerces input at the boundary, and every endpoint that returns data declares a `response_model` Pydantic schema that filters the output to exactly the intended fields. ORM objects and raw dicts are never accepted as request bodies. Prefer a dedicated response schema distinct from the persistence model for anything with sensitive fields or fields that need renaming, computing, or hiding — returning an ORM object directly under a compatible `response_model` (`from_attributes=True`) is an accepted, documented FastAPI pattern for simple pass-through cases, not something to blanket-forbid, but it only stays safe as long as the declared response_model schema (not the ORM model's own field set) is what's actually filtering the output."
why = "Pydantic schemas validate input at the boundary and filter output, preventing both malformed input and accidental field leakage; a compatible response_model still provides that filtering even when the underlying returned object is an ORM instance rather than a hand-built schema instance."

[[option]]
id = "raw-dict-bodies"
label = "accept raw dicts and return ORM objects directly with no response_model"
directive = "Endpoints accept untyped `dict` request bodies and return ORM model instances directly with no `response_model` declared, validating and shaping data by hand where needed."
why = "Discards FastAPI's boundary validation, risks unchecked KeyErrors, and — critically, because no response_model is declared to filter the output — leaks internal ORM fields (e.g. password hashes) into responses. This is a different failure mode from returning an ORM object under a compatible, sensitive-field-free response_model, which is a supported pattern; the danger is specifically the missing (or mismatched) response_model, not the mere fact that the returned object came from the ORM."

