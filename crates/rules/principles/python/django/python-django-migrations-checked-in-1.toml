id = "PYTHON-DJANGO-MIGRATIONS-CHECKED-IN-1"
title = "Migrations are generated by makemigrations, reviewed, and committed; manual schema changes are forbidden"
tag = "stack"
domain = "python:django"
layer = "framework"
enforcement = "structured"
default = true

[decision]
question = "How are database schema changes tracked and applied across environments?"
default = "makemigrations-committed"
why = "Django's migration system is the authoritative record of the database schema's evolution. When migration files are committed alongside the model changes that produced them, every environment (development, CI, staging, production) applies exactly the same sequence of schema changes in the same order via `migrate`. Excluding migrations from the repository means each environment must run `makemigrations` independently, which diverges when models differ between branches, produces non-deterministic migration numbering, and prevents the CI pipeline from verifying that migrations apply cleanly. Applying schema changes directly to the database via psql or a GUI tool bypasses Django's migration state entirely, leaving the `django_migrations` table out of sync with the actual schema and causing `migrate` to fail or skip applied changes."

[[option]]
id = "makemigrations-committed"
label = "makemigrations generates migrations; files are committed and applied with migrate"
directive = "Every model change is accompanied by a migration generated with `python manage.py makemigrations` in the same commit or pull request. Migration files under `app/migrations/` are committed to version control and never listed in `.gitignore`. CI runs `python manage.py migrate --check` (Django 4.2+) or validates that all migrations have been applied, failing the build if uncommitted migrations exist. Direct DDL changes to the database schema outside of Django migrations (via psql, a GUI tool, or raw SQL) are forbidden except in explicitly approved emergency hotfix procedures with a compensating migration committed immediately after."
why = "The adopted default. Committed migrations make the schema evolution history deterministic and reviewable; CI can validate that no model change was left without a migration."

[[option]]
id = "migrations-gitignored"
label = "exclude migrations from version control; regenerate per environment"
directive = "Migration files are listed in `.gitignore`; each environment runs `makemigrations` and `migrate` independently."
why = "Migration numbering diverges across branches; CI cannot verify clean application; production environments may apply different schema changes than dev."

[[option]]
id = "manual-ddl"
label = "apply schema changes directly to the database without migrations"
directive = "Schema changes are made by running SQL DDL (CREATE TABLE, ALTER TABLE) directly against the database, with no migration file generated."
why = "Bypasses Django's migration state; `django_migrations` table drifts from the actual schema; `migrate` in future environments will either fail or skip the applied change."
