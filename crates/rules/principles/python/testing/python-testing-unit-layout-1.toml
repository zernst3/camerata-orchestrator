id = "PYTHON-TESTING-UNIT-LAYOUT-1"
title = "Unit tests live in a top-level tests/ directory mirroring the source tree"
tag = "stack"
domain = "python:testing"
layer = "language"
enforcement = "structured"
default = true
qualifies = "Conformance holds when unit tests live in a top-level tests/ (or src/-sibling tests/) directory whose layout mirrors the application package hierarchy; it fails when test files are scattered inside production modules without a dedicated tests/ root, or when the project has no clear unit/integration split."
verification = "grounded"

[decision]
question = "Where do unit tests for a Python project live relative to application source?"
default = "top-level-tests-dir"
why = "pytest's own good-integration-practices guide documents two canonical layouts: a separate top-level tests/ directory (strongly recommended for new projects using the src/ layout) and inline tests co-located with application code. The separate layout is preferred because it keeps test files from being accidentally included in an installed package, lets tests run against the installed artifact, and makes the project structure obvious at a glance. When the project uses src/ the tests/ tree sits alongside src/: `src/mypkg/` and `tests/test_mypkg.py`. Within tests/, unit tests are further separated from integration tests (e.g. tests/unit/ vs tests/integration/) so that fast, isolated tests can be run without triggering network or database access. Without a canonical location, tests spread into production modules or proliferate at the repo root, making coverage reporting, CI filtering, and on-boarding harder."

[[option]]
id = "top-level-tests-dir"
label = "separate top-level tests/ directory mirroring the source hierarchy"
directive = "All test files live in a top-level tests/ directory (or, for src-layout projects, a tests/ sibling to src/). The directory tree within tests/ mirrors the application package structure: a module at src/mypkg/foo.py has its unit tests in tests/unit/test_foo.py. Unit tests (no I/O, no network, no database) go under tests/unit/; integration tests that touch external systems go under tests/integration/. Each subdirectory may contain a conftest.py for scope-local fixtures. Test files are named test_<module>.py. No test files live inside the application package unless the project explicitly chose the co-located-inline layout."
why = "The adopted default. Keeps tests out of the installed package, allows running tests against the installed artifact, and makes the project layout obvious."

[[option]]
id = "inline-colocated"
label = "inline tests/ subdirectory inside each application package"
directive = "Each application package contains a tests/ subdirectory alongside its modules: mypkg/tests/test_foo.py. Tests are distributed with the package."
why = "Useful when tests are tightly coupled to a package that ships as a library and must be distributable with it; adds import complexity and is not the default for new projects."

[[option]]
id = "scattered"
label = "no fixed location; test files live wherever convenient"
directive = "Test files are placed wherever the author chooses, mixed with production code or at the repo root."
why = "Avoided: makes coverage reporting, CI filtering, and contributor orientation significantly harder."

[[sources]]
url = "https://docs.pytest.org/en/stable/explanation/goodpractices.html"
title = "pytest — Good Integration Practices (Choosing a test layout)"
