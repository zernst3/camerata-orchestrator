id = "PYTHON-TESTING-FIXTURES-CONFTEST-1"
title = "Shared test setup lives in conftest.py fixtures, not in setUp helpers or module-level globals"
tag = "stack"
domain = "python:testing"
layer = "language"
enforcement = "structured"
default = true
qualifies = "Conformance holds when reusable test setup is expressed as @pytest.fixture functions in a conftest.py file at the appropriate scope level (top-level for all tests, subdirectory for a subset); fixtures declare their teardown via yield; test functions receive shared setup by naming the fixture as a parameter. Fails when tests copy-paste setup code, use module-level globals for shared state, or call helper functions directly from test bodies in ways that duplicate teardown logic."
verification = "grounded"

[decision]
question = "How should reusable test setup and teardown be organized across test files?"
default = "fixtures-in-conftest"
why = "pytest's fixture system is designed to replace both the manual setUp/tearDown methods of unittest.TestCase and ad-hoc module-level helper functions. Fixtures are explicit (test functions declare what they need as parameters), modular (each fixture has a single responsibility), and composable (fixtures can request other fixtures). The conftest.py file is pytest's mechanism for sharing fixtures across test modules within a directory: any fixture defined in a conftest.py is automatically available to every test file in that directory tree without an import. Fixture scope (function, module, session) controls lifetime: expensive resources are created once at the session or module level and shared safely. Teardown declared after a yield runs in reverse-creation order, preventing resource leaks even when tests fail. Duplicating setup in each test body or using module globals for shared state bypasses all of this, making teardown fragile and setup logic hard to maintain."

[[option]]
id = "fixtures-in-conftest"
label = "shared fixtures in conftest.py; teardown via yield"
directive = "All reusable test setup is written as @pytest.fixture functions. Fixtures that are used by tests in more than one module are placed in a conftest.py file at the lowest directory level that contains all consuming tests. Directory-specific fixtures go in that directory's conftest.py; project-wide fixtures go in tests/conftest.py. Teardown code is placed after a yield in the fixture body (not in a try/finally or addfinalizer unless exceptional circumstances require it). Fixtures are scoped to function by default; set scope='module' or scope='session' only for expensive resources that are safe to share. Test functions name their fixtures as parameters; pytest injects the fixture return value automatically."
why = "Explicit, modular, composable; teardown is guaranteed; no duplication; fixture scope controls sharing safely."

[[option]]
id = "setup-teardown-methods"
label = "setUp / tearDown methods on TestCase classes"
directive = "Tests are organized as unittest.TestCase subclasses with setUp and tearDown methods for setup and cleanup."
why = "Compatible with pytest's runner but forgoes pytest's injection, composability, and scope controls. New code should prefer the fixture model."

[[option]]
id = "module-globals"
label = "module-level globals or helper functions for shared state"
directive = "Shared state is created at module import time and mutated/reset by helper functions called from test bodies."
why = "Teardown is manual and fragile; state leaks between tests when a test fails mid-body; no scope control."

[[sources]]
url = "https://docs.pytest.org/en/stable/how-to/fixtures.html"
title = "pytest — How to use fixtures (conftest.py, scope, yield teardown)"

[[sources]]
