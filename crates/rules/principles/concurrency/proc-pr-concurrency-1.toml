id = "PROC-PR-CONCURRENCY-1"
title = "PR template forces a concurrency story"
tag = "stack"
domain = "concurrency"
layer = "universal"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: PR template forces a concurrency story?"
default = "pr-template-forces-a-concurrency-story"
why = "Forcing authors to make the concurrency analysis visible and required catches races that review otherwise misses. Without a required template section, the concurrency story depends on whatever discipline the author and reviewer happen to bring to the diff that day, and races slip through review by default precisely because nothing on the PR surface forces the analysis to be written down."

[[option]]
id = "pr-template-forces-a-concurrency-story"
label = "PR template forces a concurrency story"
directive = "PRs touching shared mutable state must document the locking strategy and concurrency testing in a required template section. Skippable for read-only / UI / docs PRs."
why = "The adopted default. Forcing authors to make the concurrency analysis visible and required catches races that review otherwise misses."

[[option]]
id = "prs-touching-shared-mutable-state-are-reviewed-w"
label = "PRs touching shared mutable state are reviewed without a …"
directive = "PRs touching shared mutable state are reviewed without a required template section calling out the locking strategy or concurrency testing; the concurrency story is left to whatever the author chooses to include in the description"
why = "A defensible alternative the project considered and did not adopt as the default."
