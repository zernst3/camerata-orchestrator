id = "PROC-REGRESSION-TEST-1"
title = "Every bug fix ships with a regression test that fails before the fix and passes after"
tag = "universal"
domain = "*"
layer = "universal"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Every bug fix ships with a regression test that fails before the fix and passes after?"
default = "every-bug-fix-ships-with-a-regression-test-that"
why = "Without a regression test, the bug is gone today and free to recur tomorrow because nothing in CI is watching for it. The next refactor, the next dependency upgrade, the next AI-authored change in the same area can reintroduce the exact same defect and the suite will still pass. The cost of writing the test is paid once; the cost of the same bug returning is paid every time it does. The test must fail before the fix specifically (not just pass after) because a test that passes against both pre- and post-fix code is testing something other than the bug, and its presence creates false confidence that the bug is now guarded. The rule applies to every author but is load-bearing for AI-authored fixes, because an agent fixing a symptom has no instinct to encode the failure mode as a permanent guard unless the workflow requires it. Fixing the bug without any test removes the immediate defect but leaves zero regression guard, so the same failure can be reintroduced by the next change with no signal. Adding a test only for bugs in load-bearing or hot paths keeps test debt low but produces a two-tier system where 'minor' bug fixes have no guard at all, and the judgment of which bugs are minor is exactly the kind of call that drifts over time. Documenting the reproduction steps in the PR description instead of as a test produces a record that no automated system reads, so it does not actually protect against recurrence and decays as the PR scrolls off the recent list. Relying on canary or staging to surface the bug if it recurs does catch some recurrences but only after the fix has shipped, by which point the cost of acting on it is higher and the link back to the original fix has often been lost."

[[option]]
id = "every-bug-fix-ships-with-a-regression-test-that"
label = "Every bug fix ships with a regression test that fails before the fix and passes after"
directive = "A change that fixes a bug includes, in the same change, a test that fails on the pre-fix code and passes on the post-fix code. The test lives at whichever layer of the test pyramid naturally exercises the bug (unit if the bug is in pure logic, integration if it is in component wiring, end-to-end if it is in a user-visible flow). The author confirms the failing-then-passing behavior before submitting the change. A bug-fix change with no accompanying test, or with a test that passes on the pre-fix code as well, is incomplete regardless of whether the surrounding suite goes green."
why = "The adopted default. Without a regression test, the bug is gone today and free to recur tomorrow because nothing in CI is watching for it."

[[option]]
id = "the-bug-fix-lands-without-any-accompanying-test"
label = "the bug fix lands without any accompanying test; the …"
directive = "the bug fix lands without any accompanying test; the project relies on the surrounding test suite staying green to catch any related regression in the future"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-bug-fix-lands-with-a-regression-test-only-wh"
label = "the bug fix lands with a regression test only …"
directive = "the bug fix lands with a regression test only when the bug occurred in a load-bearing or hot code path; bugs in less critical areas are fixed without a test"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-bug-fix-lands-without-a-regression-test-but"
label = "the bug fix lands without a regression test, but …"
directive = "the bug fix lands without a regression test, but the PR description documents the reproduction steps so a future investigator can re-run them manually if the bug appears to recur"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-bug-fix-lands-without-a-regression-test-the"
label = "the bug fix lands without a regression test; the …"
directive = "the bug fix lands without a regression test; the project relies on canary or staging environments to surface any recurrence after the fix has shipped"
why = "A defensible alternative the project considered and did not adopt as the default."
