id = "ARCH-NO-SECRETS-IN-URL-1"
title = "Secrets and credentials travel in the request body or headers, never a URL; credential-carrying forms POST so they stay safe before hydration"
tag = "universal"
domain = "universal"
layer = "universal"
enforcement = "structured"
default = true
qualifies = "Enforcement reality (read this before assuming you must build a checker): Camerata enforces this deterministically at the layer-1 MCP write gate — it is part of the mandatory security FLOOR, so it is always on, not opt-in, and there is no chosen option that turns it off. You do NOT build that check; Camerata's pipeline holds it on every write it gates. The one caveat: the floor only covers writes made THROUGH Camerata's pipeline. If you also want this property enforced at layer 4 (the repo's own origin CI, catching commits made outside Camerata), that part still requires a bespoke check wired into the repo's CI — Camerata's layer-1 gate does not reach origin."
verification = "grounded"

[[sources]]
url = "docs/ENFORCEMENT.md"
title = "docs/ENFORCEMENT.md — RULE_REGISTRY §ARCH-NO-SECRETS-IN-URL-1 (enforced gate rule)"

[decision]
question = "Where do credentials, tokens, and other secrets go in transit, and how do credential-carrying forms submit before client JavaScript has run?"
default = "body-or-headers-and-forms-post"
why = "A URL is the least private part of a request: it is written to server and proxy access logs, browser history, the Referer header sent to third parties, and analytics pipelines. Anything in the query string or a path segment is effectively logged in cleartext across systems the application does not control, so credentials, session tokens, API keys, reset/verification tokens, TOTP codes, and PII must never appear in one. The subtle trap is the single-page-app form whose submit is handled by client JavaScript: before the client bundle hydrates (or if the script fails to load), the browser performs the form's NATIVE submission, and a form with no explicit method defaults to GET, which serializes every field including the password and TOTP into the URL query string. Defaulting credential-carrying forms to method=POST makes the secure behavior hold even with no JavaScript, so a hydration failure degrades gracefully instead of leaking credentials into logs and history."

[[option]]
id = "body-or-headers-and-forms-post"
label = "Secrets in body/headers; credential forms default to POST"
directive = "Credentials, tokens, secrets, and PII are transmitted only in the request body or in headers, never in a URL path or query string: no token, password, or session value as a query parameter, and no secret in a path segment. Every form that carries a credential or secret sets its method to POST explicitly, so a native submission (before the client bundle hydrates, or with JavaScript disabled or failed) posts the values in the request body rather than falling back to a GET that serializes them into the URL. Endpoints that accept secrets reject them when supplied via the query string. This is defense-in-depth: the protection must hold even when the client-side script that would intercept the submit has not run."
why = "A URL leaks into access logs, browser history, Referer headers, and analytics; declaring sensitive forms method=POST keeps secrets out of the URL even before the client hydrates, turning a script failure into graceful degradation rather than a credential disclosure."

[[option]]
id = "rely-on-client-js-to-intercept-the-submit"
label = "Rely on client JS to intercept the submit (no explicit method)"
directive = "credential-carrying forms omit an explicit method and rely entirely on client-side JavaScript to intercept the submit and send the values out-of-band, accepting the browser's native GET fallback whenever that script has not yet run"
why = "Rejected: before hydration, or on any script load/runtime failure, the browser performs the form's default GET and places the password and TOTP in the URL query string, where they leak into logs, history, and Referer headers. It looks correct in the happy path and silently discloses credentials in the failure path, which is the worst shape for a security control."

[[option]]
id = "allow-secrets-in-url-for-convenience"
label = "Allow secrets in the URL for convenience (query tokens, magic links)"
directive = "session, reset, or verification tokens are placed in URL query strings or path segments for convenience (emailed magic links, shareable URLs), accepting that the values appear in logs and history"
why = "Rejected as a general rule: URL-borne tokens are logged across every network hop and persist in browser history. Where a one-time URL token is genuinely required (an emailed verification link), it is a narrow exception that must be single-use, short-lived, and tightly scoped, never the default for credentials, passwords, or session material."
