id = "SEC-NO-SECRET-FILE-1"
title = "Secret-bearing files (.pem, .p12, .pfx, .key, .jks, .keystore, id_rsa/dsa/ecdsa/ed25519, real .env files) are never committed"
tag = "universal"
domain = "universal"
layer = "universal"
enforcement = "mechanical"
default = true
verification = "grounded"

[[sources]]
url = "docs/ENFORCEMENT.md"
title = "docs/ENFORCEMENT.md — RULE_REGISTRY §SEC-NO-SECRET-FILE-1 (enforced gate rule)"

[[sources]]
url = "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
title = "OWASP Secrets Management Cheat Sheet"

[decision]
question = "Which file types are categorically secret-bearing and must never be committed?"
default = "deny-secret-file-types"
why = "Certain file extensions and names are used by convention exclusively for secret material: .pem (PEM certificates and keys), .p12/.pfx (PKCS#12 key stores), .key (generic private key), .jks/.keystore (Java key stores), and the conventional SSH/signing private key filenames (id_rsa, id_dsa, id_ecdsa, id_ed25519). Real .env files (not templates) hold live credentials for the current environment. Committing any of these to a repository is a secret leak by extension/name alone — the gate can deny them without reading the content. Template files (.env.example, .env.sample, .env.template, .env.dist) are explicitly allowed because they hold no real secrets."

[[option]]
id = "deny-secret-file-types"
label = "Deny secret-bearing file types by extension and name"
directive = "Files with extensions .pem, .p12, .pfx, .key, .jks, .keystore and files named id_rsa, id_dsa, id_ecdsa, or id_ed25519 are never committed to the repository. Real .env files (.env, .env.production, .env.staging, .env.local, etc.) are denied; template files (.env.example, .env.sample, .env.template, .env.dist, .env.defaults, .env.tpl) are explicitly allowed. Certificates (.crt, .cer) and public keys may be committed. This rule is a companion path-check to SEC-NO-PRIVATE-KEY-1 (which checks content) for the brownfield audit."
why = "Path-based denial is the cheapest and most reliable layer: it fires before any content scanning and has a near-zero false-positive rate because these file types have no legitimate use in a source repository. A certificate (.crt) is explicitly not denied because public certificates are routinely bundled with services for TLS configuration."

[[option]]
id = "allow-secret-files-with-gitignore"
label = "Allow secret-bearing files, rely on .gitignore"
directive = ".gitignore prevents secret files from being committed; the gate does not need to enforce file types"
why = "Rejected: .gitignore is advisory and bypassable (git add -f). A gitignore miss is a silent disclosure; a gate deny is a loud failure. Defense in depth requires both."
