id = "SPIRIT-DOC-DECISIONS-1"
title = "Document decisions immediately"
tag = "universal"
domain = "universal"
layer = "universal"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "CONVENTIONS.md"
title = "CONVENTIONS.md — §SPIRIT-DOC-DECISIONS-1 (document decisions immediately)"

[[sources]]
url = "https://www.cognitect.com/blog/2011/11/15/documenting-architecture-decisions"
title = "Michael Nygard — Documenting Architecture Decisions (the source of the ADR pattern; the 'immediately' strengthening beyond ADR-on-drift is project-specific)"

[decision]
question = "What position does the project take on: Document decisions immediately?"
default = "document-decisions-immediately"
why = "Decisions made only in conversation evaporate; agents cannot cite them and humans re-derive them. A multi-actor, multi-session system depends on durable artifacts, not memory. Batching documentation into a later pass reliably causes drift and re-litigation, because memory fades faster than the documentation pass arrives, so by the time the batched pass runs the decisions have already been silently re-derived or contradicted in subsequent work."

[[option]]
id = "document-decisions-immediately"
label = "Document decisions immediately"
directive = "Every decision (architectural, process, convention, even small) is written to a persistent artifact the moment it is made: a conventions file with a rule ID for code, a dated decision doc for process."
why = "Decisions made only in conversation evaporate; agents cannot cite them and humans re-derive them."

[[option]]
id = "decisions-accumulate-in-conversation-as-they-are"
label = "Document decisions later in a batched pass"
directive = "decisions accumulate in conversation as they are made and are written to durable artifacts in a documentation pass later, batched by week, sprint, or feature shipment"
why = "Batching documentation into a later pass reliably causes drift and re-litigation: memory fades faster than the documentation pass arrives, so subsequent work silently re-derives or contradicts decisions before the batch is ever written."
