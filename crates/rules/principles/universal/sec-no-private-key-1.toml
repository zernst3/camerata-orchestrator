id = "SEC-NO-PRIVATE-KEY-1"
title = "PEM private-key blocks are never committed to the repository; ephemeral keys are generated at test runtime"
tag = "universal"
domain = "universal"
layer = "universal"
enforcement = "mechanical"
default = true
verification = "grounded"

[[sources]]
url = "docs/ENFORCEMENT.md"
title = "docs/ENFORCEMENT.md — RULE_REGISTRY §SEC-NO-PRIVATE-KEY-1 (enforced gate rule)"

[[sources]]
url = "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/removing-sensitive-data-from-a-repository"
title = "GitHub Docs — Removing sensitive data from a repository"

[decision]
question = "Where do private key materials live, and how are they supplied to tests?"
default = "secrets-manager-or-generated"
why = "A committed private key is a catastrophic and irreversible secret leak: git history is permanent and widely mirrored. Even a key committed for 'one second' and immediately revoked can have been cloned. RSA, EC, DSA, OPENSSH, PGP, and PKCS#8 private-key headers all indicate real key material that must never reach the repo. Tests that genuinely need a private key must generate one at runtime (using the crypto library under test) or retrieve it from a secrets manager at test startup."

[[option]]
id = "secrets-manager-or-generated"
label = "Private keys live in a secrets manager or are generated at test runtime"
directive = "Private key material (RSA, EC, DSA, OPENSSH, PGP, PKCS#8) is never committed to the repository in any branch or file. Tests that require a key generate it at runtime using the appropriate crypto library; integration tests retrieve it from a secrets manager or environment variable at test startup. Public keys and certificates may be committed. The gate enforces this by denying any file content containing a PEM private-key block header."
why = "Git history is permanent: a committed private key is immediately mirrored to forks, pull-request caches, and CI artifact stores. Revocation after a commit is harder than preventing the commit. Runtime key generation is a one-liner in every major crypto library."

[[option]]
id = "commit-keys-for-tests"
label = "Commit fake private keys for test fixtures"
directive = "Test fixture private keys are committed alongside the tests that use them, clearly marked as non-production values"
why = "Rejected: even clearly-labelled 'fake' PEM blocks trigger automated secret-scanning and CI failures, normalize the pattern of key material in the repo, and are occasionally real keys mislabelled as fake. Runtime generation eliminates the cost with no upside loss."
