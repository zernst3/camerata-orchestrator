id = "SPIRIT-ROBUSTNESS-1"
title = "Robustness over terseness, but buy complexity only against a named threat"
tag = "universal"
domain = "*"
layer = "universal"
enforcement = "prose"
default = true

[[emits]]
target = "aicodingrules"

[decision]
question = "What position does the project take on: Robustness over terseness, but buy complexity only against a named threat?"
default = "robustness-over-terseness-but-buy-complexity-onl"
why = "Two-part calculus. (1) Explicitness is near-free under AI because the AI writes the boilerplate, so the pre-AI tradeoff (terseness to cut maintenance tax) inverts and the more explicit version usually wins. (2) Complexity is not free. Hardening against an unnamed threat wastes attention and creates false complexity. Prefer explicit by default; justify complex by a named threat. The terseness-default is the pre-AI position whose calculus inverts as soon as AI writes the boilerplate, since the maintenance tax it was protecting against has been amortized away. Always-defensive over-engineers low-stakes code, hardens fully-encapsulated internals with no real attack surface, and accumulates the false-complexity tax that part (2) of the rule exists to prevent."

[[option]]
id = "robustness-over-terseness-but-buy-complexity-onl"
label = "Robustness over terseness, but buy complexity only against a named threat"
directive = "When two correct implementations differ, robustness (not verbosity) is the deciding axis. Choose the more explicit version. AI bears the boilerplate cost, and explicitness gives future AI more context to debug and extend. When the more robust option is also more complex (not just more explicit), name the specific failure mode the complexity is buying you protection against. Do not harden throwaway, internal, or fully-encapsulated code where nothing is at stake."
why = "The adopted default. Two-part calculus."

[[option]]
id = "the-more-terse-of-two-correct-implementations-is"
label = "the more terse of two correct implementations is preferred …"
directive = "the more terse of two correct implementations is preferred by default, on the pre-AI principle that less code is less to maintain"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-more-defensive-of-two-correct-implementation"
label = "the more defensive of two correct implementations is always …"
directive = "the more defensive of two correct implementations is always preferred, regardless of whether a specific failure mode justifies the added complexity"
why = "A defensible alternative the project considered and did not adopt as the default."
