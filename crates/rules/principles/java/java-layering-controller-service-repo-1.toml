id = "JAVA-LAYERING-CONTROLLER-SERVICE-REPO-1"
title = "Controller/service/repository layering is enforced; no database queries in controllers, no business logic in repositories"
tag = "stack"
domain = "java:spring"
layer = "architecture"
enforcement = "prose"
default = true
qualifies = "Enforced by package structure conventions and code review. Controllers are in @Controller or @RestController classes; services are in @Service classes; repositories are in @Repository or Repository classes. Static analysis can flag direct @Autowired(Repository) in @Controller classes or database queries outside repository classes."
verification = "grounded"

[decision]
question = "How is layering between controllers, services, and repositories enforced?"
default = "strict-layering"
why = "A three-tier architecture (presentation / business logic / data access) keeps concerns separated and testable. Controllers should only handle HTTP concerns (request parsing, response serialization, status codes); services should contain business logic and orchestration; repositories should only handle data access (queries, transactions). When controllers query the database directly, they cannot be tested without a database, and business logic in repositories is unreachable to other clients (CLI, workers, etc.). Enforcing layering makes code reusable, testable, and maintainable."

[[sources]]
url = "https://docs.spring.io/spring-framework/reference/core/beans/classpath-scanning.html"
title = "Spring Framework Reference — Stereotype Annotations (@Controller, @Service, @Repository)"

[[option]]
id = "strict-layering"
label = "enforce strict separation: controllers → services → repositories"
directive = "Controllers inject only @Service beans and handle HTTP serialization. Services contain business logic, validation, and orchestration; they inject @Repository beans or data sources. Repositories contain only data access code (queries, save/delete operations, transaction handling). Database calls never appear outside repositories. Business logic never appears in repositories or controllers."
why = "Strict layering makes code testable (mock services), reusable (CLI/workers can call services), and maintainable."

[[option]]
id = "controllers-query-database"
label = "allow controllers to inject and query repositories directly"
directive = "Controllers inject @Repository or DataSource and execute queries directly, bypassing services."
why = "Couples HTTP handlers to database schemas; services cannot be reused by CLI or worker processes; controllers cannot be unit-tested without a database."

[[option]]
id = "no-formal-layering"
label = "no enforced layering; classes handle multiple concerns"
directive = "Services and repositories are mixed; a single @Service class both handles business logic and queries the database."
why = "Code is difficult to test (every test needs a database), hard to reuse (CLI or worker clients cannot call business logic without HTTP), and tightly coupled across concerns."
