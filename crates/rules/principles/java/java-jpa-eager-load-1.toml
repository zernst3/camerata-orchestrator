id = "JAVA-JPA-EAGER-LOAD-1"
title = "JPA relationships default to lazy loading; eager loading is explicit and intentional to prevent N+1 queries"
tag = "stack"
domain = "java"
layer = "language"
enforcement = "prose"
default = true
qualifies = "Enforced by code review and performance testing. Relationships in entity definitions use @OneToMany(fetch = FetchType.LAZY) by default. Eager loading is marked with @OneToMany(fetch = FetchType.EAGER) or explicitly loaded via FETCH JOIN in queries. N+1 query detection can be automated with Hibernate query inspection."
verification = "grounded"

[decision]
question = "Should JPA relationships be eagerly or lazily loaded?"
default = "lazy-by-default"
why = "Eager loading (loading related entities automatically with the parent) seems convenient but often loads unused data and causes N+1 query problems: one query for the parent entity, then one query for each related entity in a loop. Lazy loading defers loading until needed, but risks lazy-initialization exceptions if the session is closed. The best practice is lazy loading by default (smaller queries, faster in happy paths), and explicit eager loading or batch fetching only when needed. FETCH JOIN in JPQL allows explicit eager loading of specific relationships for a query, and Hibernate hints like @BatchSize(...) can batch-load relationships efficiently. Starting with lazy prevents silent N+1 bugs."

[[sources]]
url = "https://docs.spring.io/spring-data/jpa/reference/jpa/query-methods.html#jpa.entity-graph"
title = "Spring Data JPA Reference — Configuring Fetch- and LoadGraphs (@EntityGraph)"

[[option]]
id = "lazy-by-default"
label = "default to lazy loading; eager load explicitly when needed"
directive = "Relationships (@OneToMany, @ManyToOne, @OneToOne) are defined with fetch = FetchType.LAZY (or left unspecified, as LAZY is the default for @OneToMany). Eager loading is explicit and documented: use FETCH JOIN in JPQL/HQL queries when a relationship is needed with the parent, or use @BatchSize(...) or query hints to batch-load related entities. The service or query layer makes explicit decisions about which relationships to load."
why = "The adopted default. Lazy loading is efficient by default; explicit eager loading prevents N+1 queries and makes performance intentions clear."

[[option]]
id = "eager-by-default"
label = "eagerly load all related entities with the parent"
directive = "Relationships are marked with fetch = FetchType.EAGER so related entities are loaded automatically with the parent."
why = "Seems convenient but often loads unused data and causes N+1 problems. Eager loading of relationships X and Y means every query loads them even if not needed; if X has its own relationship Z, that is loaded too, causing a cascade of unnecessary queries."

[[option]]
id = "no-orm-annotations"
label = "do not use ORM annotations; manually manage relationships"
directive = "Relationships are not annotated; the application manually loads and maps related entities."
why = "More control but significantly more boilerplate and error-prone."
