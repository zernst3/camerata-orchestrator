id = "JAVA-LOGGING-STRUCTURED-1"
title = "Logging is structured and machine-readable using a logging framework; no concatenated strings printed to stdout"
tag = "stack"
domain = "java"
layer = "language"
enforcement = "prose"
default = true
qualifies = "Enforced by code review and Checkstyle rules that flag System.out.println() and System.err.println() in production code. Conformance requires slf4j or a similar logging framework with structured fields."
verification = "grounded"

[decision]
question = "How is diagnostic information logged?"
default = "structured-logging-framework"
why = "Structured logging (using slf4j, Log4j, or similar) produces machine-readable output (JSON or key-value pairs) that can be parsed, indexed, and searched by centralized logging systems (Elasticsearch, Splunk, CloudWatch). Concatenating strings and printing to stdout or stderr is unstructured, cannot be easily searched, is hard to correlate with application events, and gets lost or buffered in container environments. Structured logging also supports multiple output formats and log levels (debug, info, warn, error) that can be dynamically configured without recompilation. Exception objects are properly serialized with full stack traces, not mangled in string concatenation."

[[sources]]
url = "https://pmd.github.io/pmd/pmd_rules_java_bestpractices.html#systemprintln"
title = "PMD — SystemPrintln: References to System.out/err.print should use a logger"
linter = "PMD: SystemPrintln"

[[option]]
id = "structured-logging-framework"
label = "use a logging framework (slf4j, Log4j, Logback) with structured output"
directive = "Logging is done via a logging framework (slf4j with Logback or Log4j2 is standard in Spring). Log statements use {} placeholders (log.info(\"User {} logged in\", userId)) and attach contextual fields as needed (MDC for thread context, structured fields in the log record). Log levels (debug, info, warn, error) are used appropriately. Exception objects are logged with the exception parameter so stack traces are included. Configuration (log level, output format, filters) is external (logback.xml or application.yml), not hardcoded."
why = "Structured logging is machine-readable, searchable, and integrates with centralized logging systems."

[[option]]
id = "system-print-statements"
label = "print diagnostic output to System.out or System.err"
directive = "Diagnostic information is printed via System.out.println() or System.err.println()."
why = "Unstructured, unsearchable, hard to correlate with events, and inefficient in containerized environments. Lost in logs or buffered unpredictably."

[[option]]
id = "custom-string-concatenation"
label = "build log messages by concatenating strings and calling log.info()"
directive = "Log messages are built by concatenating strings (\"User \" + userId + \" logged in\") before passing to the logger."
why = "Inefficient (string concatenation happens even when the log level is filtered out) and loses the opportunity to attach structured fields."
