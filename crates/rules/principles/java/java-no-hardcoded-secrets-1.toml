id = "JAVA-NO-HARDCODED-SECRETS-1"
title = "Credentials, keys, and secrets are never embedded in source code; they are loaded from environment variables or secure vaults"
tag = "stack"
domain = "java"
layer = "language"
enforcement = "mechanical"
default = true
qualifies = "Enforced by static analysis (Semgrep, Gitleaks, Checkstyle, or IDE linters) that detect common secret patterns (api_key = \"...\", password = \"...\", token = \"...\") in source files and string literals. Conformance holds when the gate runs in CI and hardcoded secrets fail the build."
verification = "grounded"

[decision]
question = "Where are credentials and secrets stored?"
default = "environment-or-vault"
why = "Embedding secrets in source code is an immediate security breach. The secret enters the git history permanently (even if deleted later), is visible to anyone with repository access, leaks when the repository is cloned or shared, and becomes part of every container image that uses the code. Once a secret is in git history, it must be considered compromised and rotated everywhere. Environment variables or secure vaults (HashiCorp Vault, AWS Secrets Manager, Azure Key Vault) are designed to keep secrets outside the codebase, allow rotation without redeployment, and enforce access control."

[[sources]]
url = "https://find-sec-bugs.github.io/bugs.htm#HARD_CODE_PASSWORD"
title = "Find Security Bugs — HARD_CODE_PASSWORD: Hard coded password"
linter = "SpotBugs/FindSecBugs: HARD_CODE_PASSWORD"

[[sources]]
url = "https://find-sec-bugs.github.io/bugs.htm#HARD_CODE_KEY"
title = "Find Security Bugs — HARD_CODE_KEY: Hard coded cryptographic key"
linter = "SpotBugs/FindSecBugs: HARD_CODE_KEY"

[[option]]
id = "environment-or-vault"
label = "load secrets from environment variables or a secure vault"
directive = "Credentials (database passwords, API keys, OAuth tokens, etc.) are loaded at runtime from environment variables using System.getenv(...) or from a secure vault (Vault, AWS Secrets Manager, Azure Key Vault). Source code contains only the configuration key name, not the actual secret. The application fails fast with a clear error if a required secret is missing at startup."
why = "The adopted default. Secrets stay out of the codebase and history, can be rotated without redeployment, and are protected by the vault's access controls."

[[option]]
id = "hardcoded-in-source"
label = "embed secrets as string literals in source code"
directive = "Database passwords, API keys, and tokens are defined as string literals or constants in .java files."
why = "Immediately compromises the secret; it enters git history permanently, is visible to all repository members, and persists in every built artifact."

[[option]]
id = "hardcoded-in-config-files"
label = "embed secrets in configuration files checked into git"
directive = "Credentials are stored in application.properties, application.yml, or other config files that are version-controlled."
why = "Still compromises the secret; version-controlled config files are treated the same as source code for git history and repository visibility purposes."
