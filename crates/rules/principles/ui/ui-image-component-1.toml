id = "UI-IMAGE-COMPONENT-1"
title = "Images render through a single project-level component, not framework primitives directly"
tag = "stack"
domain = "ui"
layer = "universal"
enforcement = "mechanical"
default = true
qualifies = "Enforced by the eslint-plugin-next rule @next/next/no-img-element, an off-the-shelf rule that fails the lint step on any raw <img> element in feature code and steers it to the framework image component. Conformance holds when that rule runs at error severity in CI and a feature file using a raw <img> fails the build; it fails when the rule is absent or only warns. The off-the-shelf rule covers the raw-<img> case; banning the framework primitive itself (forcing every image through a single project-level wrapper rather than next/image directly) is a project-specific extension layered on top via a no-restricted-imports config."

[[sources]]
url = "https://nextjs.org/docs/messages/no-img-element"
title = "Next.js — no-img-element ESLint rule"
linter = "eslint-plugin-next: @next/next/no-img-element"

[decision]
question = "What position does the project take on: Images render through a single project-level component, not framework primitives directly?"
default = "images-render-through-a-single-project-level-com"
why = "Image delivery carries several policy decisions baked in: which CDN URL pattern, which transform parameters, which formats to negotiate, default sizes and breakpoints, lazy-loading thresholds, fallback behavior, accessibility defaults. Letting every call site reach for the raw framework primitive spreads those decisions across the codebase and makes them impossible to evolve without touching every file. Centralizing them in one component means changing CDN strategy, adding AVIF support, or fixing an accessibility default is a single-file change. Using the framework image primitive everywhere leaves delivery policy implicit and spread across the codebase, so any future strategy change is a codebase-wide refactor. Using raw HTML img elements or native equivalents loses framework-provided lazy loading, responsive variants, and format negotiation, and produces measurable cumulative-layout-shift and bandwidth regressions. Wrapping the primitive in a helper used by some teams and not others makes the rule a culture rather than a contract, and new code drifts back to the raw primitive whenever an author has not internalized the rule."

[[option]]
id = "images-render-through-a-single-project-level-com"
label = "Images render through a single project-level component, not framework primitives directly"
directive = "All images in feature code render through a single project-level image component that wires the CDN's variants (format negotiation, no upscaling, responsive sizes), lazy-loading defaults, fallback handling, and any A11Y defaults. Direct use of framework image primitives (next/image, Image from Vue, raw <img>, platform-native Image widgets) in feature code is forbidden and enforced with a no-restricted-imports or equivalent lint rule. The project-level component is the one place image-delivery policy lives."
why = "Image delivery carries several policy decisions baked in: which CDN URL pattern, which transform parameters, which formats to negotiate, default sizes and breakpoints, lazy-loading thresholds, fallback behavior, accessibility defaults."

[[option]]
id = "feature-code-renders-images-directly-through-the"
label = "feature code renders images directly through the framework's image …"
directive = "feature code renders images directly through the framework's image primitive (next/image, Vue's Image, Flutter's Image, or equivalent) at every call site, with no project-level wrapper component"
why = "Using the framework primitive everywhere leaves delivery policy implicit and spread across the codebase; any future strategy change (CDN, format, A11Y default) becomes a codebase-wide refactor."

[[option]]
id = "feature-code-renders-images-as-raw-html-img-elem"
label = "feature code renders images as raw HTML img elements …"
directive = "feature code renders images as raw HTML img elements or platform-native image widgets, without going through the framework's image primitive or a project-level component"
why = "Raw img elements lose framework-provided lazy loading, responsive variants, and format negotiation, and produce measurable cumulative-layout-shift and bandwidth regressions."

[[option]]
id = "the-project-provides-a-project-level-image-compo"
label = "the project provides a project-level image component but its …"
directive = "the project provides a project-level image component but its use is optional, and some call sites continue to use the framework primitive directly while others wrap it"
why = "Optional use makes the rule a culture rather than a contract; new code drifts back to the raw primitive whenever an author has not internalized the rule."
