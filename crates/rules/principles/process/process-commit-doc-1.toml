id = "PROCESS-COMMIT-DOC-1"
title = "Commits carry a substantive body documenting the change"
tag = "stack"
domain = "process"
layer = "universal"
enforcement = "architectural"
# No adopted default: selecting this rule is a deliberate opt-in (like the CI
# security rules). It must NEVER be auto-recommended / pre-checked at onboarding.
default = false
opt_in_only = true
verification = "grounded"

# ── Enforcement caveat (read before treating this like a normal SSOT rule) ───────
# This is a VCS-METADATA process rule. It validates the commit BODY (the lines
# after the subject) and, optionally, the PR description — metadata produced at
# commit/PR time, not the code diff.
qualifies = "Enforced at layer 4 (CI) via a wired commit/branch metadata check (e.g. a commit-message length/body check in CI), and in Camerata's own pipeline at the VCS-action gate (commit/PR time). NOT enforced at layer 2 — these validate VCS metadata created at commit/PR, not the code diff, so the typical SSOT layer-2+4 pattern does not apply. The specific parameters (minimum body length, whether a story-id reference is required, and the story-id format) are configured in project Settings (process_rule_config), not in this rule's options. Conformance holds when the commit body (lines after the subject) — and, when PR coverage is enabled, the PR description — is substantive (at least the configured minimum characters) and, when required, contains a story-id reference in the configured format; it fails on an empty or token body. Because the gate reads metadata Camerata itself authors, the chokepoint is complete by construction inside the pipeline; the layer-4 CI check extends the same contract to commits made outside Camerata."

[[sources]]
url = "https://cbea.ms/git-commit/"
title = "How to write a Git commit message (body conventions)"

[[sources]]
url = "https://commitlint.js.org/"
title = "commitlint — lint commit messages against a convention (CI-wirable)"
linter = "commitlint"

[decision]
question = "Does the project require every commit to carry a substantive body (and optionally a story-id reference), enforced over VCS metadata at the commit/PR gate and in CI?"
why = "A commit body is where the WHY of a change is recorded — the reasoning a future reader (or an AI agent) needs but cannot recover from the diff alone. Requiring a substantive body, and optionally a story-id linking the commit to a tracked work item, keeps that context attached to the history rather than lost in a chat thread or a closed ticket. Because this is a contract over the commit BODY and PR description (metadata authored at commit/PR time, not the code diff), it cannot be enforced at the layer-2 code gate that inspects the diff — it is enforced at layer 4 (CI) and at Camerata's own VCS-action gate when Camerata authors the commit. The minimum length, the story-id requirement, and the story-id format are project-specific and live in project Settings (process_rule_config), not in this rule. Opting out lets terse or empty commit bodies land, which is faster but loses the rationale trail."

[[option]]
id = "require-substantive-commit-body"
label = "Require a substantive commit body (and optional story-id)"
directive = "Every commit must carry a body (the lines after the subject) that is substantive — at least the configured minimum characters — and, when the project requires it, a story-id reference in the configured format (e.g. bare `#42`, `AB#123`, or `PROJ-42`). When PR coverage is enabled the same body/id requirement applies to the PR description and title. Enforced at layer 4 (CI) via a wired commit/PR metadata check and at Camerata's VCS-action gate when Camerata authors the commit. An empty or token body is rejected pending correction or an auditable bypass. NOT enforced at the layer-2 code gate — the rule validates commit metadata, not the diff. Parameters (minimum length, story-id requirement and format, PR coverage) live in project Settings."
why = "The commit body is the only durable record of WHY a change was made; requiring it at the metadata gate (CI + the VCS-action gate) keeps the rationale and the work-item link attached to the history, where no code gate would ever see them."

[[option]]
id = "no-commit-body-requirement"
label = "Do not require a commit body"
directive = "Commit bodies are optional and unconstrained; the project places no minimum-length or story-id requirement on commit or PR descriptions."
why = "Optional bodies are faster to author but lose the rationale trail and the work-item linkage, leaving future readers and agents to reconstruct intent from the diff alone."
