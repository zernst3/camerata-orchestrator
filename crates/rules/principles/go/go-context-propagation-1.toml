id = "GO-CONTEXT-PROPAGATION-1"
title = "Context is propagated through the call stack; request timeouts and cancellation flow to all goroutines"
tag = "stack"
domain = "go"
layer = "language"
enforcement = "structured"
default = true
qualifies = "A context.Context carrying a deadline, timeout, or cancellation signal should flow from the HTTP handler (or entry point) through every layer of the call stack to all goroutines spawned. This ensures that if the client disconnects or a deadline is exceeded, all downstream work (database queries, subprocess calls, external API calls) is cancelled, preventing wasted work and resource leaks."

[decision]
question = "How are request deadlines and cancellation signals propagated through layers?"
default = "context-propagation"
why = "Go's context.Context is the idiomatic way to signal request boundaries, deadlines, and cancellation. When a client disconnects or a timeout is reached, the context's Done channel closes and context.Err() returns the reason. Every layer that spawns goroutines or makes blocking calls should respect the context by either passing it downstream or checking context.Err() before spending work. When context is not propagated, goroutines spawned in response to a request continue running even after the client hangs up or the deadline passes, wasting CPU and memory. Database queries without a context timeout can hang indefinitely. The propagation is brief (ctx is the first parameter by convention) and the defensive checks are minimal (select on ctx.Done() or passing ctx to library calls), so there is no reason to omit it."

[[option]]
id = "context-propagation"
label = "propagate context through every layer and goroutine"
directive = "HTTP handlers receive context.Context from the http.Request (via r.Context()) or create a context with a timeout. This context is passed as the first parameter to every downstream function. When a function spawns a goroutine, it passes the context or creates a child context with context.WithCancel or context.WithTimeout. Database queries use a context-aware driver (e.g., db.QueryContext(ctx, ...) not db.Query(...)). Goroutines check context.Err() or use select { case <-ctx.Done(): ... } to exit gracefully when the context cancels."
why = "The adopted default. Context propagation ensures that cancelled requests do not waste work downstream, and deadlines flow to all blocking operations."

[[option]]
id = "context-optional"
label = "treat context as optional; spawn goroutines without context"
directive = "Goroutines are spawned without context, or context is created locally but not threaded through layers. Database queries use the non-context variants (db.Query instead of db.QueryContext)."
why = "Omits propagation and risks goroutine leaks and wasted work when requests are cancelled or deadlines are exceeded."
