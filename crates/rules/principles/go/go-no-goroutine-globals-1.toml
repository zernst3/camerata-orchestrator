id = "GO-NO-GOROUTINE-GLOBALS-1"
title = "Goroutine-unsafe state is never stored in global or package-level variables; mutable state is thread-local or guarded by locks"
tag = "stack"
domain = "go"
layer = "language"
enforcement = "structured"
default = true
qualifies = "Package-level variables that are not read-only or protected by locks (mutex, channels) can be accessed concurrently by multiple goroutines, causing races. Go's -race detector catches many such bugs at runtime; the rule is to avoid the situation entirely by keeping mutable state off the package level."

[decision]
question = "Where are goroutine-unsafe mutable values stored?"
default = "no-goroutine-unsafe-globals"
why = "Go programs are concurrent by default: any http.Handler or background task runs in its own goroutine, and multiple goroutines can call the same function at the same time. If a package-level variable is mutated without synchronization, two goroutines might read and write it simultaneously, corrupting the data (e.g., incrementing a counter twice when both goroutines read the same value). The Go data-race detector flags many such bugs but cannot catch all of them. The fix is to keep mutable state off the package level entirely: move it into function scope, into a struct that synchronizes access (mutex, channels), or into a request-scoped context. Read-only values (initialized once at init time and never modified) are safe on the package level."

[[option]]
id = "no-goroutine-unsafe-globals"
label = "never store mutable state in globals; use structs with locks or channels"
directive = "Mutable state is never stored in package-level variables. If multiple goroutines need to coordinate (e.g., a service instance that holds a database connection pool), that state is stored in a struct that is instantiated once and passed to goroutines, or it is protected by a sync.Mutex / sync.RWMutex. If state must be shared globally (rare), it is read-only after initialization or guarded by atomic operations or channels."
why = "The adopted default. Avoiding globals eliminates race conditions and makes concurrency explicit and testable."

[[option]]
id = "sync-globals-minimally"
label = "store mutable state in globals but protect with locks"
directive = "Global variables may be mutated if they are guarded by a lock (sync.Mutex at the file level or inside a synced wrapper)."
why = "Still allows global state, increasing cognitive load; requires developers to remember to lock before every access."
