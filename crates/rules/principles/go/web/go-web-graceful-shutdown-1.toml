id = "GO-WEB-GRACEFUL-SHUTDOWN-1"
title = "Server shutdown is graceful: in-flight requests are allowed to complete; new requests are rejected after shutdown is signaled"
tag = "stack"
domain = "go:web"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://pkg.go.dev/net/http#Server.Shutdown"
title = "pkg.go.dev — net/http Server.Shutdown"

[decision]
question = "How should the HTTP server handle shutdown when a stop signal (SIGTERM, interrupt) is received?"
default = "graceful-shutdown-with-timeout"
why = "A server that stops abruptly mid-request corrupts in-flight transactions, leaves database connections dangling, and breaks clients. Go's *http.Server provides Shutdown(ctx) which stops accepting new connections and waits for in-flight requests to complete before closing listeners. A context deadline ensures the wait does not hang forever if a request is stuck. A graceful shutdown—wait for in-flight requests with a timeout, then force-close—gives requests a chance to finish cleanly while ensuring the process eventually terminates. The alternative, immediate termination (os.Exit, return from main), is a deadlock and data-corruption risk."

[[option]]
id = "graceful-shutdown-with-timeout"
label = "Graceful shutdown: wait for in-flight requests with a deadline, then force-close"
directive = "The application sets up a signal handler (SIGTERM, SIGINT) that, on receiving the signal, binds both return values of context.WithTimeout before calling Shutdown, since context.WithTimeout(parent, duration) returns (context.Context, context.CancelFunc) and cannot be passed inline as Shutdown's single argument: `ctx, cancel := context.WithTimeout(context.Background(), 30*time.Second)`, then `defer cancel()`, then `if err := server.Shutdown(ctx); err != nil { /* handle err */ }`. This stops accepting new connections and waits up to 30 seconds for in-flight requests to complete. If the context deadline is exceeded, Shutdown returns an error and the server is closed forcefully. The main function waits for Shutdown to return before exiting, ensuring all in-flight work is given a chance to complete, and defer cancel() ensures the timer backing the context is released rather than leaked."
why = "Graceful shutdown ensures in-flight requests complete, database transactions finish, and the process terminates cleanly; the deadline prevents indefinite hangs."

[[option]]
id = "immediate-termination"
label = "Server terminates immediately on signal"
directive = "The application ignores shutdown signals or calls os.Exit immediately upon receiving them, terminating all in-flight requests and goroutines."
why = "Simplicity; trades request consistency and clean shutdown for speed. In-flight requests are interrupted mid-operation, potentially leaving partial transactions and resource leaks."

[[option]]
id = "shutdown-no-timeout"
label = "Graceful shutdown without a deadline; waits indefinitely for requests to complete"
directive = "Shutdown is called without a context deadline; the server waits for all in-flight requests to complete, no matter how long it takes."
why = "Ensures all requests complete; risks indefinite hangs if a request is stuck or loops endlessly."
