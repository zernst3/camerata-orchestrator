id = "GO-GRPC-STATUS-CODES-CORRECT-1"
title = "gRPC status codes are used correctly: INTERNAL for unexpected errors, INVALID_ARGUMENT for validation failures, PERMISSION_DENIED for auth, NOT_FOUND for missing resources"
tag = "stack"
domain = "go:grpc"
layer = "framework"
enforcement = "prose"
default = true
verification = "grounded"

[[sources]]
url = "https://grpc.io/docs/guides/status-codes/"
title = "gRPC — Status codes and their use in gRPC"

[decision]
question = "How should gRPC status codes be assigned to different error conditions?"
default = "status-codes-semantically-correct"
why = "gRPC status codes (codes.OK, codes.INVALID_ARGUMENT, codes.NOT_FOUND, codes.PERMISSION_DENIED, codes.INTERNAL, codes.UNAVAILABLE, etc.) are the semantic layer of error communication; clients rely on them to determine whether an error is retriable, whether the user should re-authenticate, or whether the request was malformed. A client seeing UNAVAILABLE retries with exponential backoff, because it means the service is transiently down or overloaded and the same request is likely to succeed once the server recovers; a client seeing INTERNAL does not retry, because it means an internal invariant was violated (a serious bug), and retrying the same request will typically fail the same way. A client seeing INVALID_ARGUMENT also does not retry because the input itself is wrong. A handler that returns INTERNAL for a transient infrastructure fault (that should have been UNAVAILABLE) causes a client to give up on a failure that a retry would have resolved. A handler that returns UNAVAILABLE for a genuine internal invariant violation (that should have been INTERNAL) causes a client to retry a request that will never succeed. The status code must match the nature of the error: missing resources are NOT_FOUND, permission failures are PERMISSION_DENIED, validation failures are INVALID_ARGUMENT, transient/overloaded-service failures are UNAVAILABLE (safe to retry), internal invariant violations are INTERNAL (not safe to retry), request body parsing failures are INVALID_ARGUMENT, etc."

[[option]]
id = "status-codes-semantically-correct"
label = "Status codes are assigned semantically: NOT_FOUND for missing resources, INVALID_ARGUMENT for validation, etc."
directive = "Each RPC implementation maps domain and infrastructure errors to the correct gRPC status code. Validation errors are codes.InvalidArgument, missing resources are codes.NotFound, authentication failures are codes.Unauthenticated, permission failures are codes.PermissionDenied, transient/overloaded-dependency failures (the service is temporarily down, out of capacity, or the request timed out waiting on it) are codes.Unavailable, internal invariant violations (an unexpected nil, a broken assumption, a serious bug) are codes.Internal, input-parsing errors are codes.InvalidArgument. Status messages provide additional context (why the input was invalid, what was not found). A helper or middleware pattern ensures consistent error mapping across handlers."
why = "Clients can rely on status codes for error handling logic; the semantic meaning enables proper retry strategies and error recovery. codes.Unavailable signals a transient condition that is safe to retry, often with backoff; codes.Internal signals a bug or invariant violation that a naive retry will not fix."

[[option]]
id = "status-all-internal"
label = "All errors are returned as INTERNAL"
directive = "Every error, regardless of cause, is wrapped as a gRPC status.Internal. The error message contains the full detail."
why = "Simplifies error handling in handlers; trades semantic error codes for a single catch-all. Clients cannot distinguish between validation failures and transient server faults."

[[option]]
id = "status-inconsistent"
label = "Status codes are assigned inconsistently across handlers"
directive = "Different handlers map similar errors to different status codes; the error code does not reliably indicate the error kind."
why = "Common in transitional codebases; makes client-side error handling impossible."
