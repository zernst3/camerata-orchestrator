id = "GO-GRPC-INTERCEPTORS-AUTH-LOGGING-1"
title = "Authentication, logging, error recovery, and other cross-cutting concerns are implemented as interceptors, not duplicated in handler methods"
tag = "stack"
domain = "go:grpc"
layer = "framework"
enforcement = "structured"
default = true

[decision]
question = "How should authentication, logging, and error recovery be applied across gRPC service methods?"
default = "interceptors-cross-cutting"
why = "gRPC provides unary and streaming interceptors as middleware that wraps all RPC calls. An interceptor is the idiomatic way to apply cross-cutting concerns: every call flows through the interceptor chain before reaching the handler. A logging interceptor logs the RPC method, parameters, response, and latency for all calls. An auth interceptor extracts and validates credentials from metadata and adds the authenticated principal to the context. An error recovery interceptor catches panics and converts them to proper gRPC errors. Implementing these inside each handler is duplication, error-prone (one handler forgets auth, creating a security gap), and couples business logic to infrastructure. Interceptors are also harder to test—each test would need to set up auth, logging, panic recovery. A centralized interceptor chain means one place to audit and maintain each concern, and handlers are simple functions that receive authenticated contexts and return domain errors."

[[option]]
id = "interceptors-cross-cutting"
label = "Cross-cutting concerns are implemented as unary/streaming interceptors"
directive = "Authentication, logging, error recovery, rate limiting, tracing, and other concerns that apply across all or many RPCs are implemented as interceptors registered on the gRPC server. Handlers receive already-authenticated contexts (with credentials in ctx.Value), already-logged by the interceptor chain, and do not re-implement these concerns. Each interceptor is registered once; all RPCs flow through the chain."
why = "The adopted default. gRPC interceptors are the idiomatic extension point; one implementation per concern, consistent behavior across all RPCs."

[[option]]
id = "per-handler-inline"
label = "Each handler method re-implements authentication, logging, recovery inline"
directive = "RPC handlers authenticate themselves by extracting metadata, perform logging inside the handler, recover from panics themselves."
why = "Trades maintenance overhead and inconsistency for handler independence; requires each handler to redundantly implement cross-cutting concerns."

[[option]]
id = "hybrid-interceptor-handler"
label = "Some concerns use interceptors, others are handled in-method"
directive = "Logging and tracing use interceptors; authentication and error handling are implemented in individual handlers or a shared helper called from each handler."
why = "Intermediate option; introduces inconsistency about which concerns are interceptor-based and which are not."
