id = "ARCH-API-DTOS-1"
title = "API request and response types are DTOs, never domain types"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "mechanical"
default = true
qualifies = "Prose check, enforced by an import-boundary lint rule (an ESLint no-restricted-imports / import boundaries rule, a Rust module-visibility or clippy-style restriction, or the equivalent for the stack): controller and route-handler files are forbidden from importing domain types, so request and response types resolve to DTOs only. Conformance holds when that lint rule exists and runs in CI and an attempt to reference a domain type from a controller fails the build; it fails when no rule blocks the import and a controller can return a domain type directly."

[decision]
question = "What position does the project take on: API request and response types are DTOs, never domain types?"
default = "api-request-and-response-types-are-dtos-never-do"
why = "Coupling the wire format to the domain model means every internal refactor risks breaking external consumers, and every external API requirement leaks into the domain core. The mapping cost is one tier of code; the decoupling buys independent evolution on both sides. Returning domain types directly is cheaper to write at first but turns every internal refactor into a breaking API change, since the wire shape moves whenever the internal model moves. Sharing models across wire and domain (one type to rule them all) pulls API concerns into the domain core and ties release cadence to client tolerance, so internal evolution waits on external upgrades."

[[option]]
id = "api-request-and-response-types-are-dtos-never-do"
label = "API request and response types are DTOs, never domain types"
directive = "Endpoints accept request DTOs and return response DTOs; the controller layer maps DTOs to and from domain types. The wire format and the internal model evolve independently. Enforce with a lint rule that blocks imports of domain types from controller files. Adding a field to a domain type does not silently change the API; renaming or restructuring a domain field does not break clients."
why = "The adopted default. Coupling the wire format to the domain model means every internal refactor risks breaking external consumers, and every external API requirement leaks into the domain core."

[[option]]
id = "endpoints-return-domain-types-directly-in-the-re"
label = "endpoints return domain types directly in the response body …"
directive = "endpoints return domain types directly in the response body and accept domain types in the request body, with no DTO layer in between"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-project-uses-a-single-shared-model-type-acro"
label = "the project uses a single shared model type across …"
directive = "the project uses a single shared model type across both the wire format and the domain core, rather than maintaining separate DTOs and domain types"
why = "A defensible alternative the project considered and did not adopt as the default."
