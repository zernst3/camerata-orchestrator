id = "ARCH-API-VERSIONING-1"
title = "API versions live in the URL prefix; changes within a version are additive only"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: API versions live in the URL prefix; changes within a version are additive only?"
default = "api-versions-live-in-the-url-prefix-changes-with"
why = "Versioning in the URL is the most discoverable and toolable scheme: a curl command, a router log, and a trace all surface the version at a glance. Strict additive evolution within a version means any client that worked on day one of v1 still works on day N of v1; client teams plan version migrations on their own schedule rather than reacting to every server release. Header-based versioning (an Accept header naming the version) is less discoverable than URL versioning, and the failure mode is subtle: clients that forget or mis-set the header silently land on the wrong version. Evolving without versioning at all turns every change into a breaking change for some client, and cross-team coordination becomes the bottleneck on every shipping decision. Content negotiation across multiple representations is powerful but heavy, and most teams underuse the machinery they paid for, since few clients implement it correctly."

[[option]]
id = "api-versions-live-in-the-url-prefix-changes-with"
label = "API versions live in the URL prefix; changes within a version are additive only"
directive = "Public endpoints carry an explicit version in the URL path: /v1/orgs, /v2/orgs, and so on. Within a published version, no field is renamed, removed, or has its type changed; only additive changes are allowed (new optional fields, new endpoints, looser validation). Breaking changes ship as a new major version; older versions remain available for a documented deprecation window before retirement."
why = "The adopted default. Versioning in the URL is the most discoverable and toolable scheme: a curl command, a router log, and a trace all surface the version at a glance."

[[option]]
id = "the-api-version-is-selected-by-a-request-header"
label = "the API version is selected by a request header …"
directive = "the API version is selected by a request header (such as Accept: application/vnd.api.v2+json) rather than appearing in the URL path"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-api-has-no-version-segment-at-all-and-evolve"
label = "the API has no version segment at all and …"
directive = "the API has no version segment at all and evolves in place, with each change applying to all current clients"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-api-exposes-multiple-representations-of-each"
label = "the API exposes multiple representations of each resource and …"
directive = "the API exposes multiple representations of each resource and clients negotiate version through a content-negotiation handshake"
why = "A defensible alternative the project considered and did not adopt as the default."
