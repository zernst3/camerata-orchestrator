id = "ARCH-IDEMPOTENCY-KEYS-1"
title = "Non-GET writes that trigger external side effects require an idempotency key"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Non-GET writes that trigger external side effects require an idempotency key?"
default = "non-get-writes-that-trigger-external-side-effect"
why = "Network retries are inevitable. Without idempotency keys, a client cannot safely retry after a timeout because the original may have succeeded silently. With keys, the client retries freely until it gets a definitive response, and the server never double-executes. Allowing retries without keys means the client risks double-charging or sending duplicates on every timeout, because the network cannot tell the client whether the original request reached the server. Deduplicating via natural keys works only when natural keys exist, are stable, and uniquely identify the intended effect, and many real operations have no such key (a payment intent, an outbound email, an external job enqueue). Making the client responsible for not retrying pushes correctness onto every consumer; one careless caller produces duplicates and the server has no way to defend against it."

[[option]]
id = "non-get-writes-that-trigger-external-side-effect"
label = "Non-GET writes that trigger external side effects require an idempotency key"
directive = "POST, PUT, PATCH, and DELETE endpoints that produce external side effects (charge a card, send an email, enqueue a downstream job, write to a message queue) require an Idempotency-Key header on each request. The server stores the response keyed by that key; a retry with the same key returns the stored response instead of running the operation again. Reads and writes that are naturally idempotent at the storage layer may omit this. The key-retention window is bounded (commonly 24 hours) and documented per endpoint."
why = "The adopted default. Network retries are inevitable."

[[option]]
id = "the-api-accepts-retries-without-any-idempotency"
label = "the API accepts retries without any idempotency-key contract; the …"
directive = "the API accepts retries without any idempotency-key contract; the client is expected to detect prior success out of band before retrying"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-api-deduplicates-requests-by-inspecting-natu"
label = "the API deduplicates requests by inspecting natural keys in …"
directive = "the API deduplicates requests by inspecting natural keys in the payload (such as an email address or invoice number) rather than by requiring an explicit Idempotency-Key header"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-api-does-no-server-side-deduplication-at-all"
label = "the API does no server-side deduplication at all; each …"
directive = "the API does no server-side deduplication at all; each consumer is responsible for not retrying after a timeout, and the server treats every request as new"
why = "A defensible alternative the project considered and did not adopt as the default."
