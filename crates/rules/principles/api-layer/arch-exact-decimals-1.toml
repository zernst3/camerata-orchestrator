id = "ARCH-EXACT-DECIMALS-1"
title = "Monetary and quantity values use exact decimal types in code; never floats"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "architectural"
default = true
qualifies = "Deterministically checkable, but no off-the-shelf linter rule enforces it: deciding which type/field/column 'requires exact arithmetic' (money, regulated quantity) is project-specific domain knowledge no generic linter carries. It requires a custom AST/static-analysis CI gate that bans binary floating-point types (f64, double, Number, REAL/DOUBLE columns) on the exactness-sensitive surface the project annotates, paired with a property test asserting a long chain of additions and roundings loses zero precision against an exact-decimal oracle. Conformance holds when the float ban runs in CI over the exactness-sensitive surface and the precision property test passes; it fails when float types reach those values or no precision oracle exists."
verification = "grounded"

[[sources]]
url = "https://docs.python.org/3/library/decimal.html"
title = "Python — decimal: Decimal fixed-point and floating-point arithmetic"

[[sources]]
url = "https://martinfowler.com/eaaCatalog/money.html"
title = "Martin Fowler — Patterns of Enterprise Application Architecture: Money"

[decision]
question = "What position does the project take on: Monetary and quantity values use exact decimal types in code; never floats?"
default = "monetary-and-quantity-values-use-exact-decimal-t"
why = "Binary floating-point cannot represent most decimal fractions exactly. 0.1 + 0.2 silently equals 0.30000000000000004; rounding 1.225 silently produces 1.22 in some cases and 1.23 in others. In any context where exactness is required (currency, regulated quantities, billing), floating-point introduces silent correctness bugs that surface as off-by-one-cent discrepancies, failed reconciliations, and audit findings. Exact-decimal types do the math the way humans expect; the type choice is the safety net. Using floating-point everywhere silently loses precision: the failure mode is wrong numbers that look right and only surface at reconciliation time, which is far more expensive than catching the type error up front. Representing money as integer minor-units (cents as an integer type) is a distinct, commonly used approach for currency specifically, and it also avoids floating-point imprecision entirely — integer arithmetic is exact by construction. It is not a substitute for the general 'use an exact-decimal type for anything requiring precision' principle (it is currency-specific, and non-monetary exact-precision values like regulated quantities or percentages still need a decimal type), and it has real costs: less readable arithmetic on raw integers (dividing or applying a percentage to a cents value requires care to avoid re-introducing rounding bugs), no native currency-math support (a Decimal type composes with currency-aware libraries and formatting; a bare integer does not), and friction when multiple currencies with different minor-unit conventions (e.g. JPY has no minor unit, some currencies use three decimal places) or sub-cent intermediate calculations are involved. Weighed against that, integer minor-units are simpler to reason about, serialize compactly on the wire, and avoid pulling in a decimal library at all — a legitimate choice when the domain is single-currency and the arithmetic is simple addition/subtraction. Representing decimal values as strings and parsing at compute time gives up arithmetic at the type level and pushes the precision problem into every consumer who has to remember to parse and round consistently."

[[option]]
id = "monetary-and-quantity-values-use-exact-decimal-t"
label = "Monetary and quantity values use exact decimal types in code; never floats"
directive = "Any value that represents money, a counted quantity, a percentage with decimal precision, or any other domain where exact arithmetic matters is represented in code by the language's exact-decimal type (BigDecimal, Decimal, rust_decimal, decimal.Decimal, depending on language), never by binary floating-point (f64, double, Number, etc.). The persistence layer uses NUMERIC or DECIMAL columns for these values, not REAL or DOUBLE. Strings or integer-cents representations are not substitutes; they remove the ability to do arithmetic at the type level."
why = "Binary floating-point cannot represent most decimal fractions exactly."

[[option]]
id = "monetary-and-quantity-values-are-represented-in"
label = "monetary and quantity values are represented in code as …"
directive = "monetary and quantity values are represented in code as binary floating-point (f64, double, Number) and stored as REAL or DOUBLE in the database"
why = "Using floating-point everywhere silently loses precision: the failure mode is wrong numbers that look right and only surface at reconciliation time, which is far more expensive than catching the type error up front."

[[option]]
id = "monetary-values-are-represented-in-code-as-integ"
label = "monetary values are represented in code as integer-cents (or …"
directive = "monetary values are represented in code as integer-cents (or minor-unit integers) rather than as the language's exact-decimal type"
why = "Integer minor-units avoid floating-point imprecision just as well as a decimal type does — integer arithmetic is exact by construction — and are simpler and more wire-compact, at the cost of less readable arithmetic (percentage/division operations need care to avoid re-introducing rounding bugs), no native currency-math support, and friction with multiple minor-unit conventions or sub-cent intermediate calculations. It's a legitimate, currency-specific choice, distinct from (not a violation of) the broader 'use exact decimal types for anything requiring precision' principle, which still applies to non-monetary exact-precision values."

[[option]]
id = "monetary-and-quantity-values-are-represented-as"
label = "monetary and quantity values are represented as strings throughout, …"
directive = "monetary and quantity values are represented as strings throughout, and consumers parse and re-format them at each compute step"
why = "String representation gives up arithmetic at the type level and pushes the precision problem into every consumer who has to remember to parse and round consistently."
