id = "ARCH-REPO-PER-AGGREGATE-1"
title = "One repository abstraction per aggregate, declared in the domain layer"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://www.amazon.com/Implementing-Domain-Driven-Design-Vaughn-Vernon/dp/0321834577"
title = "Vaughn Vernon — Implementing Domain-Driven Design, Chapter 12: Repositories (per-aggregate collection-oriented repository)"

[[sources]]
url = "https://martinfowler.com/eaaCatalog/repository.html"
title = "Martin Fowler / Eric Evans — Repository (mediates between the domain and data mapping layers with a collection-like interface)"

[decision]
question = "What position does the project take on: One repository abstraction per aggregate, declared in the domain layer?"
default = "one-repository-abstraction-per-aggregate-declare"
why = "Per-aggregate abstractions let services depend on the shape of the data they actually need (a UserRepository exposes find_by_email, find_by_org; a ProjectRepository exposes find_by_owner) without inheriting persistence-specific methods they do not use. The domain layer stays free of any persistence concrete types, which is the load-bearing property of hexagonal architecture: persistence libraries can be upgraded, swapped, or supplemented without recompiling or rewriting the domain. Services become trivially mockable for unit tests because the abstraction is small and aggregate-specific. A single generic Repository-of-T abstraction does not fit aggregate-specific finder methods like find_by_slug or find_active_by_org; it either degrades to find_by_id only or grows methods that some aggregates do not implement. Splitting abstractions per use case rather than per aggregate proliferates abstractions across the codebase, loses the aggregate cohesion, and produces a large surface of one-method interfaces. Skipping the repository abstraction entirely and calling the persistence library directly from services couples every service to the chosen persistence library, so the domain layer recompiles or breaks on every library upgrade."

[[option]]
id = "one-repository-abstraction-per-aggregate-declare"
label = "One repository abstraction per aggregate, declared in the domain layer"
directive = "Each domain aggregate has its own repository abstraction (an interface, trait, or protocol depending on the language) declared in the domain layer. The methods take and return domain types only. Concrete implementations live in the infrastructure layer and are wired in at the edges. Services depend on the abstraction, not the implementation."
why = "Per-aggregate abstractions let services depend on the shape of the data they actually need (a UserRepository exposes find_by_email, find_by_org; a ProjectRepository exposes find_by_owner) without inheriting persistence-specific methods they do not use."

[[option]]
id = "the-domain-layer-declares-a-single-generic-repos"
label = "the domain layer declares a single generic Repository-of-T abstraction …"
directive = "the domain layer declares a single generic Repository-of-T abstraction that every aggregate consumes through type parameters, rather than declaring a separate abstraction per aggregate"
why = "A single generic Repository-of-T does not fit aggregate-specific finder methods like find_by_slug or find_active_by_org; it either degrades to find_by_id only or grows methods that some aggregates do not implement."

[[option]]
id = "the-domain-layer-declares-one-repository-abstrac"
label = "the domain layer declares one repository abstraction per use …"
directive = "the domain layer declares one repository abstraction per use case (find-user-by-email, find-active-projects-in-org) rather than per aggregate"
why = "Per-use-case abstractions proliferate across the codebase, lose aggregate cohesion, and produce a large surface of one-method interfaces with no grouping by domain boundary."

[[option]]
id = "the-domain-layer-declares-no-repository-abstract"
label = "the domain layer declares no repository abstraction at all; …"
directive = "the domain layer declares no repository abstraction at all; services call the persistence library directly, with no boundary between domain logic and persistence implementation"
why = "No abstraction couples every service to the chosen persistence library; the domain layer recompiles or breaks on every library upgrade."

[[option]]
id = "cqrs-read-model-queries-bypass-the-aggregate-rep"
label = "CQRS read/write split — read-model queries bypass the aggregate repository; writes still go through it"
directive = "Split reads from writes: write operations (commands) go through the per-aggregate repository as usual, but read operations that serve a specific view or report query a separate, often denormalized read model directly (a dedicated query/projection layer, a read replica, or hand-written SQL tailored to that view), bypassing the aggregate repository's finder methods entirely. Keep the aggregate repository as the sole write path so invariants are still enforced in one place."
why = "Aggregate-shaped repository finders are a poor fit for multi-aggregate, denormalized, or list/report-style views — forcing every read through the aggregate repository either produces N+1 fetch-and-assemble code in services or pressures the repository into growing view-specific methods that don't belong to the aggregate. A read model built and queried for the view it serves avoids both. The trade-off is real: the read model can drift from the write model if projections aren't kept in sync, and the codebase now carries two data-access paths (command-side repository, query-side read model) instead of one, which is more machinery for a team that doesn't have read-shape problems severe enough to justify it. This is a complement to per-aggregate repositories, not a replacement — the write side still needs exactly the aggregate-repository discipline this rule describes."
