id = "ARCH-CURSOR-PAGINATION-1"
title = "List endpoints paginate by cursor, not by offset"
tag = "stack"
domain = "api-layer"
layer = "universal"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: List endpoints paginate by cursor, not by offset?"
default = "list-endpoints-paginate-by-cursor-not-by-offset"
why = "Offset pagination has a correctness bug under concurrent writes that the client cannot detect. Cursors anchor each page to a stable position in the result set and remain correct under inserts and deletes. Offset pagination is simpler to implement but silently drops or duplicates records when the underlying list changes mid-session, which is exactly the correctness bug cursors exist to fix. Returning the full list with no pagination breaks at scale: the response grows without bound and the client has to handle arbitrarily large payloads. Exposing both cursor and offset shapes doubles the surface area and the testing burden for marginal client convenience, and the simpler offset shape becomes the path of least resistance for clients that should be using cursors."

[[option]]
id = "list-endpoints-paginate-by-cursor-not-by-offset"
label = "List endpoints paginate by cursor, not by offset"
directive = "Any list endpoint that can grow uses opaque cursor tokens for pagination: the response includes a next_cursor, the next request passes it back. Offset pagination (page=N, page_size=K) is forbidden for unbounded lists because inserts and deletes during a paging session silently shift records across pages. Bounded lists below a hard cap that does not grow may skip pagination entirely."
why = "The adopted default. Offset pagination has a correctness bug under concurrent writes that the client cannot detect."

[[option]]
id = "list-endpoints-paginate-by-offset-page-n-page-si"
label = "list endpoints paginate by offset (page=N, page_size=K) regardless of …"
directive = "list endpoints paginate by offset (page=N, page_size=K) regardless of whether the underlying list can grow"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "list-endpoints-return-the-full-result-set-in-a-s"
label = "list endpoints return the full result set in a …"
directive = "list endpoints return the full result set in a single response and do not paginate at all, regardless of list size"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "list-endpoints-expose-both-cursor-and-offset-pag"
label = "list endpoints expose both cursor and offset pagination shapes …"
directive = "list endpoints expose both cursor and offset pagination shapes and let the client choose which to use per request"
why = "A defensible alternative the project considered and did not adopt as the default."
