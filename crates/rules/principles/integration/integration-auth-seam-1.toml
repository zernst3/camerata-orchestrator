id = "INTEGRATION-AUTH-SEAM-1"
title = "Every UI-gated affordance maps to a guarded endpoint"
tag = "stack"
domain = "integration"
layer = "universal"
enforcement = "mechanical"
default = false
opt_in_only = true
layer3_only = false
verification = "grounded"

