id = "CAMERATA-USER-GUIDE-1"
title = "Camerata user guide (read this first)"
tag = "stack"
domain = "howto"
layer = "universal"
enforcement = "prose"
default = false

[decision]
question = "Where does camerata's own user guidance live so a newcomer can find it?"
default = "camerata-user-guide-read-this-first"
why = "Putting the user guide inside the GUI itself means it is always available to whoever is running the tool, even before they have read the README. The right pane already renders principle text well; reusing that surface keeps the chrome minimal. Documenting only in the README forces a newcomer to leave the tool to learn how it works, which they often will not do on first launch; the cost is felt as confusion at the GUI without an obvious recovery path. Building a separate Help menu or dedicated help window adds chrome for content the principle-detail pane already renders well, and the help surface then has to be kept in sync with the actual UX through a second update path."

[[option]]
id = "camerata-user-guide-read-this-first"
label = "Camerata user guide (read this first)"
directive = """
# Welcome to camerata

camerata composes AI-orchestration principles into installable guardrails for your repos. It is a small Rust tool with a CLI and this Dioxus Desktop GUI. The library ships with a curated set of canonical principles across universal, capability, and stack domains, and you compose the ones that fit your project.

This guide walks through the typical workflow and explains every button.

# Typical session

The main loop is short:

- Browse the left sidebar to find domains relevant to your stack.
- Click a principle title to read its details in the right pane.
- Tick the checkbox to include the rule in your selection.
- Add custom rules or custom domains where the library does not cover your project.
- Configure where the scaffolded files go using Output, Pick, and Targets.
- Click Generate to write the files into your target repos.

# The left sidebar

Each domain is a collapsible group. Click the disclosure triangle (or the group header) to expand and collapse. Selection and expansion are independent: you can read a rule without selecting its domain.

## Two layers of selection

Selection is gated at two levels:

- Domain selection: each non-meta domain has a checkbox in its header. When the domain is unchecked, all rules in it are unselectable (the rule checkboxes appear grayed out).
- Rule selection: when a domain is checked, the rules inside it can be toggled individually. Rules with default = true auto-check on domain selection; rules with default = false stay off until you tick them.

Toggling a domain off and back on resets per-rule overrides to the default state. Manual changes inside a deselected-then-reselected domain are lost. This keeps the model simple: domain state is the source of truth.

## What ships pre-selected

The Universal and Agentic domains are pre-selected when the GUI launches. These two are curated as the always-on baseline for any AI-driven project. Every other domain starts unchecked; you opt into rust, sql, ts:next, and so on by ticking their domain checkbox.

## Domain types

- Universal (the * domain): spirit-level rules that apply to any AI-assisted project. Pre-selected.
- Capability: cross-cutting traits like sql, permissions, ci-cd, agentic. A capability rule applies regardless of language. Only Agentic is pre-selected; the rest are opt-in.
- Stack: language- or library-specific (rust, ts:next, rust:seaorm, ts:drizzle, and so on). All opt-in.
- Custom: domains you create yourself. They hold only your own rules and are always active.

## Per-domain shortcuts

When a domain is expanded, three small buttons sit at the top:

- Defaults: reset this domain to its default selection (rules with default = true check on, others check off).
- All: select every rule in this domain.
- Clear: deselect every rule in this domain.

Below the rules, a + custom rule button attaches a user-authored rule to this domain (hidden in the contributing and how-to sections, which are documentation only).

# The right pane

The right pane is context-dependent. It shows one of:

- This user guide (when you click the entry in the How To section).
- A principle detail view (when you click a rule title in the sidebar).
- An "Add a custom rule" form (when you click + custom rule).
- An "Add a custom domain" form (when you click + Custom domain at the bottom of the sidebar).
- A short tip when nothing else is open.

# Action bar buttons

The action bar runs across the top of the workspace.

## Output and Pick

The Output text field is the default destination for the scaffolded files. Pick opens a folder picker that fills the Output field. If you only have one repo to scaffold into, this is all you need.

## Targets

Targets is for multi-repo routing. Open the panel, add multiple repos, then for each domain choose which repos should receive that domain's rules. Domains you do not map fall back to Output. You only need Targets if camerata is the source of truth across more than one project.

## Save Profile and Load Profile

Save Profile writes the current session to a JSON file. The selections are stored by canonical rule id rather than by content, so future updates to a canonical rule's text flow through automatically the next time you load.

Load Profile reads a profile back in. If the profile references a rule id that no longer exists in the library (renamed or removed in a newer version), a red banner lists the missing ids and they are silently skipped.

## Export JSON

Export JSON writes the full content of the selected rules to a JSON file. Use this for interchange with external systems that need the rule content embedded. This is different from Save Profile, which is id-based and intra-camerata; Export JSON is content-embedded and meant for outside consumers.

## Generate

Generate opens a confirm banner. From there you can save the profile first or skip straight to writing the scaffolded files. Either path clears the in-progress autosave after a successful generate. Cancel keeps the autosave intact.

# Autosave and recovery

camerata continuously writes your in-progress selection to a platform-standard temp file (Application Support on macOS, equivalent paths on Linux and Windows). If the app or your computer crashes, the next launch shows a yellow recovery banner offering Resume or Start over.

A successful Generate clears the temp file because the work has been committed. The recovery banner only appears when there is genuinely unsaved work to recover.

# Vocabulary

## Canonical rule

A rule that ships in the camerata library itself, contributed by a domain SME via a pull request to the open-source repo. Every canonical rule has a unique traceable id like RUST-DOMAIN-4 or TS-NEXT-CONSENT-GATED-1.

## Custom rule

A rule you add for your own project. Custom rules do not need a pull request or an id; they live entirely in your profile.

## Custom domain

A user-created domain that holds only your own rules. Useful when your project has conventions that do not fit any existing canonical domain.

## Profile

A saved snapshot of what you selected, stored by id. Resilient to canonical rule updates because the content is read from the current library at load time.

# Need more detail?

The CAMERATA-QA.md file in the repo contains a numbered trace of every UX element. Cite a section number in any bug report you file.
"""
why = "The adopted default. Putting the user guide inside the GUI itself means it is always available to whoever is running the tool, even before they have read the README."

[[option]]
id = "the-camerata-user-guide-lives-only-in-the-reposi"
label = "the camerata user guide lives only in the repository …"
directive = "the camerata user guide lives only in the repository README; the GUI itself does not surface the guide in-tool, and users learn the workflow by reading the README before launch"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-user-guide-ships-as-a-separate-help-menu-or"
label = "the user guide ships as a separate Help menu …"
directive = "the user guide ships as a separate Help menu or dedicated help window in the GUI, with its own chrome and rendering surface distinct from the principle-detail pane"
why = "A defensible alternative the project considered and did not adopt as the default."
