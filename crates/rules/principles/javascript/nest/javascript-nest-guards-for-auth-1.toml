id = "JAVASCRIPT-NEST-GUARDS-FOR-AUTH-1"
title = "Use guards for authentication and authorization checks"
tag = "stack"
domain = "javascript:nest"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://docs.nestjs.com/guards"
title = "NestJS Docs — Guards: CanActivate for authentication and authorization"

[decision]
question = "What position does the project take on: Guards for auth?"
default = "global-guard-with-public-decorator-opt-out"
why = "NestJS guards are functions that run before a controller method and determine if the request should proceed. A guard can check authentication (is the request from a logged-in user?) or authorization (does the user have permission to access this resource?). Applying a guard per-route via @UseGuards() centralizes the check's implementation, but it is still an opt-in, fail-open default at the routing level: a new endpoint added without remembering to annotate it is silently unprotected until someone notices. NestJS's own documented pattern for authentication is closer to opt-out: register the auth guard once, application-wide, as an APP_GUARD provider, so every route requires authentication unless explicitly marked otherwise with a custom @Public() decorator (implemented via SetMetadata plus a Reflector check in the guard's canActivate). This flips the failure mode from fail-open to fail-closed: a forgotten annotation on a new endpoint means the route is protected when it shouldn't need to be, not open when it should have been protected. Per-route @UseGuards() remains a legitimate, more explicit approach, particularly for APIs where most routes are public and only a minority need protection, or for authorization checks (role/permission guards) layered on top of a globally-required authentication guard. When authentication and authorization logic lives inline inside a controller method or in service code instead of any guard at all, the same checks are duplicated across routes, drift out of sync when roles or permission models change, and a developer might forget to add the check to a new endpoint entirely."

[[option]]
id = "global-guard-with-public-decorator-opt-out"
label = "Register an auth guard globally via APP_GUARD; opt individual routes out with a @Public() decorator"
directive = "Register the primary authentication guard application-wide as an APP_GUARD provider (e.g. { provide: APP_GUARD, useClass: AuthGuard } in a module's providers array), so every route requires authentication by default with no @UseGuards() annotation needed at each controller or method. Implement a custom @Public() decorator via SetMetadata('isPublic', true), and have the guard's canActivate check that metadata through Reflector to let public routes through. Routes that must skip authentication (health checks, login, public webhooks) are explicitly marked @Public(); every other route is protected by default without per-route annotation. Authorization (role/permission checks) is layered on top with additional, route-scoped guards (@UseGuards(RolesGuard)) where only some authenticated routes need it."
why = "Auth-by-default with an explicit, visible opt-out is a safer failure mode than auth-by-annotation: a new endpoint added without thinking about auth is protected automatically, whereas the per-route @UseGuards() approach silently leaves a forgotten endpoint public until someone notices, possibly in production. This is NestJS's own documented pattern for global authentication, and it scales better as the number of routes grows, since most of an app's routes are typically protected and only a handful (health checks, login, public webhooks) need to opt out."

[[option]]
id = "guards-for-auth-and-authz"
label = "Apply guards per-route via @UseGuards()"
directive = "Authentication (verifying the request is from a logged-in user) and authorization (checking user permissions) are implemented as NestJS guards, applied explicitly via @UseGuards(JwtGuard, RoleGuard) decorators on the controllers or methods that need them. Controllers and services do not duplicate auth checks inline; the guard is the single implementation each protected route references."
why = "Guards still centralize the auth check's implementation and ensure consistent application wherever they're used. This is the right default when most of an API's routes are public and only a minority need protection, since global-guard-plus-@Public() would invert that ratio and require annotating the majority. It requires discipline to apply the guard to every new protected route, since nothing fails closed by default the way a global APP_GUARD does."

[[option]]
id = "auth-logic-in-controllers"
label = "Implement auth logic in controllers"
directive = "Authentication and authorization checks are implemented directly in controller methods or called from service code."
why = "Implementing authentication and authorization logic directly in controller methods duplicates the same check across every protected route: a developer adding a new endpoint must remember to include the check, and forgetting is silent until someone accesses the endpoint without permission. Auth logic scattered across controllers also drifts out of sync when roles or permission models change, requiring updates in multiple places rather than one guard."
