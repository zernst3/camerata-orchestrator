id = "JAVASCRIPT-NEST-GUARDS-FOR-AUTH-1"
title = "Use guards for authentication and authorization checks"
tag = "stack"
domain = "javascript:nest"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://docs.nestjs.com/guards"
title = "NestJS Docs — Guards: CanActivate for authentication and authorization"

[decision]
question = "What position does the project take on: Guards for auth?"
default = "guards-for-auth-and-authz"
why = "NestJS guards are functions that run before a controller method and determine if the request should proceed. A guard can check authentication (is the request from a logged-in user?) or authorization (does the user have permission to access this resource?). Guards are applied via decorators (e.g., @UseGuards(JwtGuard, RoleGuard)) at the controller class or method level. When authentication and authorization logic lives inside a controller method or in service code, the same checks are duplicated across routes, and a developer might forget to add a guard to a new endpoint. Guards centralize the check and apply it consistently. If a new endpoint is added without a guard, it is intentional (the developer chose not to apply any guard), not accidental."

[[option]]
id = "guards-for-auth-and-authz"
label = "Use guards for auth checks"
directive = "Authentication (verifying the request is from a logged-in user) and authorization (checking user permissions) are implemented as NestJS guards. Guards are applied via @UseGuards() decorators on controllers or methods. Controllers and services do not duplicate auth checks."
why = "Guards centralize auth checks and ensure consistent application."

[[option]]
id = "auth-logic-in-controllers"
label = "Implement auth logic in controllers"
directive = "Authentication and authorization checks are implemented directly in controller methods or called from service code."
why = "Implementing authentication and authorization logic directly in controller methods duplicates the same check across every protected route: a developer adding a new endpoint must remember to include the check, and forgetting is silent until someone accesses the endpoint without permission. Auth logic scattered across controllers also drifts out of sync when roles or permission models change, requiring updates in multiple places rather than one guard."
