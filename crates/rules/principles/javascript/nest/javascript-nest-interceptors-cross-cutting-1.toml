id = "JAVASCRIPT-NEST-INTERCEPTORS-CROSS-CUTTING-1"
title = "Use interceptors for cross-cutting concerns like logging, tracing, and response transformation"
tag = "stack"
domain = "javascript:nest"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://docs.nestjs.com/interceptors"
title = "NestJS Docs — Interceptors: cross-cutting concerns"

[decision]
question = "What position does the project take on: Interceptors for cross-cutting concerns?"
default = "interceptors-for-cross-cutting"
why = "NestJS interceptors are functions that run before and after a controller method, implemented via the RxJS-based NestInterceptor interface. They can log requests and responses, add tracing headers, measure execution time, transform the response shape, implement caching, and more. When these cross-cutting concerns (logging, tracing, response shaping) live inside controllers or services, they are duplicated and inconsistent. Interceptors centralize these concerns and apply them consistently across all routes. An interceptor can measure how long a request takes and log it; this is not specific to any business logic and applies globally. If logging lives in each controller, a developer might forget to add it to a new endpoint or log the wrong format. Interceptors are not Nest's mechanism for exception handling: mapping a thrown exception (or an HttpException subtype) to an HTTP status and response body is the job of Exception Filters (@Catch(), implementing ExceptionFilter, applied via @UseFilters() or the global APP_FILTER provider). An interceptor's handle() method can observe a stream and use RxJS's catchError to react to an error passing through it, but centralized exception-to-response mapping across the app belongs to a filter, not an interceptor — the two are separate, complementary NestJS concepts (interceptor = wrap around a call for cross-cutting behavior; filter = catch a thrown exception and shape the error response) that are sometimes confused because both can technically observe an error."

[[option]]
id = "interceptors-for-cross-cutting"
label = "Use interceptors for cross-cutting concerns"
directive = "Logging, tracing, response transformation, caching, and other cross-cutting concerns that span multiple routes are implemented as NestJS interceptors. Interceptors are applied via @UseInterceptors() decorators or registered globally. Centralized exception-to-HTTP-response mapping is implemented as Exception Filters (@Catch(), ExceptionFilter, @UseFilters() or a global APP_FILTER), not as interceptor logic. Controllers and services do not contain duplicate logging, transformation, or ad hoc exception-to-response mapping logic."
why = "Interceptors centralize cross-cutting logic (logging, tracing, response shaping, caching) and ensure consistent application; exception-to-response mapping is a related but distinct concern owned by Nest's Exception Filter mechanism."

[[option]]
id = "cross-cutting-logic-in-controllers"
label = "Implement cross-cutting logic in controllers"
directive = "Each controller method handles logging, tracing, error handling, and response transformation explicitly."
why = "Implementing logging, tracing, and response transformation directly in each controller method duplicates the same cross-cutting concerns across every route: a developer adding a new endpoint must remember to include the logging call, and a change to the log format or tracing strategy requires updating every controller method individually. This approach produces inconsistent telemetry, clutters controller code with concerns unrelated to business logic, and scales poorly as the number of routes grows. Ad hoc per-controller error handling has the same problem regardless of whether the centralized alternative is an interceptor or (correctly) an exception filter."
