id = "JAVASCRIPT-NEST-INTERCEPTORS-CROSS-CUTTING-1"
title = "Use interceptors for cross-cutting concerns like logging, tracing, and response transformation"
tag = "stack"
domain = "javascript:nest"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://docs.nestjs.com/interceptors"
title = "NestJS Docs — Interceptors: cross-cutting concerns"

[decision]
question = "What position does the project take on: Interceptors for cross-cutting concerns?"
default = "interceptors-for-cross-cutting"
why = "NestJS interceptors are functions that run before and after a controller method. They can log requests and responses, add tracing headers, measure execution time, catch exceptions, transform the response shape, and more. When cross-cutting concerns (logging, tracing, error handling) live inside controllers or services, they are duplicated and inconsistent. Interceptors centralize these concerns and apply them consistently across all routes. An interceptor can measure how long a request takes and log it; this is not specific to any business logic and applies globally. If logging lives in each controller, a developer might forget to add it to a new endpoint or log the wrong format."

[[option]]
id = "interceptors-for-cross-cutting"
label = "Use interceptors for cross-cutting concerns"
directive = "Logging, tracing, response transformation, exception handling, and other concerns that span multiple routes are implemented as NestJS interceptors. Interceptors are applied via @UseInterceptors() decorators or registered globally. Controllers and services do not contain duplicate logging or transformation logic."
why = "Interceptors centralize cross-cutting logic and ensure consistent application."

[[option]]
id = "cross-cutting-logic-in-controllers"
label = "Implement cross-cutting logic in controllers"
directive = "Each controller method handles logging, tracing, error handling, and response transformation explicitly."
why = "Implementing logging, tracing, and response transformation directly in each controller method duplicates the same cross-cutting concerns across every route: a developer adding a new endpoint must remember to include the logging call, and a change to the log format or tracing strategy requires updating every controller method individually. This approach produces inconsistent telemetry, clutters controller code with concerns unrelated to business logic, and scales poorly as the number of routes grows."
