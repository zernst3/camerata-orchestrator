id = "JAVASCRIPT-ANGULAR-SMART-PRESENTATIONAL-PATTERN-1"
title = "Components follow the smart (container) vs. presentational pattern"
tag = "stack"
domain = "javascript:angular"
layer = "framework"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Components follow the smart (container) vs. presentational pattern?"
default = "components-follow-the-smart-container-vs-presenta"
why = "The smart/container vs. presentational component pattern separates concerns across the component tree. A smart (container) component manages state, fetches data from services, handles business logic, and coordinates the flow of data into presentational children. A presentational (dumb) component receives data via @Input() properties, emits user actions via @Output() events, and knows nothing about services, state management, or business rules. This separation makes presentational components reusable, testable without mocking services, and easy to understand at a glance. Smart components are the thin glue between state and presentation. When all logic lives in a single component, the component becomes a monolith that is difficult to test (every test needs a full setup of services and state) and reuse (it can only render in the context where that state is available). The pattern is: a route or top-level feature component is 'smart' (fetches data, subscribes to services, manages local state); its children are presentational (receive data as @Input, emit actions as @Output). The children are small, comprehensible, and independently testable; the smart parent is the only one that needs the mocking infrastructure."

[[option]]
id = "components-follow-the-smart-container-vs-presenta"
label = "Components follow the smart (container) vs. presentational pattern"
directive = "Components are classified as either smart/container (orchestrates state and data fetching via services, manages local state, handles business logic) or presentational/dumb (receives data via @Input(), emits actions via @Output(), owns no business logic or service dependencies). Presentational components accept data as @Input() and actions as @Output() EventEmitter; they do not inject services or manage global state. Smart components are typically at the route level or feature boundary; presentational components form the rest of the tree. Each presentational component is designed to be testable in isolation without mocking services."
why = "The pattern makes presentational components reusable and testable without service setup, and keeps smart components small and focused on orchestration."

[[option]]
id = "components-mix-business-logic-state-and-presentat"
label = "Mix all concerns in components"
directive = "components mix business logic, service calls, state management, and presentation together, without a consistent separation between smart and dumb layers"
why = "When all logic lives in a single component, the component becomes a monolith that is difficult to test (every test needs a full setup of services and state), difficult to reuse (it can only render in the context where that state is available), and difficult to understand at a glance. Mixing service calls, state management, and rendering in the same component means a change to any layer touches code that handles all of them."
