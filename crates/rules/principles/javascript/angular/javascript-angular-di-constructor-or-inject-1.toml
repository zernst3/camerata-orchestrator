id = "JAVASCRIPT-ANGULAR-DI-CONSTRUCTOR-OR-INJECT-1"
title = "Services are injected via inject() (preferred) or constructor parameters, never manually instantiated"
tag = "stack"
domain = "javascript:angular"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://angular.dev/guide/di"
title = "Angular Dependency Injection Guide — inject() function"

[[sources]]
url = "https://angular.dev/style-guide"
title = "Angular Style Guide — Prefer the inject function over constructor parameter injection"

[[sources]]
url = "https://github.com/angular-eslint/angular-eslint/blob/main/packages/eslint-plugin/src/rules/prefer-inject.ts"
title = "angular-eslint — prefer-inject"
linter = "@angular-eslint/prefer-inject"

[decision]
question = "What position does the project take on: Services are injected via inject() or constructor parameters, never manually instantiated?"
default = "inject-function-as-default"
why = "Angular's dependency injection (DI) container is the authoritative source for service instances. When a component or service requests a dependency via constructor injection or the inject() function, Angular's DI system provides the right instance (singleton, scoped, or factory-created as configured). Manually instantiating a service (new MyService()) bypasses DI entirely: the constructor call runs outside the container, any setup or initialization hooks are skipped, the service is not a singleton (a new instance is created every time), and mocking or swapping the implementation for testing is impossible without changing the source code. Both this rule's own cited sources — the Angular DI guide and the Angular Style Guide's 'Prefer the inject function over constructor parameter injection' section — explicitly recommend inject() as the primary mechanism, not merely a co-equal alternative to constructor injection, and angular-eslint ships a dedicated prefer-inject lint rule enforcing exactly that preference. inject() is also often the only option available at all: functional guards, interceptors, and resolvers are plain functions, not classes, so they have no constructor to inject into, and inject() is the only way to reach the DI container from inside them. Constructor injection remains valid for standard component/service classes and for codebases on Angular versions before inject() existed (pre-14), but it is not the rule's default recommendation for new code. The rule's forbidden pattern, regardless of which injection style is used, is manual instantiation: if a service is not available in the DI container, add it to the providers array or the providedIn configuration; do not create a new instance by hand."

[[option]]
id = "inject-function-as-default"
label = "Prefer inject() as the default injection mechanism; constructor injection for cases that still need it"
directive = "Services and dependencies are obtained primarily via the inject() function, called as a class field initializer (e.g., private http = inject(HttpClient);) at the top of the class body, per Angular's own style guide and the angular-eslint prefer-inject rule. This is required, not just preferred, in functional guards, interceptors, and resolvers, which are plain functions with no constructor to inject into. Constructor-parameter injection remains acceptable where a class specifically benefits from it (e.g. explicit dependency lists useful for subclassing, or a codebase on Angular <14 that predates inject()), but is not the default recommendation for new code. Manually instantiating a service with 'new' is forbidden under either style."
why = "Both of this rule's own cited sources (Angular's DI guide and the Angular Style Guide) explicitly recommend inject() over constructor parameter injection, and angular-eslint ships a dedicated prefer-inject lint rule enforcing it. Since Angular introduced functional interceptors, guards, and resolvers, which are plain functions rather than classes and so have no constructor at all, inject() is frequently the only mechanism available, making it the more broadly applicable default rather than a stylistic alternative to constructor injection."

[[option]]
id = "services-are-injected-via-constructor-or-inject"
label = "Constructor-parameter injection"
directive = "Dependencies are declared as constructor parameters, and Angular's DI system supplies the right instance (singleton, scoped, or factory-created as configured) when the class is constructed. Services are configured via the providers array (in a component's @Component decorator, in an NgModule, or in the providers array of a bootstrapApplication call) or via providedIn: 'root' in the @Injectable decorator. This remains valid for standard component/service classes, which always have a constructor to inject into, for teams with an established constructor-DI convention, or for codebases on Angular versions before inject() existed (pre-14). It does not work for functional guards, interceptors, or resolvers, which are plain functions with no constructor."
why = "Constructor injection ensures the same singleton behavior, initialization, mocking for tests, and ability to swap implementations without code changes that inject() provides; the two share the same DI guarantees. It remains a legitimate OOP-style option, but both of this rule's cited sources recommend inject() as the primary mechanism, and inject() is required (not just preferred) in functional guards/interceptors/resolvers where no constructor exists."

[[option]]
id = "services-are-manually-instantiated-with-new-where"
label = "Manual instantiation with new"
directive = "services are instantiated manually using the 'new' keyword where needed, rather than relying on dependency injection"
why = "Manually instantiating services with new bypasses Angular's DI container entirely: the constructor runs outside the container, any initialization or lifecycle hooks are skipped, the service is not a singleton (a new instance is created every time), and swapping the implementation for testing requires modifying source code rather than providing a different token. Each manually instantiated service is also invisible to the DI system, so it cannot have its own dependencies injected by Angular."
