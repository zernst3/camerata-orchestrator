id = "JAVASCRIPT-ANGULAR-TYPED-HTTPCLIENT-1"
title = "HTTP requests are made through typed services, not directly from components"
tag = "stack"
domain = "javascript:angular"
layer = "framework"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: HTTP requests are made through typed services, not directly from components?"
default = "http-requests-are-made-through-typed-services"
why = "HTTP requests are a data-access concern; making them directly from a component mixes transport concerns into the presentation layer. When a component calls HttpClient.get() or HttpClient.post() directly, the HTTP logic is embedded in the component, unreachable by other routes or services that might need the same data, and difficult to test without mocking HttpClient. A service (often called a 'data service' or 'API service') wraps the HTTP calls, maps the response to domain types, and exposes Observable methods that components can call. Services handle the HTTP layer; components inject the service and call its methods. The pattern parallels the Express backend rule: route handlers delegate to a service layer; Angular components delegate to a service layer. The service is testable, reusable across the app, and the component focuses on presentation and coordination. The rule is: HttpClient is injected only into services, never into components. A component that needs data calls a service method that returns an Observable; the service handles the HTTP request, response parsing, and error translation."

[[option]]
id = "http-requests-are-made-through-typed-services"
label = "HTTP requests are made through typed services, not directly from components"
directive = "All HTTP requests (GET, POST, PUT, DELETE) are made through typed services that wrap HttpClient. Services inject HttpClient, define methods that call it (with proper return types and error handling), and expose Observables of typed domain objects to components. Components never inject HttpClient or call it directly; they call service methods. A component that needs to fetch data injects a data service and subscribes to its Observable, or uses the async pipe. Direct HttpClient.get() or HttpClient.post() calls from within a component are forbidden."
why = "The adopted default. Services decouple the HTTP layer from presentation, making the logic reusable and testable. The component becomes a thin view layer."

[[option]]
id = "components-call-httpclient-directly-for-data-fetc"
label = "components call HttpClient directly for data fetching …"
directive = "components inject HttpClient and make HTTP requests directly, handling the request, response, and error in the component"
why = "A defensible alternative the project considered and did not adopt as the default."
