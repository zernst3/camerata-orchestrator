id = "JAVASCRIPT-ANGULAR-NO-DIRECT-DOM-MANIPULATION-1"
title = "DOM is not manipulated directly; Renderer2 and property bindings are used instead"
tag = "stack"
domain = "javascript:angular"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://angular.dev/guide/components/dom-apis"
title = "Angular — DOM APIs and Renderer2"

[[sources]]
url = "https://angular.dev/guide/ssr#why-use-server-side-rendering"
title = "Angular SSR — server-safe DOM abstraction rationale"

[decision]
question = "What position does the project take on: DOM is not manipulated directly; Renderer2 and property bindings are used instead?"
default = "dom-is-not-manipulated-directly-renderer2-and-bin"
why = "Direct DOM manipulation using document.querySelector(), .innerHTML, .className, or .style bypasses Angular's rendering system and creates a mismatch between the Angular model and the actual DOM. When the component re-renders or change detection runs, Angular's view may be out of sync with the directly-modified DOM, leading to bugs where the component state and the rendered view diverge. Direct manipulation also makes server-side rendering (SSR) impossible; it is not safe for web workers or other non-browser environments. Angular provides safe patterns that integrate with its rendering system: property bindings in the template ([property]='value', [style.color]='value', [class.active]='value'), the Renderer2 service (for imperative DOM changes that cannot be expressed in a template), and — since Angular 16+ — the afterRender and afterNextRender lifecycle hooks, which are now the more idiomatic place to run imperative DOM-touching code safely, because they guarantee the callback runs after Angular has finished rendering (and, unlike a raw constructor/ngOnInit body, are SSR-safe by construction: framework-provided phases like read/write let code that must inspect layout or touch the DOM opt out of running during server-side rendering rather than requiring the author to guard it manually). Renderer2 remains valid, especially for imperative element mutation itself (setStyle, addClass, setProperty) and non-browser rendering targets; afterRender/afterNextRender solve a different but related problem — safely timing when DOM-touching code (including Renderer2 calls) runs relative to a render, particularly in standalone components. The rule is: do not use document.querySelector(), .innerHTML, .style, or .className directly; use template bindings, Renderer2, and — for render-timed imperative work — afterRender/afterNextRender instead. Accessing the DOM via ViewChild and manipulating it must use Renderer2, not direct properties."

[[option]]
id = "dom-is-not-manipulated-directly-renderer2-and-bin"
label = "DOM is not manipulated directly; Renderer2, property bindings, and afterRender/afterNextRender are used instead"
directive = "DOM manipulation uses one of these patterns: (1) template bindings for declarative updates ([property]='value', [style.property]='value', [class.name]='condition'); (2) Renderer2 service for imperative DOM changes (Renderer2.setStyle, Renderer2.addClass, Renderer2.setProperty); and (3) for code that must run imperative, DOM-touching logic safely relative to a render (measuring layout, integrating a non-Angular DOM library, focus management), the afterRender or afterNextRender lifecycle hooks (Angular 16+), which are SSR-safe and the current idiomatic choice for this timing concern, typically calling Renderer2 or native DOM APIs from within the hook's callback. Direct calls to document.querySelector(), .innerHTML, .style, .className, or any direct property assignment on DOM elements outside these patterns are forbidden. When accessing elements via ViewChild or ElementRef, only Renderer2 methods or property bindings are used to modify the DOM."
why = "Property bindings and Renderer2 keep Angular's model and the DOM in sync, enable SSR and alternative rendering targets, and prevent desynchronization bugs. afterRender/afterNextRender add the render-timing guarantee that older code often approximated with setTimeout(0) or manual SSR guards, and are the more current recommendation for scheduling DOM-touching work — they don't replace Renderer2's role as the DOM-abstraction/mutation mechanism itself."

[[option]]
id = "direct-dom-manipulation-using-documentqueryselec"
label = "Direct DOM manipulation"
directive = "direct DOM manipulation is performed using document.querySelector, .innerHTML, .style, and .className assignments to modify the DOM without going through Angular's rendering system"
why = "Direct DOM manipulation via document.querySelector, .innerHTML, or .style bypasses Angular's rendering system, creating a mismatch between the Angular model and the actual DOM: when change detection runs, Angular may overwrite the direct change, causing state/view divergence. Direct manipulation also makes server-side rendering impossible and breaks the component in non-browser environments (web workers, Angular Universal), which limits rendering targets and deployment options."
