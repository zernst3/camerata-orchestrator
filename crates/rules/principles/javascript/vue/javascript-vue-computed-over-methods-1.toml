id = "JAVASCRIPT-VUE-COMPUTED-OVER-METHODS-1"
title = "Use computed properties for derived state, not methods with side effects"
tag = "stack"
domain = "javascript:vue"
layer = "framework"
enforcement = "prose"
default = true
verification = "grounded"

qualifies = "vue/no-side-effects-in-computed-properties checks a narrower, different thing than 'prefer computed over methods': it flags a computed property whose getter itself performs a side effect (assigning to a different reactive property, mutating external state), which is a smell inside a computed property that already exists. It says nothing about whether a given template expression should have been a computed property instead of a method in the first place — that judgment call (is this method call pure and cacheable, or does calling it repeatedly matter, e.g. because it has a side effect or its cost is negligible) is not something a linter can generally determine by inspection, since it requires knowing whether the method is actually pure and whether re-computation cost matters for that specific case. So the core of this rule (prefer computed for derived state, not methods) is enforced by code review and convention, not by CI lint; the cited rule only catches one specific downstream mistake (a side effect leaking into a computed getter) after the computed-vs-method choice has already been made correctly."

[[sources]]
url = "https://vuejs.org/guide/essentials/computed.html"
title = "Vue.js — Computed Properties: computed caching vs methods"

[[sources]]
url = "https://eslint.vuejs.org/rules/no-side-effects-in-computed-properties.html"
title = "eslint-plugin-vue — vue/no-side-effects-in-computed-properties"
linter = "eslint-plugin-vue: vue/no-side-effects-in-computed-properties"

[decision]
question = "What position does the project take on: Computed properties vs methods?"
default = "computed-for-derived-state"
why = "A computed property derives a value from reactive data and caches the result. When the underlying data changes, the computed property recomputes automatically. When data does not change, the computed property returns the cached value without recomputing. A method, by contrast, runs every time it is called, so if you call the same method twice with no data change in between, the computation happens twice. Using a method to derive state (e.g., a method that filters and transforms a list) means the transformation runs on every template render and every method call, even if the input data has not changed. Using a computed property for the same transformation means the result is computed once and cached. Computed properties also signal intent: a computed property is a pure function with no side effects that transforms input data. A method can have side effects (call an API, mutate global state). Using computed for derived state and methods for side-effect-triggering actions keeps the code readable."

[[option]]
id = "computed-for-derived-state"
label = "Use computed properties for derived state"
directive = "Derived values that depend on reactive data are computed properties. A computed property transforms or filters reactive data without side effects and is only recomputed when its dependencies change. Methods are used for event handlers or actions with side effects (API calls, mutations), not for deriving state."
why = "Computed properties cache derived state and improve performance."

[[option]]
id = "methods-for-derived-state"
label = "Use methods for derived state"
directive = "Derived values are computed using methods. The method is called from the template and recomputes every time it is invoked."
why = "Using a method to derive state means the computation runs on every template render and every call, even when the underlying reactive data has not changed, because methods have no caching. Calling the same method twice in a template runs the transformation twice; in a list render, it runs once per row per render cycle. This choice trades the free cache that computed properties provide for code that looks simpler at the definition site but silently re-executes more than intended."
