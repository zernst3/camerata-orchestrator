id = "JAVASCRIPT-VUE-STORE-PINIA-SHARED-STATE-1"
title = "Sharing state across Vue components: a Pinia store, or passing it through props"
tag = "stack"
domain = "javascript:vue"
layer = "framework"
enforcement = "structured"
default = false
verification = "grounded"

[[sources]]
url = "https://pinia.vuejs.org/introduction.html"
title = "Pinia — Introduction: official Vue state management recommendation"

[[sources]]
url = "https://vuejs.org/guide/scaling-up/state-management"
title = "Vue.js — State Management: Pinia as official solution"

[decision]
question = "How is state that more than one component needs shared: through a Pinia store, or by passing it down through props and back up through events?"
why = "The right mechanism follows from how widely the state is shared and how deep the component tree is between the components that need it, not from a presumed winner. A Pinia store holds shared state outside the component tree, so any component reads it via useStore() without intermediate components threading it through, and it stays reactive across every consumer; it is the natural fit for state used by many components across the tree (the logged-in user, theme, app-wide filters) and it tests cleanly because a store can be instantiated without a component tree. Passing state through props (down) and events (up) keeps data flow explicit and local, with no global state to reason about; it is the natural fit when the state is shared only between a parent and its near children, where the path is short and the explicitness is a feature. Choose by the distance and breadth of sharing: parent-to-near-child and narrow favors props/events; broad or deep sharing favors a store, and reaching for one when the other fits is the cost to avoid."

[[option]]
id = "use-pinia-for-shared-state"
label = "hold shared state in a Pinia store"
directive = "State that multiple components across the tree need is held in Pinia stores. Components access stores via useStore() (or const userStore = useUserStore(), etc.). State used by only one component or its immediate children stays local to the component."
why = "Holds shared state outside the component tree so any consumer reads it directly and reactively, without intermediate components forwarding it; a store also instantiates without a component tree, which keeps its logic unit-testable. The strongest fit for state shared broadly or deeply (current user, theme, app-wide selections); its cost is a piece of global state to name and reason about, which is overkill for state that only travels parent-to-near-child."

[[option]]
id = "prop-drilling-for-shared-state"
label = "pass shared state through props and events"
directive = "State is passed from a parent component to children as props, and children that need to change it emit events back to the parent; the parent owns the state and the data flow between it and its children is explicit."
why = "Keeps data flow explicit and local with no global state to reason about: the owning component and the path the data takes are visible in the props and events themselves. The right fit when the state is shared only between a parent and its near children, where the path is short; its known trade-off is that across a deep tree every intermediate component must forward props it does not use, so it stops fitting once the state must reach distant or many components."
