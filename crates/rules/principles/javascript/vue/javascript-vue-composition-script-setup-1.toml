id = "JAVASCRIPT-VUE-COMPOSITION-SCRIPT-SETUP-1"
title = "Vue component logic style: Composition API with <script setup>, or the Options API"
tag = "stack"
domain = "javascript:vue"
layer = "framework"
enforcement = "structured"
default = false
verification = "grounded"

[[sources]]
url = "https://vuejs.org/guide/extras/composition-api-faq"
title = "Vue.js — Composition API FAQ"

[[sources]]
url = "https://vuejs.org/api/sfc-script-setup"
title = "Vue.js — <script setup> SFC Syntax Sugar"

[[sources]]
url = "https://eslint.vuejs.org/rules/component-api-style.html"
title = "eslint-plugin-vue — vue/component-api-style"
linter = "eslint-plugin-vue: vue/component-api-style"

[decision]
question = "What style does the project use to write Vue component logic: the Composition API with <script setup>, or the Options API?"
why = "Both are first-class, officially-supported Vue APIs, and the right one follows from a component's complexity and the team's familiarity rather than from a presumed winner. The Composition API with <script setup> co-locates a feature's state, computed values, and handlers, and lets shared logic be extracted into composables; it is the natural fit for components with non-trivial or reusable logic, and for teams comfortable with the reactivity primitives (ref, computed, watch). The Options API organizes a component into fixed sections (data, computed, methods, lifecycle hooks), giving a predictable, low-ceremony shape that many developers find easier to learn and read at a glance; it is a strong fit for simple components and for teams already fluent in it or maintaining an Options-API codebase. Choose by how much logic a component carries and which style the team reads most fluently, and apply it consistently within a codebase."

[[option]]
id = "composition-api-script-setup"
label = "use the Composition API with <script setup>"
directive = "Component logic uses the Composition API (ref, computed, watch, onMounted, etc.) and is written in a <script setup> block."
why = "Co-locates a feature's state, derived values, and handlers in one place and lets shared logic be lifted into composables, so a reviewer reads a feature without jumping between sections and reuse across components is straightforward. The strongest fit for components with non-trivial or reusable logic and teams fluent in Vue's reactivity primitives; it asks more familiarity with those primitives than the Options API does."

[[option]]
id = "options-api"
label = "use the Options API"
directive = "Component logic is organized using the Options API: data(), computed, methods, lifecycle hooks (mounted, created, etc.). Component state, derived values, and handlers live in their respective option sections."
why = "Gives every component the same predictable, low-ceremony shape — state in data(), derived values in computed, behaviour in methods — which many developers find easier to learn and read at a glance. The fit for simple components, teams already fluent in it, or codebases standardized on it; its trade-off is that a single feature's code is spread across the fixed sections, so it scales less gracefully than the Composition API for large components with heavily reused logic."
