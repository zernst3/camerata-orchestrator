id = "JAVASCRIPT-EXPRESS-CENTRAL-ERROR-HANDLER-1"
title = "Errors flow to one central error-handling middleware; async handlers forward via next"
tag = "stack"
domain = "javascript:express"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://expressjs.com/en/advanced/best-practice-performance.html"
title = "Express.js — Production best practices: error handling (async/await + next(err))"

[[sources]]
url = "https://expressjs.com/en/guide/error-handling.html"
title = "Express.js — Error Handling: four-argument (err, req, res, next) error middleware"

[decision]
question = "What position does the project take on: Errors flow to one central error-handling middleware; async handlers forward via next?"
default = "errors-flow-to-one-central-error-handling-middle"
why = "Express has one built-in mechanism for handling errors: the error-handling middleware, a function with the four-argument (err, req, res, next) signature, registered last. Routes signal a failure by throwing (in sync code) or calling next(err) (in async code), and Express routes it there. The async-rejection hazard is version-specific: in Express 4 and earlier, a Promise rejection inside an async route handler is NOT caught automatically, so an un-wrapped async handler that rejects leaves the request hanging until it times out, with no response and no error logged, unless the handler is wrapped (a manual try/catch calling next(err), an asyncHandler wrapper, or the express-async-errors package). Express 5 (released 2024, and the version this project's own API runs — see apps/api) removes this hazard: rejected promises returned from async route handlers and middleware are automatically caught and forwarded to the error-handling middleware, with no wrapper required. Each route inventing its own try/catch that formats and sends an error response produces inconsistent status codes and bodies across the API and scatters the logging, regardless of Express version. Centralizing means one place decides the error response shape, the status mapping, and the logging. Ad-hoc per-route error handling trades that single consistent contract for N partial reimplementations, and the gaps surface as a route that returns a 200 with an error body, or (on Express 4) one that hangs forever on a rejected promise."

[[option]]
id = "errors-flow-to-one-central-error-handling-middle"
label = "Errors flow to one central error-handling middleware; async handlers forward via next"
directive = "The app registers a single error-handling middleware with the (err, req, res, next) signature, last in the middleware chain, which owns the error response shape, status-code mapping, and error logging. Route handlers signal failure by throwing (sync) or forwarding to next(err) (async), never by formatting and sending error responses ad hoc. On Express 5, an async handler's rejected promise is forwarded to the central handler automatically — no wrapper needed. On Express 4 and earlier, async handlers must be wrapped so their rejections reach the central handler (an asyncHandler wrapper, the express-async-errors package, or manual try/catch + next(err)); a bare async route whose rejection can escape is forbidden on that version."
why = "Express routes thrown and next(err) errors to the four-argument error middleware. Express 5 auto-catches async rejections and forwards them there directly; Express 4 does not, and needs an explicit wrapper. Either way, one central handler gives uniform error responses and guarantees rejections are not lost to a hung request."

[[option]]
id = "each-route-handles-its-own-errors-with-local-try"
label = "Local try/catch per route handler"
directive = "each route handles its own errors with local try/catch blocks that format and send their own error responses, rather than forwarding to a single central error-handling middleware via throw or next(err)"
why = "Each route inventing its own try/catch and error-response logic produces inconsistent status codes and response shapes across the API, scatters logging, and still misses the async-rejection case unless every handler remembers its async wrapper. The result is N partial reimplementations of the same error contract, with the gap surfacing as a 200 with an error body or a request that hangs forever on a rejected promise."
