id = "JAVASCRIPT-TYPESCRIPT-NO-FLOATING-PROMISES-1"
title = "Every Promise is awaited, returned, or explicitly handled"
tag = "stack"
domain = "javascript:typescript"
layer = "language"
enforcement = "mechanical"
default = true
qualifies = "Enforced by the type-aware @typescript-eslint/no-floating-promises rule (which requires parserOptions.project so the linter has type information), failing the lint step on any Promise-returning expression whose result is neither awaited, returned, nor passed to a handler. Conformance holds when the rule is at error severity with type information available and a floating promise fails the build; it fails when the rule is absent, type-aware linting is not configured, or the rule only warns."
verification = "grounded"

[[sources]]
url = "https://typescript-eslint.io/rules/no-floating-promises"
title = "typescript-eslint — @typescript-eslint/no-floating-promises rule"
linter = "@typescript-eslint: no-floating-promises"

[decision]
question = "What position does the project take on: Every Promise is awaited, returned, or explicitly handled?"
default = "every-promise-is-awaited-returned-or-explicitly"
why = "A Promise whose result is discarded is a floating promise: the asynchronous work still runs, but nothing waits for it and nothing observes its rejection. The two failure modes are both silent and both serious. First, a rejection in a floating promise becomes an unhandled rejection that no try/catch can reach, crashing the process on some runtimes and vanishing on others. Second, the surrounding function continues past the un-awaited call as though the work were done, so ordering guarantees the author assumed (write completes before read, transaction commits before response) are quietly violated under load. The bug is invisible in local testing where the async work happens to finish fast enough, and surfaces as a flaky, timing-dependent failure in production. Letting promises float because the result 'is not needed' conflates not needing the value with not needing the completion or the error; if a call is genuinely fire-and-forget, marking it void with the rejection explicitly handled states that intent, whereas a bare floating call states nothing."

[[option]]
id = "every-promise-is-awaited-returned-or-explicitly"
label = "Every Promise is awaited, returned, or explicitly handled"
directive = "Every expression that returns a Promise is awaited, returned to the caller, or chained with a .catch handler. A genuinely fire-and-forget call is marked with the void operator AND attaches its own rejection handler, so the discard is deliberate and the error path is still covered. A bare Promise-returning call whose result is dropped is forbidden."
why = "A floating promise still runs but nothing waits for it and nothing observes its rejection, producing unhandled rejections and silently violated ordering guarantees that surface as flaky, timing-dependent production failures."

[[option]]
id = "promise-returning-calls-may-be-left-floating-whe"
label = "Promise-returning calls may be left floating when the …"
directive = "Promise-returning calls may be left floating when the result is not needed, relying on the author to await only where a value is consumed, rather than requiring every promise to be awaited, returned, or explicitly voided-and-handled"
why = "Leaving a Promise-returning call floating when the result is not needed conflates not needing the value with not needing the completion or the error: a rejection in a floating promise becomes an unhandled rejection that no try/catch can reach, and the surrounding function continues past the un-awaited call as though the work were done, silently violating ordering guarantees (write completes before read, transaction commits before response) in ways that surface as flaky, timing-dependent production failures rather than local errors."
