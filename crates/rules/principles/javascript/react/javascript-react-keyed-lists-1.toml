id = "JAVASCRIPT-REACT-KEYED-LISTS-1"
title = "Rendered lists carry a stable key from the data, never the array index"
tag = "stack"
domain = "javascript:react"
layer = "framework"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Rendered lists carry a stable key from the data, never the array index?"
default = "rendered-lists-carry-a-stable-key-from-the-data"
why = "React reconciles a list by matching the key of each child to the key it saw last render; the key is how it decides which items moved, which are new, and which were removed. A key derived from a stable identity in the data (a record id) lets React move existing DOM and preserve each row's component state across reorders, insertions, and deletions. Using the array index as the key defeats this: when the list reorders or an item is inserted or removed at the front, every following item's index shifts, so React thinks the data at each position changed and reassigns existing component state and DOM to the wrong rows. The list still renders, which is why this passes casual review, but uncontrolled state tied to position (a focused input, a checkbox, in-progress text, scroll) silently jumps to the wrong row on the first reorder. This is the same hazard as the Dioxus iterated-key rule. Omitting the key entirely is a lint error; using the index is the subtler trap because it looks intentional. The index is acceptable only for a list that is static, never reordered, and never inserted into except at the end."

[[option]]
id = "rendered-lists-carry-a-stable-key-from-the-data"
label = "Rendered lists carry a stable key from the data, never the array index"
directive = "Every child rendered from an array carries a key prop derived from a stable identity in the underlying data (a record id or other unique field), not the array index and not a freshly generated value. The array index is acceptable as a key only when the list is provably static: never reordered, never filtered, and only ever appended to at the end."
why = "The adopted default. React reconciles a list by key; an index key reassigns existing component state and DOM to the wrong rows on the first reorder or front-insertion, so position-bound state like focus or in-progress input silently jumps rows while the list still renders."

[[option]]
id = "rendered-lists-use-the-array-index-as-the-key-re"
label = "rendered lists use the array index as the key …"
directive = "rendered lists use the array index as the key regardless of whether the list reorders or has items inserted and removed, rather than requiring a key derived from a stable identity in the data"
why = "A defensible alternative the project considered and did not adopt as the default."
