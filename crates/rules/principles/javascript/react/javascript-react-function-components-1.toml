id = "JAVASCRIPT-REACT-FUNCTION-COMPONENTS-1"
title = "React component style: function components with hooks, or class components"
tag = "stack"
domain = "javascript:react"
layer = "framework"
enforcement = "structured"
default = false
verification = "grounded"

[[sources]]
url = "https://react.dev/reference/react/Component"
title = "React docs — Component (class): 'We recommend defining components as functions instead of classes'"

[decision]
question = "What style does the project use to write React components: function components with hooks, or class components?"
why = "Both are supported ways to write React components, and the right one follows from the React version and codebase the project targets rather than from a presumed winner. Function components with hooks are the shape React's documentation, tooling, and newer APIs are built around: state and effect logic lives inline and reusable logic extracts into custom hooks, which makes them the natural fit for new code on modern React. Class components organize a component into lifecycle methods and this.state, a maintained form that remains the established shape for codebases already built on it and the required form for the few APIs that still need a class (notably error boundaries, until an official hook equivalent ships); a wholesale conversion of an existing class-based codebase is a large migration for little immediate gain. The one cost worth avoiding is mixing both idioms arbitrarily for the same concerns within a codebase, since hook logic and lifecycle logic do not transfer between them. Choose by the React version and the existing structure, and keep the codebase on one idiom."

[[option]]
id = "components-are-functions-using-hooks-not-classes"
label = "write components as functions using hooks"
directive = "Components are written as functions that use hooks for state and lifecycle. The one structural exception is an error boundary, which currently requires a class; it is isolated as a small, single-purpose wrapper rather than becoming a pattern that pulls other logic back into class form."
why = "Keeps a component's state and effect logic inline and lets reusable logic be lifted into custom hooks, and it is the shape React's tooling and newer APIs are built around, so a reviewer reads every component the same way. The strongest fit for new code on modern React; the one form it still cannot express is an error boundary, which remains a small class wrapper until an official hook equivalent ships."

[[option]]
id = "class-components-are-written-alongside-function"
label = "write components as classes with lifecycle methods"
directive = "Components are written as classes that extend React.Component, holding state in this.state and reacting to changes through lifecycle methods (componentDidMount, componentDidUpdate, componentWillUnmount). The codebase stays on this idiom consistently rather than mixing it with hook-based components for the same concerns."
why = "Organizes a component into lifecycle methods and this.state, the established shape for codebases already built on classes and the required form for the APIs that still need a class (such as error boundaries). The fit for an existing class-based codebase where the structure is settled and a wholesale conversion to hooks would be a large migration for little immediate gain; its trade-off is that reusable stateful logic cannot be packaged as a custom hook, so sharing it across components takes heavier patterns (HOCs, render props)."
