id = "JAVASCRIPT-REACT-FUNCTION-COMPONENTS-1"
title = "Components are functions using hooks, not classes"
tag = "stack"
domain = "javascript:react"
layer = "framework"
enforcement = "structured"
default = true
verification = "grounded"

[[sources]]
url = "https://react.dev/reference/react/Component"
title = "React docs — Component (class): 'We recommend defining components as functions instead of classes'"

[decision]
question = "What position does the project take on: Components are functions using hooks, not classes?"
default = "components-are-functions-using-hooks-not-classes"
why = "Function components with hooks are the shape React's documentation, tooling, and newer APIs are built around; class components are a maintained-but-legacy form that the ecosystem is steadily leaving behind. The practical cost of mixing both is not stylistic: state and effect logic written for hooks does not transfer to classes and vice versa, so a codebase with both maintains two parallel idioms for the same concerns (lifecycle vs effects, this.state vs useState), and shared logic cannot be extracted into a custom hook if half the components cannot consume it. Standardizing on function components keeps reusable logic expressible as custom hooks and keeps every component reading the same way. Writing new class components because they are familiar splits the codebase's idiom and cuts those components off from the hook-based patterns the rest of the app and the wider ecosystem use; the rare genuine need for a class (a custom error boundary, until the official hook equivalent ships) is the narrow exception, not the default."

[[option]]
id = "components-are-functions-using-hooks-not-classes"
label = "Components are functions using hooks, not classes"
directive = "Components are written as functions that use hooks for state and lifecycle. Class components are not written for new code. The one sanctioned exception is an error boundary, which currently requires a class; it is isolated as a small, single-purpose wrapper rather than becoming a pattern that pulls other logic back into class form."
why = "The adopted default. Function components with hooks are the shape React's tooling and newer APIs are built around; mixing in class components maintains two parallel idioms for the same concerns and cuts those components off from custom-hook reuse."

[[option]]
id = "class-components-are-written-alongside-function"
label = "class components are written alongside function components …"
directive = "class components are written alongside function components at the author's discretion, maintaining lifecycle-method and hook-based idioms in parallel, rather than standardizing on function components with hooks for new code"
why = "A defensible alternative the project considered and did not adopt as the default."
