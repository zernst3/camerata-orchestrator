id = "RUBY-RAILS-NO-SECRETS-IN-CODE-1"
title = "Credentials and secrets are loaded from Rails credentials or environment variables, never hardcoded"
tag = "stack"
domain = "ruby:rails"
layer = "framework"
enforcement = "mechanical"
default = true
qualifies = "Enforced by Gitleaks or Trufflehog in CI (detects secret patterns in committed files) and by convention: `config/credentials.yml.enc` (encrypted, safe to commit) and `ENV.fetch(...)` are the two sanctioned retrieval paths. Any string literal that matches a common secret pattern (API key, bearer token, private key header, connection string with embedded password) in any `.rb`, `.yml`, `.env`, or config file that is not `.gitignore`d fails the secret-scan gate."
verification = "grounded"

[decision]
question = "How are credentials (API keys, database passwords, OAuth secrets, private keys) stored and accessed?"
default = "credentials-yml-enc-or-env"
why = "A secret committed to source control enters the git history permanently. Even if the line is removed in a subsequent commit, it remains recoverable via `git log -p` for anyone with repository access, and persists in every clone and every container image built from that history. Rails credentials (`config/credentials.yml.enc` encrypted with `config/master.key`, or per-environment `config/credentials/<env>.yml.enc`) store secrets encrypted in the repository — only someone with the master key can decrypt them. Environment variables are the alternative: the secret lives outside the repository entirely and is injected at runtime by the deployment system. Hardcoding a secret in `config/initializers/`, `config/environments/`, or a constant in any Ruby file is the pattern both approaches eliminate."

[[option]]
id = "credentials-yml-enc-or-env"
label = "Rails encrypted credentials or environment variables"
directive = "All credentials are accessed via `Rails.application.credentials.fetch(:secret_name)` (Rails encrypted credentials, safe to commit) or `ENV.fetch('SECRET_NAME')` (environment variable, injected at deploy time). The master key (`config/master.key`) is stored out of the repository (in a vault, CI secret, or environment variable). String literals that are API keys, passwords, tokens, or private keys do not appear in any `.rb`, `.yml`, or config file tracked by git. A Gitleaks or Trufflehog scan gate runs in CI and fails the build on any detected secret pattern."
why = "The adopted default. Encrypted credentials keep secrets encrypted in the repository; environment variables keep them out of the repository entirely. Both prevent secrets from entering git history."

[[option]]
id = "plain-config-files"
label = "store secrets in plain-text config or initializer files committed to git"
directive = "Credentials are defined as string literals or constants in `config/initializers/`, `config/environments/`, or Ruby files tracked by version control."
why = "The secret enters git history permanently and is visible to anyone with repository access; rotation requires a commit and redeployment."

[[option]]
id = "dotenv-committed"
label = "use a .env file committed to git"
directive = "Secrets are stored in a `.env` file that is version-controlled alongside the application."
why = "Equivalent to storing secrets in a committed config file; the `.env` pattern is safe only when the file is listed in `.gitignore`."

[[sources]]
url = "https://github.com/gitleaks/gitleaks"
title = "Gitleaks — secrets detection tool for git repositories"
linter = "Gitleaks: secret pattern detection"

[[sources]]
url = "https://guides.rubyonrails.org/security.html#custom-credentials"
title = "Rails Guides — Securing Rails Applications: Custom Credentials"
