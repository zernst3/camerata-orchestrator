id = "RUBY-RAILS-STRONG-PARAMS-1"
title = "Rails controllers use strong parameters to whitelist and validate user input; no mass assignment of untrusted data"
tag = "stack"
domain = "ruby:rails"
layer = "framework"
enforcement = "mechanical"
default = true
qualifies = "Enforced by Rails' built-in strong_parameters feature and code review. Conformance holds when all controller actions use permit() to explicitly allow specific parameters before passing them to model methods like create() or update(). Static analysis (Brakeman) flags bare params hash usage in model mutations."
verification = "grounded"

[decision]
question = "How does the controller restrict which parameters are passed to model creation and updates?"
default = "strong-parameters"
why = "Rails ActiveRecord models can be instantiated or updated with Model.new(params) or Model.update(params), but bare params are a mass-assignment vulnerability: an attacker can forge request parameters and set any column they want (e.g., is_admin, role, or created_at). Strong parameters require the controller to explicitly permit() each parameter it accepts, acting as a whitelist between the HTTP request and the model layer. This boundary is the single checkpoint where the application decides which fields the user is allowed to set; skipping it means any parameter an attacker guesses becomes writable. Strong parameters are built into Rails and require minimal code; there is no performance or complexity downside to using them consistently."

[[option]]
id = "strong-parameters"
label = "Use Rails strong_parameters with permit() to whitelist inputs"
directive = "Every controller action that receives user input calls params.require(:resource).permit(:field1, :field2, ...) to explicitly whitelist the parameters allowed for that action. The result is passed to model methods like create() or update(). Bare params hashes are never passed directly to model mutations. Array and nested-parameter types use permit(arrays: []) and permit(nested_attr: [:id, :name]) syntax. Model mass-assignment protection (attr_accessible) is still enabled as a defense-in-depth backstop."
why = "The adopted default. Strong parameters are a built-in Rails convention that require explicit opt-in, preventing mass-assignment vulnerabilities."

[[option]]
id = "permissive-params"
label = "Allow bare params to flow directly to models with minimal validation"
directive = "Controllers pass params hashes directly to model methods like create(params) or update(params) with little or no filtering."
why = "A defensible alternative the project considered and did not adopt; creates a mass-assignment vector where attackers can set any writable column."

[[sources]]
url = "https://brakemanscanner.org/docs/warning_types/mass_assignment/"
title = "Brakeman — Mass Assignment warning type"
linter = "Brakeman: Mass Assignment"

