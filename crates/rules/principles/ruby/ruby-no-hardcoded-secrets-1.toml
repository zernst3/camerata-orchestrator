id = "RUBY-NO-HARDCODED-SECRETS-1"
title = "Secrets, API keys, and credentials are never hardcoded; all are loaded from environment variables or Rails encrypted credentials"
tag = "stack"
domain = "ruby"
layer = "language"
enforcement = "mechanical"
default = true
qualifies = "Enforced by a static-analysis gate (Brakeman, detect-secrets, GitGuardian) that scans committed code for patterns matching API keys, database passwords, OAuth tokens, private keys, and other credential formats. Conformance holds when CI rejects commits containing hardcoded secrets."

[decision]
question = "Where are secrets, API keys, and database credentials stored and accessed?"
default = "environment-variables-and-encrypted-credentials"
why = "Hardcoding secrets in source code — even in version-controlled branches — is a fundamental security breach. The code is visible to anyone with repository access, the secret is captured in git history indefinitely, and the commit cannot be cleanly removed from the tree. Secrets in source also prevent safe public releases (open-source, GitHub Public) without careful redaction. Rails provides two idiomatic approaches: environment variables (ENV['SECRET_KEY']) for simple cases and Rails encrypted credentials (rails credentials:edit) for larger secret sets like API keys, database URLs, and third-party tokens. Environment variables are set by the deployment platform (Heroku, Docker, CI/CD secrets management) and never appear in the repository. Encrypted credentials are stored in git as an encrypted YAML blob that only decrypts with a deployment-specific key, keeping the secret safe even if the repository is public. Both approaches are zero-overhead compared to hardcoding; the only cost is the discipline to never skip them."

[[option]]
id = "environment-variables-and-encrypted-credentials"
label = "Load all secrets from ENV or Rails encrypted credentials"
directive = "All secrets (API keys, database URLs, OAuth tokens, private keys, encryption keys) are stored in environment variables or Rails encrypted credentials (config/credentials.yml.enc with config/master.key). Access patterns are ENV['API_KEY'] or Rails.application.credentials.dig(:api, :key). Hardcoded values are forbidden; a value that doesn't change per environment (e.g., a constant string) is still hardcoded if it looks like it might be sensitive. .env files used locally are never committed; they're listed in .gitignore and regenerated per-environment. Deployment-time secret injection (via secrets manager, CI/CD platform, or container runtime) is the source of truth."
why = "The adopted default. Secrets in ENV or encrypted credentials prevent exposure in source and git history."

[[option]]
id = "hardcoded-secrets"
label = "Hardcode secrets directly in the code or configuration files"
directive = "Secrets are stored as literal strings in source code, YAML files, or other checked-in configuration."
why = "Fundamentally insecure; exposes secrets to anyone with repository access and to git history."
