id = "RUBY-VALIDATION-LAYER-1"
title = "Input validation happens at the Rails controller level (strong_parameters) and the model level (validates); no trust of client-side validation"
tag = "stack"
domain = "ruby:rails"
layer = "framework"
enforcement = "structured"
default = true

[decision]
question = "Where are request inputs validated and sanitized?"
default = "controller-and-model-validation"
why = "Client-side validation (JavaScript) is a convenience for the user but provides no security; an attacker can forge requests that bypass it. The Rails controller layer uses strong_parameters to whitelist which inputs are accepted, and the model layer uses ActiveRecord validations (validates :email, presence: true, format: ...) to enforce business rules and data integrity. This two-layer approach means that even if an attacker submits unexpected data or bypasses the controller whitelist, the model will reject invalid data. The controller layer also handles HTTP concerns (authentication, rate limiting, input size limits), while the model layer handles domain concerns (email uniqueness, password strength, range checks). Both layers are necessary: the controller catches malformed input early, and the model ensures the database is never in an invalid state."

[[option]]
id = "controller-and-model-validation"
label = "Validate input at both the controller (strong_parameters) and model (ActiveRecord validates) layers"
directive = "The Rails controller uses strong_parameters to permit only expected fields; the model uses ActiveRecord validations (validates :field, ...) to enforce business rules and data integrity. Invalid inputs are rejected at both layers. A model method that receives unvalidated input from a background job or internal call is still responsible for validating it or assuming it came from a trusted source. Client-side validation (JavaScript) is an optional convenience but provides no security guarantees."
why = "The adopted default. Two-layer validation ensures invalid data is caught early and the database is never in an inconsistent state."

[[option]]
id = "client-side-only"
label = "Rely on client-side (JavaScript) validation with minimal server-side checks"
directive = "Validation is implemented primarily in JavaScript; the server trusts the client to send valid data."
why = "Convenient for the happy path but offers no protection against forged requests or attackers."
