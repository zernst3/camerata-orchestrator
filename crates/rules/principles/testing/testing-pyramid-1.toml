id = "TESTING-PYRAMID-1"
title = "Test pyramid: many unit tests, fewer integration tests, few end-to-end tests"
tag = "universal"
domain = "testing"
layer = "universal"
enforcement = "prose"
default = true
verification = "grounded"

[[sources]]
url = "https://martinfowler.com/articles/practical-test-pyramid.html"
title = "Ham Vocke / Martin Fowler — The Practical Test Pyramid"

[[sources]]
url = "https://martinfowler.com/bliki/TestPyramid.html"
title = "Martin Fowler — TestPyramid (bliki)"

[[sources]]
url = "https://www.mountaingoatsoftware.com/blog/the-forgotten-layer-of-the-test-automation-pyramid"
title = "Mike Cohn (Mountain Goat Software) — The Forgotten Layer of the Test Automation Pyramid (the pyramid originates in Cohn's 'Succeeding with Agile', 2009, not xUnit Test Patterns)"

[decision]
question = "How should test effort be distributed across the unit / integration / end-to-end spectrum?"
default = "pyramid-many-unit-fewer-integration-few-e2e"
why = "Unit tests are fast, cheap to write, precise in their failure signal, and require no external infrastructure. Integration tests catch wiring bugs that units miss but cost more to write and run. End-to-end tests validate real user journeys but are the slowest, most brittle, and most expensive to maintain. Inverting the pyramid (many E2E, few unit) produces suites that are slow, flaky, and costly to debug, because every failure implicates the entire stack rather than a single function. The shape is a practical guideline, not a hard count ratio: the point is that most confidence should come from the fast, isolated layer where failures are cheapest to diagnose."

[[option]]
id = "pyramid-many-unit-fewer-integration-few-e2e"
label = "Many unit tests, fewer integration tests, few end-to-end tests (the pyramid)"
directive = "Write tests at the lowest level that gives meaningful confidence: unit tests for pure logic, integration tests for component boundaries and I/O contracts, end-to-end tests only for critical user journeys. The bulk of the suite lives at the unit level; integration and E2E layers supplement, not replace, it. Avoid the 'ice cream cone' anti-pattern (many manual / E2E tests and few units)."
why = "Fast, precise feedback at the unit layer drives short feedback loops; higher layers add proportionally less confidence per test-minute invested."

[[option]]
id = "inverted-pyramid-heavy-e2e"
label = "Heavy E2E / integration bias (inverted pyramid)"
directive = "Rely primarily on end-to-end and integration tests to give confidence that the system works as a whole; write unit tests sparingly."
why = "Gives high confidence that the full stack works together and catches integration bugs that unit tests miss, but produces suites that are slow to run, brittle to infrastructure changes, and expensive to debug: every failure implicates the entire stack rather than a single function, and the feedback cycle stretches from seconds to minutes."

[[option]]
id = "no-explicit-distribution-policy"
label = "No explicit distribution policy; write tests at whichever layer feels natural"
directive = "Let developers choose test layer freely with no prescribed distribution."
why = "Gives each developer maximum flexibility and avoids policy overhead, but tends to produce the ice-cream-cone antipattern over time: developers reach for integration and E2E tests because they feel more confidence-inspiring, until the suite is slow, brittle, and expensive to maintain without a fast unit base underneath."

[[option]]
id = "honeycomb-trophy-more-integration-fewer-unit"
label = "Honeycomb / testing trophy: more integration tests, fewer pure unit tests"
directive = "Shift the bulk of test investment to integration/service-level tests that exercise a component through its real boundaries (API request in, DB write out, with only true externalities like other services stubbed), keep a thin layer of unit tests for complex pure logic and edge cases, and keep end-to-end tests rare. Favor this shape for applications whose value is mostly in wiring together I/O (APIs, DB-backed services, ORMs, framework routing) rather than in complex pure computation."
why = "For CRUD-shaped and API-heavy applications, most defects live at the seams — serialization, query correctness, routing, middleware, auth — that pure unit tests around individual functions don't exercise, so a classic pyramid's large unit base can rack up test count without catching the bugs that actually ship. An integration/service test that hits a real (or realistically faked, e.g. an in-memory or containerized) DB and asserts on the HTTP response catches more of these per test written, and better tolerates refactoring because it doesn't couple to internal function boundaries. This is the shape behind Kent C. Dodds' 'testing trophy' and Spotify's 'honeycomb' model. The trade-off is real: integration tests are slower and more expensive to run and debug than unit tests, a failure implicates a wider slice of the system, and pure algorithmic logic (parsers, pricing math, complex validation) still benefits more from fast, precise unit tests than from being folded into a service test. This is a legitimate alternative shape for I/O-heavy applications, not a wholesale replacement for unit testing complex logic."
