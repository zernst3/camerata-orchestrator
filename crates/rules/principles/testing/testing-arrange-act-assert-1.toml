id = "TESTING-ARRANGE-ACT-ASSERT-1"
title = "Structure every test as Arrange / Act / Assert with no interleaving"
tag = "universal"
domain = "testing"
layer = "universal"
enforcement = "prose"
default = true
verification = "grounded"

[[sources]]
url = "http://xunitpatterns.com/Four%20Phase%20Test.html"
title = "xUnit Test Patterns (Meszaros) — Four-Phase Test (Setup / Exercise / Verify / Teardown)"

[[sources]]
url = "https://testing.googleblog.com/2019/12/testing-on-toilet-tests-too-dry-make.html"
title = "Google Testing on the Toilet — Tests Too DRY? Make Them DAMP! (2019)"

[[sources]]
url = "https://martinfowler.com/bliki/GivenWhenThen.html"
title = "Martin Fowler — GivenWhenThen (Given / When / Then as the BDD spelling of AAA)"

[decision]
question = "How should the internal structure of an individual test be organized?"
default = "arrange-act-assert-no-interleaving"
why = "A test that mixes setup, action, and assertion is hard to read at a glance: the reader cannot immediately see what is being set up, what the system under test is doing, or what the expected outcome is. Separating the three phases (sometimes marked with blank lines or comments) makes each test a scannable, self-documenting unit. The pattern is universal: it is known as Arrange / Act / Assert (AAA) in the xUnit world, Given / When / Then in BDD, and Setup / Exercise / Verify in Meszaros's Four-Phase Test. The 'no interleaving' constraint is the load-bearing part: interleaved assertions inside a multi-step action sequence obscure causality and make failures harder to attribute."

[[option]]
id = "arrange-act-assert-no-interleaving"
label = "Arrange / Act / Assert with no interleaving of phases"
directive = "Each test has exactly one setup block (Arrange), one action block (Act), and one assertion block (Assert), in that order, with no assertion before the action and no additional action after the first assertion. Separate blocks with a blank line or a comment when it aids readability. The BDD equivalents (Given / When / Then) are accepted spellings of the same structure. This is a constraint on each individual test's own body, not a ban on shared fixture code: genuinely common preconditions (test data builders, a before-each hook that sets up a database connection or an authenticated user) belong in shared setup rather than being re-typed in every test, following Google's Testing on the Toilet 'DAMP over DRY' guidance (Descriptive And Meaningful Phrases over Don't Repeat Yourself) — shared setup is fine as long as it doesn't obscure what a given test is actually arranging. When the specific values matter to what the test is verifying, stating them inline in that test's Arrange block (even if it duplicates a value used elsewhere) is preferable to burying them in a shared fixture the reader has to go find."
why = "A consistent three-phase shape makes every test a self-documenting, scannable unit; interleaving phases obscures which action caused which outcome. This is about the internal ordering of one test's body, not about how much setup code is shared across tests — reasonable shared fixtures are compatible with AAA as long as each test's own Arrange/Act/Assert reads clearly."

[[option]]
id = "freeform-no-required-structure"
label = "No required internal structure; write tests in whatever order is natural"
directive = "Tests may freely interleave setup, action, and assertion in whatever order the author finds clearest for the scenario."
why = "Maximizes author flexibility and can feel natural for complex scenarios, but mixes setup, action, and assertion in ways that obscure causality. When the test fails, a reader must trace through interleaved code to identify which action produced the failing assertion rather than scanning three visually distinct blocks."
