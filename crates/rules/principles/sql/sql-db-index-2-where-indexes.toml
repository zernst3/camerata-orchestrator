id = "SQL-DB-INDEX-2"
title = "Index WHERE-clause columns based on query frequency, selectivity, and access pattern, not indiscriminately"
tag = "stack"
domain = "sql"
layer = "universal"
enforcement = "prose"
default = true
qualifies = "Prose check, enforced by query-plan inspection in CI: representative queries run under EXPLAIN (or the engine's plan tool) and the gate fails on a sequential/full-table scan over a column that is frequently filtered/ordered/joined on and selective enough to benefit from an index. Composite-index column order is checked against the query patterns that will actually use the index (leading column present in the WHERE clause; equality-filter columns generally ordered before range-filter columns), not against a blanket most-selective-first rule. The realistic mechanism is a slow-query / missing-index audit (pg_stat_statements plus an unused-or-missing-index report, or the engine equivalent) run on a representative dataset. Conformance holds when that audit runs and surfaces no unindexed, high-volume, selective WHERE/ORDER BY/JOIN column on hot paths; it fails when indexes are only added reactively after production queries slow down, or when composite indexes are ordered without regard to how they're actually queried."
verification = "grounded"

[[sources]]
url = "https://www.postgresql.org/docs/current/indexes-intro.html"
title = "PostgreSQL — 11.1 Introduction to Indexes: WHERE-clause columns and JOIN-condition columns benefit from indexes"

[[sources]]
url = "https://www.postgresql.org/docs/current/pgstatstatements.html"
title = "PostgreSQL — pg_stat_statements module: tracks planning and execution statistics for identifying slow queries"

[[sources]]
url = "https://www.postgresql.org/docs/current/using-explain.html"
title = "PostgreSQL — 14.1 Using EXPLAIN: detect sequential scans on columns that should be index-backed"

[decision]
question = "What position does the project take on: which WHERE-clause columns get a supporting index, and how are composite indexes ordered?"
default = "every-where-clause-column-has-a-supporting-index"
why = "After missing FK indexes, missing indexes on columns that are actually hot in query traffic are the next most common source of large query slowdowns at scale, and adding indexes reactively after queries get slow surfaces the slowdown in production, where it costs significantly more to triage and fix than the original migration would have cost to author correctly. But this cuts both ways: indexing every column that merely appears in some WHERE clause, regardless of query volume or selectivity, is over-claimed and has a real cost, since every additional index slows down INSERT/UPDATE/DELETE on that table and wastes space on a column that is low-cardinality (so the planner would sequential-scan anyway) or queried rarely enough that the write-side cost outweighs the read-side benefit. The calibrated position is to index columns that are both frequently queried and selective (filter out most rows), or that anchor a join/lookup pattern with real query volume, not to blanket-index every WHERE-clause column indiscriminately. Composite (multi-column) index ordering is similarly over-simplified by a blanket 'most selective column first' rule: that heuristic holds for equality-only lookups, but the real driver is the query patterns the index needs to serve — the leading column must appear in the query's WHERE clause for the index to be used at all, equality-filter columns generally belong before range-filter columns, and an ORDER BY or covering requirement can change the right order independent of selectivity. This rule covers non-FK column indexing, where judgment about query frequency, selectivity, and access pattern is required; `sql-db-index-1-fk-indexes` covers foreign-key columns, where the case for an index is close to unconditional regardless of query pattern."

[[option]]
id = "every-where-clause-column-has-a-supporting-index"
label = "Index WHERE-clause columns that are frequently queried and selective, or serve real join/lookup volume"
directive = "Columns used in WHERE predicates, ORDER BY, or JOIN keys get a supporting index when they are frequently queried AND selective (the predicate filters out most rows), or when they anchor a join/lookup pattern with real, measured query volume. Low-cardinality columns (e.g. a boolean or a small enum) queried alone, or columns that appear in a WHERE clause but are rarely queried in practice, are not automatically indexed just because they appear in a WHERE clause — every index has a write-side cost (slower INSERT/UPDATE/DELETE, extra storage) that has to be justified by real read-side benefit. For composite (multi-column) indexes, column order follows the actual query patterns that will use the index: the leading column must appear in the query's WHERE clause for the index to be used at all, equality-filter columns are generally ordered before range-filter columns, and 'most selective column first' is a reasonable starting heuristic for equality-only lookups but is not a universal rule once range predicates or ORDER BY requirements are involved."
why = "After missing FK indexes, missing indexes on genuinely hot, selective WHERE-clause columns are the next most common source of large query slowdowns at scale — but indexing indiscriminately (every WHERE-clause column, regardless of selectivity or query volume) trades that benefit for a write-side cost that is easy to overlook until the table is under real load. Composite-index ordering has to follow query patterns (equality before range, leading column present in the WHERE clause), not a blanket most-selective-first rule that only holds for the equality-only case."

[[option]]
id = "indexes-on-where-clause-order-by-and-join-key-co"
label = "indexes on WHERE-clause, ORDER BY, and JOIN-key columns are …"
directive = "indexes on WHERE-clause, ORDER BY, and JOIN-key columns are added reactively in later migrations after queries get slow, rather than alongside the schema that introduces the columns"
why = "Avoids over-indexing columns that turn out to be low-cardinality or rarely queried, but surfaces slowdowns in production after users are already affected. Missing WHERE-column indexes are invisible at development data sizes and degrade linearly with table growth, so reactive discovery consistently arrives too late."
