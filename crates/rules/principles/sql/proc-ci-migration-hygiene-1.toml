id = "PROC-CI-MIGRATION-HYGIENE-1"
title = "CI hygiene — enforce migration idempotency + safety at the gate"
tag = "stack"
domain = "sql"
layer = "universal"
enforcement = "prose"
default = true
qualifies = "Enforced by a CI migration-lint step that scans every migration in the change before the build: it requires idempotency guards (IF NOT EXISTS on creates), requires an explicit opt-in marker for destructive operations (DROP, TRUNCATE, column removal), and checks for migration-journal index/sequence-number collisions. Conformance holds when that lint job runs on every PR and a migration missing an IF NOT EXISTS guard, containing an unmarked destructive op, or colliding on the journal index fails the gate; it fails when migrations rely on human review alone with no mechanical CI check."
verification = "grounded"

[[sources]]
url = "https://www.postgresql.org/docs/current/sql-createtable.html"
title = "PostgreSQL — CREATE TABLE IF NOT EXISTS (idempotency guard for DDL)"

[[sources]]
url = "https://docs.sqlfluff.com/en/stable/reference/rules.html#sqlfluff.rules.sphinx.Rule_PG01"
title = "SQLFluff PG01 — postgres.excessive_locks (ADD CONSTRAINT FOREIGN KEY … NOT VALID; CONCURRENTLY for index/drop/reindex)"
linter = "sqlfluff: PG01"

[decision]
question = "What position does the project take on: CI hygiene — enforce migration idempotency + safety at the gate?"
default = "ci-hygiene-enforce-migration-idempotency-safety"
why = "Preventive enforcement catches what code review misses under pressure; migrations are append-only, so a silent skip corrupts state downstream. Relying on code review alone to catch unsafe migrations misses cases under pressure: a reviewer with five minutes between meetings is not the right venue for catching a missing IF NOT EXISTS guard or a destructive operation slipping through, and migrations cannot be undone once they have shipped. IF NOT EXISTS (and its DROP-side counterpart, IF EXISTS) earns its keep as retry safety: it makes re-running the SAME migration script a no-op instead of an error, which matters when a migration runner is interrupted mid-apply and re-invoked. It is not a substitute for tracking which migrations have already been applied — that's the job of a migrations-journal table (or equivalent) that records applied migration IDs/checksums and refuses to re-apply or skip based on that record. A blanket IF NOT EXISTS on every CREATE, used in place of journal tracking, can silently no-op a migration whose target object already exists for an unexpected reason (e.g. someone hand-created a table matching the migration's name, or a prior migration partially applied and diverged), hiding real schema drift instead of failing loudly so someone investigates. Related but distinct: several destructive/DDL operations (adding an index, adding a NOT VALID foreign key, dropping a column) also carry a lock-safety concern independent of idempotency — a long-held lock on a hot production table (e.g. a plain CREATE INDEX without CONCURRENTLY) can block reads/writes for the duration of the migration, so CI hygiene for migrations should also flag non-concurrent index creation and long-held-lock patterns on tables expected to see production traffic."

[[option]]
id = "ci-hygiene-enforce-migration-idempotency-safety"
label = "CI hygiene — enforce migration idempotency + safety at the gate"
directive = "For SQL systems: lint every migration in CI. Require a migrations-journal table (or equivalent) that records which migrations have already been applied, so a migration is never silently skipped or re-applied based on guesswork. Use IF NOT EXISTS / IF EXISTS guards on DDL for retry safety (so re-running the same migration script after an interrupted apply is a no-op), not as a stand-in for journal tracking. Require explicit opt-in for destructive ops, guard against migration-journal index collisions, and prefer lock-safe forms for hot-table DDL (e.g. CREATE INDEX CONCURRENTLY, NOT VALID + VALIDATE CONSTRAINT for new foreign keys) so a migration doesn't hold a long lock on a table under production load. All of this runs before the build."
why = "Preventive enforcement catches what code review misses under pressure; migrations are append-only, so a silent skip corrupts state downstream. Idempotency guards protect against a retried apply of the same migration; journal tracking protects against a migration being skipped or mis-ordered; lock-safe DDL protects production availability during the apply — three related but distinct safety properties, all worth checking mechanically rather than relying on a reviewer to catch all three under time pressure."

[[option]]
id = "the-project-relies-on-human-code-review-alone-to"
label = "Human code review alone catches unsafe migrations"
directive = "the project relies on human code review alone to catch unsafe migrations, with no mechanical CI lint enforcing idempotency, destructive-op opt-in, or migration-journal index collisions"
why = "Requires no tooling investment and keeps CI configuration simple, but relies on every reviewer catching every class of migration error under time pressure. Migrations are append-only: a missing idempotency guard or an unmarked destructive operation that ships cannot be undone, only worked around with a follow-up migration."
