id = "PROC-MIGRATION-ROLE-GRANTS-1"
title = "Adding a permission seeds its role grants in the same migration"
tag = "stack"
domain = "permissions"
layer = "universal"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Adding a permission seeds its role grants in the same migration?"
default = "adding-a-permission-seeds-its-role-grants-in-the"
why = "A permission with no grants is a no-op. The feature gated on it silently does nothing for anyone, with no error to surface the gap until someone notices the feature is broken in production. The write that creates the permission and the writes that connect it to roles are inseparable parts of the same change; splitting them across migrations or deferring to a separate tool leaves the system in an intermediate state where the permission exists but produces no effect. Adding the permission row only and granting it later via a configuration tool creates a permanent gap whenever the tool does not cover the role in question, or when the role's grants were never meant to be runtime-managed in the first place. Splitting permission inserts and grant inserts across separate migrations leaves a window where the permission exists with no grants; any deploy that lands the first migration without the second is partially broken. Relying on a seed script outside the migration system lets the script and the migration drift independently, and rollbacks become incoherent across the two systems."

[[option]]
id = "adding-a-permission-seeds-its-role-grants-in-the"
label = "Adding a permission seeds its role grants in the same migration"
directive = "When a migration introduces a new permission, the same migration also writes the role-permission grants for every role that should have it. The permission row and its grant rows ship together, idempotently, in one atomic change. Roles whose grants are intentionally left for post-deploy configuration are exempt, but the migration declares that intent explicitly so a reviewer can tell the difference between a missing grant and a deliberate one."
why = "The adopted default. A permission with no grants is a no-op."

[[option]]
id = "migrations-that-introduce-a-new-permission-write"
label = "migrations that introduce a new permission write only the …"
directive = "migrations that introduce a new permission write only the permission row; granting that permission to roles is deferred to a runtime configuration tool or admin UI"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-permission-row-and-its-role-permission-grant"
label = "the permission row and its role-permission grants ship in …"
directive = "the permission row and its role-permission grants ship in separate migrations, deployed in sequence, with no requirement that both apply in the same atomic change"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-permission-row-is-added-in-a-migration-and-t"
label = "the permission row is added in a migration and …"
directive = "the permission row is added in a migration and the role-permission grants are written by a seed script that lives outside the migration system and runs separately during deploy"
why = "A defensible alternative the project considered and did not adopt as the default."
