id = "ARCH-SERVER-AUTHZ-1"
title = "Authorization on the server; UI renders permission hints"
tag = "stack"
domain = "permissions"
layer = "universal"
enforcement = "architectural"
default = true
qualifies = "Deterministically checkable, but no off-the-shelf linter rule enforces it: it requires a custom CI gate — a project-configured ESLint no-restricted-imports / no-restricted-syntax rule (or stack equivalent) wired to the project's specific permission-code and role-membership helper names, blocking the UI from importing them so client code reads only the server-computed permission flags carried on each resource response. The generic rule-id exists but carries no permission semantics until the project names its own helpers, so this is a bespoke configured check, not a citable off-the-shelf rule. Conformance holds when that gate runs in CI and a client component that re-implements an authorization decision from raw codes fails the build; it fails when no rule blocks client-side introspection and the UI can recompute permissions in the browser."
verification = "grounded"

[[sources]]
url = "CONVENTIONS.md"
title = "CONVENTIONS.md — §ARCH-SERVER-AUTHZ-1 (authorization on the server; UI renders permission hints)"

[[sources]]
url = "https://owasp.org/www-project-application-security-verification-standard/"
title = "OWASP Application Security Verification Standard (ASVS) — V4 Access Control"

[decision]
question = "What position does the project take on: Authorization on the server; UI renders permission hints?"
default = "authorization-on-the-server-ui-renders-permissio"
why = "UI can't drift from server enforcement when both read the same server-computed truth; avoids leaking RBAC internals to the browser. Client-side permission introspection lets the UI drift from server enforcement (the two evolve independently and eventually disagree), and it leaks the project's RBAC internals to the browser, where they become part of the public attack surface."

[[option]]
id = "authorization-on-the-server-ui-renders-permissio"
label = "Authorization on the server; UI renders permission hints"
directive = "Each resource response carries server-computed permission flags (e.g. _can: { manage: true }); the UI gates affordances on those flags and never recomputes permission logic client-side. Block client-side permission introspection with lint."
why = "UI can't drift from server enforcement when both read the same server-computed truth; avoids leaking RBAC internals to the browser."

[[option]]
id = "the-ui-inspects-raw-permission-codes-or-role-mem"
label = "Client-side permission/role inspection for authz"
directive = "the UI inspects raw permission codes or role membership on the client and re-implements the authorization decision in browser code, rather than gating on server-computed permission flags carried by each resource response"
why = "Client-side permission introspection lets the UI drift from server enforcement because the two evolve independently and eventually disagree; it also leaks the project's RBAC internals to the browser, where they become part of the public attack surface."
