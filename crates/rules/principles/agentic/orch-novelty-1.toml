id = "ORCH-NOVELTY-1"
title = "Novelty downgrades authority"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true

[decision]
question = "What position does the project take on: Novelty downgrades authority?"
default = "novelty-downgrades-authority"
why = "Precedent is a reality-check; an 'obvious' call with no prior example is higher-risk than one anchored in existing patterns. Treating obvious-feeling calls as settled regardless of precedent is the failure mode this rule guards against, because a call may feel obvious to the agent precisely because it is the most-blogged answer, which is exactly the calibration that decoupling from precedent is meant to catch. Applying the obvious-feeling answer immediately and flagging it for asynchronous review hedges in the wrong direction, because the change is in place before the reviewer sees it and 'good enough' tends to revert to the default once it has shipped once. Searching for analogies in adjacent codebases or upstream libraries before deciding is a useful sanity check but is not a replacement for the pause, because the absence of an analogy is itself the signal the rule wants to act on, and finding a weak analogy elsewhere is sometimes worse than admitting none exists."

[[option]]
id = "novelty-downgrades-authority"
label = "Novelty downgrades authority"
directive = "A choice with no clear analog in existing conventions is treated as contested; lack of precedent lowers confidence even when the winner feels obvious. Pause and escalate the decision to a human reviewer rather than auto-applying the obvious-feeling answer."
why = "The adopted default. Precedent is a reality-check; an 'obvious' call with no prior example is higher-risk than one anchored in existing patterns."

[[option]]
id = "the-agent-treats-obvious-feeling-calls-as-settle"
label = "the agent treats obvious-feeling calls as settled regardless of …"
directive = "the agent treats obvious-feeling calls as settled regardless of whether precedent exists for the choice, and proceeds to apply the answer"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-agent-applies-the-obvious-feeling-answer-imm"
label = "the agent applies the obvious-feeling answer immediately and surfaces …"
directive = "the agent applies the obvious-feeling answer immediately and surfaces a flag for asynchronous human review after the artifact has shipped"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "the-agent-searches-for-analogies-in-adjacent-cod"
label = "the agent searches for analogies in adjacent codebases or …"
directive = "the agent searches for analogies in adjacent codebases or upstream libraries and proceeds autonomously if any analogy is found, only pausing when no analogy at all exists"
why = "A defensible alternative the project considered and did not adopt as the default."
