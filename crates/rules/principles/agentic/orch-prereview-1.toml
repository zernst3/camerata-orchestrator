id = "ORCH-PREREVIEW-1"
title = "Every change carries an AI reviewer's verdict into the human review queue"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "structured"
default = true
qualifies = "Not enforceable by any off-the-shelf linter: this is a pipeline-topology commitment (an AI reviewer agent gating the human queue), enforced by the orchestration system and branch-protection config, not by a third-party tool with a citable rule-id. Codified and verified at pipeline-config time: an AI reviewer step is wired into the change pipeline as a pre-merge hook, a CI job, or a bot on the pull request, such that a change cannot reach the human merge gate without an approval status from the reviewer agent. Conformance holds when the pipeline configuration shows that required reviewer status and an unreviewed change is blocked from the human queue; it fails when AI-authored changes flow to human review with no enforced reviewer-agent verdict gating them."
verification = "grounded"

[[sources]]
url = "AGENTS.md"
title = "AGENTS.md — ORCH-PREREVIEW-1 (every change carries an AI reviewer's verdict)"

[[sources]]
url = "docs/decisions/2026-06-15_cross_agent_integration_gate.md"
title = "Decision: Cross-agent rules — the integration gate (pipeline: execute → integrate → cross-agent gate → push/PR → human QA)"

[decision]
question = "How should AI-authored changes flow toward the human review gate?"
default = "ai-pre-review-then-human-review"
why = "Human reviewers are the scarcest resource in any AI-orchestrated workflow; if every routine output reaches them raw, the queue saturates and review quality drops. An AI reviewer reading against the codified commitments catches the common drift cases cheaply, so the human review pool sees a sharper, smaller queue. The review agent also acts as a forcing function on the codified commitments themselves: commitments that cannot be checked from the diff alone get surfaced and rewritten upstream, which strengthens the commitment library over time. Human-only review works at small scale but saturates the human review pool at AI-orchestrated throughput, where the volume of AI-authored changes routinely exceeds the human pool's capacity to review them carefully. Replacing the human merge gate with AI review entirely cuts the human bottleneck but cedes the final architectural call to a system that cannot be held accountable for the call, which is unacceptable for one-way-door changes regardless of model strength. Batching human review on a fixed cadence with no AI pre-review lets the queue grow faster than batches clear and becomes lossy at scale, because urgent items wait for the next batch and reviewers triage rather than read carefully when the queue is deep."

[[option]]
id = "ai-pre-review-then-human-review"
label = "AI pre-review then human review"
directive = "Code changes authored by autonomous agents pass through an AI review step. A reviewer agent reads the diff against the project's codified architectural commitments and either approves the change, requests specific changes, or escalates the change as out of scope. The human review queue contains only changes the reviewer agent has cleared or has explicitly flagged for human attention. The reviewer step is wired into the change pipeline (a pre-merge hook, a CI job, a bot on the pull request, or equivalent) such that the change cannot reach the human merge gate without an approval status from the reviewer agent."
why = "An AI pre-review step catches common drift cases cheaply so the human review pool sees a sharper, smaller queue; the review agent also acts as a forcing function that surfaces commitments that cannot be checked from the diff alone, strengthening the commitment library over time."

[[option]]
id = "human-only-review"
label = "human-only review"
directive = "AI-authored changes flow directly to the human review queue with no AI reviewer step in between"
why = "Human-only review works at small scale but saturates the human review pool at AI-orchestrated throughput, where the volume of AI-authored changes routinely exceeds the human pool's capacity to review each one carefully."

[[option]]
id = "ai-review-replaces-human-review"
label = "AI review replaces human review"
directive = "the AI reviewer replaces the human merge gate entirely; the AI reviewer's approval is the final word and changes merge without a human approval step"
why = "Replacing the human merge gate with AI review entirely cedes the final architectural call to a system that cannot be held accountable for the call, which is unacceptable for one-way-door changes regardless of model strength."
