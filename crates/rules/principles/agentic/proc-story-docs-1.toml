id = "PROC-STORY-DOCS-1"
title = "Per-story durable documentation keyed by story id"
tag = "process"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true

[decision]
question = "How does the project capture durable, in-repo documentation for a change (beyond the commit/PR record)?"
default = "per-story-docs"
why = "The commit and PR records capture WHAT changed; a governed agent needs a stable, deterministic place to put richer WHY and HOW documentation that survives history rewrites, squash merges, and future re-reads. Keying docs on the story id the dev console and unit-of-work already track gives the agent a deterministic drop location without guessing — the agent emits to docs/<story-id>/technical/ and docs/<story-id>/user/ exactly once per story. Splitting technical from user-facing content keeps developer context out of the user guide and prevents conflation of two distinct audiences. Living central docs (single TECHNICAL.md + USER_GUIDE.md) are simpler but collapse all stories into one growing file, making per-story attribution and audit difficult; ADR-per-change is precise but biased toward architecture and produces no user-facing artifact; mechanical-minimum is the lowest overhead path but leaves the repo without searchable narrative for any change."

[[option]]
id = "per-story-docs"
label = "Per-story docs keyed by story id"
directive = "When a governed agent completes a story, emit two documentation files: docs/<story-id>/technical/<story-id>-dev.md (developer-facing: design rationale, implementation decisions, testable assertions, routing notes) and docs/<story-id>/user/<story-id>-guide.md (user-facing: what the change enables, how to use it, any migration steps). The story id is the canonical key already tracked by the dev console and unit of work, so the agent places files deterministically without additional configuration."
why = "The adopted default. Keys off the story id the dev console and UoW already track; separates technical vs. user audiences; the governed agent can place docs deterministically without additional routing logic."

[[option]]
id = "living-central-docs"
label = "Living central docs — update TECHNICAL.md + USER_GUIDE.md per change"
directive = "Maintain a single docs/TECHNICAL.md and a single docs/USER_GUIDE.md. Each completed story appends a dated section to both files. The agent performs a targeted append rather than creating new files."
why = "A defensible alternative the project considered and did not adopt as the default. Simpler directory structure; works well for small projects where per-story attribution is rarely needed. Becomes unwieldy as the story count grows and makes per-story audit difficult."

[[option]]
id = "adr-per-change"
label = "ADR-per-change — docs/decisions/<date>_<slug>.md"
directive = "For every story, emit a single Architecture Decision Record at docs/decisions/<date>_<slug>.md following the existing ADR format. No separate user-facing file is produced; user impact is noted inside the ADR when relevant."
why = "A defensible alternative the project considered and did not adopt as the default. Precise and consistent with the existing docs/decisions/ directory; biased toward architecture rather than usage; produces no dedicated user-facing artifact and can conflate technical rationale with user guidance."

[[option]]
id = "mechanical-minimum"
label = "Mechanical minimum — commit/PR record + generated CHANGELOG only"
directive = "Do not create separate in-repo documentation files per story. Rely on the commit messages (gated by PROCESS-COMMIT-DOC-1 for substantive bodies with story-id references) and the PR description as the durable record. Optionally generate a CHANGELOG from the commit log at release time."
why = "A defensible alternative the project considered and did not adopt as the default. Lowest overhead; no file proliferation; commit and PR records are already durable artifacts. Loses searchable narrative, per-story technical rationale, and dedicated user-facing documentation for anything beyond what fits in a commit body."
