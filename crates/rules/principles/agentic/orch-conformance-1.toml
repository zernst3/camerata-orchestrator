id = "ORCH-CONFORMANCE-1"
title = "Codified architectural commitments are enforced gates, not advisory documents"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "structured"
default = true
qualifies = "Not enforceable by any off-the-shelf linter: this is a process commitment about the change pipeline itself, enforced by the orchestration system (e.g. Camerata's own governance gate and waiver log), not by a third-party tool with a citable rule-id. It is codified and reviewed at PR/pipeline-config time: a deterministic gate (a lint rule, a type-system constraint, an AST scan, a CI-run AI reviewer reading against the codified commitments, or a combination) is wired into the change pipeline, and a durable waiver log exists. Conformance holds when the pipeline configuration names that gate and a change that violates a known commitment is demonstrably blocked, escalated, or waivered with the violation and reviewer recorded, rather than merged silently. It fails when the commitments live only as documents that reviewers cite ad hoc with no enforced step on the agent's output."
verification = "grounded"

[[sources]]
url = "AGENTS.md"
title = "AGENTS.md — ORCH-CONFORMANCE-1 (codified architectural commitments are enforced gates)"

[[sources]]
url = "docs/RATIONALE.md"
title = "docs/RATIONALE.md — §2 The approach: two deterministic layers (the enforcement thesis)"

[[sources]]
