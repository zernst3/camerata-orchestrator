id = "ORCH-TIERED-ESCALATION-1"
title = "Tiered escalation — soft-flag by default, hard-pause only for guard areas"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true

[decision]
question = "How should flagged items gate the routine?"
default = "soft-flag-by-default-hard-pause-only-for-guard-a"
why = "Routine work should flow; reserve the halt for decisions that truly block forward progress or that accumulate into a backlog. Hard-pausing on everything produces constant halts that drain the forward-progress value the routine exists to create, and trains the human reviewer to glance and dismiss rather than read carefully. Never pausing accepts dangerous drift, because items that should have blocked the routine accumulate silently and the absence of any halt signal removes the rule's relief valve entirely."

[[option]]
id = "soft-flag-by-default-hard-pause-only-for-guard-a"
label = "soft-flag by default, hard-pause only for guard areas"
directive = "Flagged items are soft-flagged (logged, routine continues on other work). Hard-pause (halt until a human clears it) applies only to sensitive hard-guard areas (auth, payments, infra, CI) and to overflow conditions when the review queue passes a threshold."
why = "The adopted default. Routine work should flow; reserve the halt for decisions that truly block forward progress or that accumulate into a backlog."

[[option]]
id = "hard-pause-on-everything"
label = "hard-pause on everything"
directive = "the routine hard-pauses on every flagged item, regardless of whether it falls in a hard-guard area"
why = "A defensible alternative the project considered and did not adopt as the default."

[[option]]
id = "never-pause"
label = "never pause"
directive = "the routine never pauses on any flagged item; everything is logged and the routine continues unconditionally"
why = "A defensible alternative the project considered and did not adopt as the default."
