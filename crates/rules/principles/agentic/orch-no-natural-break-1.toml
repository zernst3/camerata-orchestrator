id = "ORCH-NO-NATURAL-BREAK-1"
title = "Never stop on a \"natural break\""
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "prose"
default = true
verification = "policy"

[[sources]]
url = "AGENTS.md"
title = "AGENTS.md — ORCH-NO-NATURAL-BREAK-1 (never stop on a natural break)"

[decision]
question = "What position does the project take on: Never stop on a \"natural break\"?"
default = "never-stop-on-a-natural-break"
why = "For long-running work, the budget cap is the ceiling, not the target; quitting early with capacity left is a failure mode. Stopping at milestones or other natural seams feels disciplined but in practice under-uses the available budget, because the routine treats a completed-chunk feeling as a stop signal rather than as a self-check that confirms forward progress and then continues. The budget cap, the real escalation triggers, an empty queue, and unrecoverable errors are the only signals that mean stop; anything else is a false stop that wastes paid-for capacity. This rule has a real failure mode of its own if read too literally: pressuring the routine to always start another unit of work, even when the remaining budget cannot possibly finish it, creates a make-work incentive that produces either a broken/uncommitted tree at the hard cutoff or padded busywork to look active until time runs out. That is not what this rule asks for. Insufficient remaining budget for the next atomic unit of work is itself one of the named valid stop signals (a form of the budget/time cap), not a natural-break rationalization — see the last-verified-green-checkpoint option, which resolves this without weakening the rule against quitting early merely because a milestone feels like a good stopping point."

[[option]]
id = "never-stop-on-a-natural-break"
label = "Never stop on a \"natural break\""
directive = "A completed chunk, a milestone, or a periodic self-check is NOT a valid stop. The only valid exits are: budget/time cap, a real escalation trigger, queue genuinely empty, or unrecoverable error. Don't wrap early with budget unspent."
why = "For long-running work, the budget cap is the ceiling, not the target; quitting early with capacity left is a failure mode."

[[option]]
id = "the-routine-treats-milestones-completed-chunks-o"
label = "Stop at milestone seams"
directive = "the routine treats milestones, completed chunks, or other natural seams as valid stops, even when budget and queue still permit continuing"
why = "Stopping at natural seams feels disciplined but under-uses the available budget; the routine treats a completed-chunk feeling as a stop signal rather than as a self-check that confirms forward progress and then continues."

[[option]]
id = "stop-at-last-green-checkpoint-when-budget-insufficient"
label = "Stop at the last verified-green checkpoint when remaining budget can't finish the next atomic unit of work"
directive = "Before starting the next atomic unit of work (the next commit-sized, independently testable change), check whether the remaining budget/time realistically covers finishing it, including verification. If it does not, stop now, at the last checkpoint where all tests pass and all work is committed, rather than starting a unit of work that cannot be completed. Do not begin a change you cannot finish just to avoid the appearance of stopping early, and do not pad out trivial or low-value busywork to consume the remaining budget."
why = "This is a refinement of the never-stop rule, not an exception to it: it resolves the make-work incentive the literal rule can create when remaining capacity genuinely cannot finish the next unit of work. Starting an unfinishable unit anyway produces the worst outcome, an uncommitted or failing tree at the hard cutoff, when a clean, fully-tested, fully-committed stopping point was available instead. Insufficient budget for the next atomic unit is itself the budget/time-cap stop signal the default already names; this option makes explicit that the check happens looking forward (can I finish the next unit?) rather than only backward (have I hit the wall yet?), so the routine stops at a deliberate, verified-green checkpoint instead of wherever the clock happens to run out."
