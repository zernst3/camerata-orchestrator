id = "ORCH-AUTOCALLS-LEDGER-1"
title = "Auto-calls ledger + periodic judgment review"
tag = "stack"
domain = "agentic"
layer = "universal"
enforcement = "structured"
default = true

[decision]
question = "What position does the project take on: Auto-calls ledger + periodic judgment review?"
default = "auto-calls-ledger-periodic-judgment-review"
why = "Per-decision gates miss aggregate drift; many small calls can drift heavy or split into competing patterns over hundreds of choices. This is the altitude check. A daily cadence offers more granular review but interrupts forward progress more often, which is the wrong trade for routines whose value comes from sustained autonomous runs. A monthly cadence accumulates drift in longer windows between reviews and makes each review heavier when it does happen, both of which work against the rule's goal of catching aggregate drift while it is still cheap to correct. Keeping the weekly cadence but letting autonomous runs continue between reviews rather than holding speeds up forward progress but accepts that drift can compound past a missed review window before the next sweep catches it, which defeats the hold-until-cleared mechanism that makes the rule self-correcting."

[[option]]
id = "auto-calls-ledger-periodic-judgment-review"
label = "Auto-calls ledger + periodic judgment review"
directive = "Every self-made clear-winner call is logged with date, rule, decision, alternatives, and why. The agent surfaces the accumulated batch for human accept/modify/reject on a weekly cadence. Further autonomous runs hold until the batch is cleared, so drift cannot compound past the weekly review window."
why = "The adopted default. Per-decision gates miss aggregate drift; many small calls can drift heavy or split into competing patterns over hundreds of choices."

