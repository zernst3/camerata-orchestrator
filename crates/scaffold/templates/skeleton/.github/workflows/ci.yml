# Generated by the Camerata scaffolder. Build + test + the governance check declared
# in CONVENTIONS.md/AGENTS.md. No deploy stage yet — that's a later phase (see
# terraform/ for the compute module this app deploys to once wired up).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: cargo check + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # Native (server) target: the binary's `#[cfg(not(target_arch = "wasm32"))]`
      # branch, plus every module the frontend shares with it. `--features server`
      # (with defaults off) is required — Dioxus 0.7's `#[server]` macro checks
      # `cfg(feature = "server")` to compile the real body, not a client stub.
      - name: cargo check (native)
        run: cargo check --all-targets --no-default-features --features server

      - name: cargo test
        run: cargo test --no-default-features --features server

      # Wasm (client) target: proves the frontend — the `#[cfg(target_arch =
      # "wasm32")]` branch, the design-system components, the auto-capture bridge —
      # actually compiles for the browser. `--no-default-features --features web` is
      # required so the `server` feature stays OFF here: with it on, `#[server]`
      # would compile the real (possibly native-only) function body into the wasm
      # bundle instead of a network-call stub — the same class of bug as leaking a
      # direct HTTP client into frontend code (AGENTS.md: "No I/O in the wasm
      # frontend"), just via a feature flag instead of an import.
      - name: cargo check (wasm32)
        run: cargo check --target wasm32-unknown-unknown --no-default-features --features web

  governance:
    name: Camerata governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Declared conventions (see CONVENTIONS.md / AGENTS.md)
        run: |
          echo 'Camerata governance baseline for this project:'
          echo '  - RUST-DIOXUS-9  — server-to-client calls go through #[server] functions only'
          echo '  - RUST-DIOXUS-11 — single binary serves SSR + client bundle + server functions'
          echo '  - RUST-DIOXUS-14 — common UI elements have one canonical implementation'
          echo '  - RUST-DIOXUS-1  — file-role layout (pages / components / server_fns / server)'
          echo '  - ARCH-STRUCTURED-ERRORS-1 — server functions return typed errors'
          echo '  - DB-ON-DEMAND-1 — no database until a requirement needs one'
          echo '  - PWA-AUTO-CAPTURE-1 — the auto-capture reporter is never removed or bypassed'
          echo 'Full directives: CONVENTIONS.md (structured) and AGENTS.md (prose).'
